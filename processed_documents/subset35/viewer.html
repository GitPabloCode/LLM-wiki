29309802734383, "r": 412.8068000000001, "b": 45.08179548590738}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶446": {"paragraph_id": "p0521", "page_id": 61, "type": "list_item", "content": "- 10.7.3.6 The  STM  requests  its  Specific  NTC  Data  with  a  'Specific  NTC  Data  Entry  request' which  shall  include  for  each  Specific  NTC  Data,  the  following  information:  the  label, optionally a default value, and optionally values for a dedicated keyboard.", "bbox": {"l": 56.76, "t": 763.0570980273437, "r": 547.4267199999998, "b": 722.6750109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶447": {"paragraph_id": "p0522", "page_id": 61, "type": "list_item", "content": "- 10.7.3.7 Note: Unless values for a dedicated keyboard are provided or the type of keyboard is configured on-board, an alphanumeric keyboard will by default be used (see document ref [9]).", "bbox": {"l": 56.76, "t": 708.3370980273437, "r": 547.46944, "b": 667.9550109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶448": {"paragraph_id": "p0523", "page_id": 61, "type": "list_item", "content": "- 10.7.3.8 It shall be possible to configure in the ERTMS/ETCS on-board the following parameters for any STM:", "bbox": {"l": 56.76, "t": 653.6170980273438, "r": 547.3463199999999, "b": 628.4750109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶449": {"paragraph_id": "p0524", "page_id": 61, "type": "list_item", "content": "- The window titles for the NTC data entry, the NTC data validation and the NTC data view windows", "bbox": {"l": 113.54, "t": 620.1370980273438, "r": 547.1187199999995, "b": 594.9650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶450": {"paragraph_id": "p0525", "page_id": 61, "type": "list_item", "content": "- For each Specific NTC Data Identifier not using a dedicated keyboard:", "bbox": {"l": 113.54, "t": 586.6270980273438, "r": 477.52912, "b": 576.7250109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶451": {"paragraph_id": "p0526", "page_id": 61, "type": "list_item", "content": "-  The type of keyboard amongst numeric, enhanced numeric and alphanumeric", "bbox": {"l": 149.54, "t": 568.3870980273438, "r": 547.2828799999996, "b": 543.2450109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶452": {"paragraph_id": "p0527", "page_id": 61, "type": "list_item", "content": "- If  the  type  of  keyboard  is  numeric  or  enhanced  numeric,  whether  leading zeros have to be kept and sent to the STM", "bbox": {"l": 149.54, "t": 534.9070980273437, "r": 547.2055999999994, "b": 509.76501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶453": {"paragraph_id": "p0528", "page_id": 61, "type": "list_item", "content": "- The  allowed  minimum  and  maximum  value,  that  shall  be  used  by  the ERTMS/ETCS on-board with a technical range check", "bbox": {"l": 149.54, "t": 501.4270980273438, "r": 547.2055999999998, "b": 476.28501095552053}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶454": {"paragraph_id": "p0529", "page_id": 61, "type": "list_item", "content": "- 10.7.3.9 By  analogy  to  the  modification/revalidation  of  ETCS  Train  data,  the  [1]  requirements 3.14.1.7.3,  3.18.3.3.1  regarding  the  brake  command/release  when  a  movement  is detected  while  modifying  or  revalidating  the  Train  Data  in  normal  operation  after  the start of mission shall also apply for the NTC data modification/revalidation.", "bbox": {"l": 56.76, "t": 461.9470980273438, "r": 547.45792, "b": 406.3050109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶455": {"paragraph_id": "p0530", "page_id": 61, "type": "section_header", "content": "# 10.7.4 Specific NTC Data Entry procedure", "bbox": {"l": 56.76, "t": 385.4659780273438, "r": 316.366, "b": 374.70283990579685}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶456": {"paragraph_id": "p0531", "page_id": 61, "type": "list_item", "content": "- 10.7.4.1 As soon as the ETCS Train Data is validated by the driver and if the connected STM is in CO, DE, CS, HS or DA state, the ERTMS/ETCS on-board shall indicate to the STM the beginning of its Specific NTC Data Entry procedure by sending the START flag.", "bbox": {"l": 56.76, "t": 362.8070980273438, "r": 547.3799199999997, "b": 322.4250109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶457": {"paragraph_id": "p0532", "page_id": 61, "type": "list_item", "content": "- 10.7.4.2 The ETCS Train Data shall be sent immediately after the START flag.", "bbox": {"l": 56.76, "t": 308.0870980273438, "r": 457.36912, "b": 298.1850109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶458": {"paragraph_id": "p0533", "page_id": 61, "type": "list_item", "content": "- 10.7.4.3 While a Specific NTC Data Entry is ongoing, the ERTMS/ETCS on-board shall indicate to the STM the end of its Specific NTC Data Entry procedure by sending the STOP flag when one of the following conditions is fulfilled:", "bbox": {"l": 56.76, "t": 283.8470980273438, "r": 547.4502399999998, "b": 243.43501095552062}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶459": {"paragraph_id": "p0534", "page_id": 61, "type": "list_item", "content": "- after having received the 'End of Specific NTC Data Entry' from the respective STM,", "bbox": {"l": 113.42, "t": 232.0970980273438, "r": 543.66912, "b": 222.19501095552062}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶460": {"paragraph_id": "p0535", "page_id": 61, "type": "list_item", "content": "- at expiration of the timeout specified in 10.7.4.9 for the respective STM,", "bbox": {"l": 113.42, "t": 210.8570980273438, "r": 479.80912, "b": 200.9550109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶461": {"paragraph_id": "p0536", "page_id": 61, "type": "list_item", "content": "-  when the Train Data Entry procedure is aborted by the ERTMS/ETCS on-board for reasons not related to the STM interface", "bbox": {"l": 113.42, "t": 189.6170980273438, "r": 547.43872, "b": 164.4750109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶462": {"paragraph_id": "p0537", "page_id": 61, "type": "list_item", "content": "- the  Specific  NTC  Data  Entry  for  this  STM  has  been  skipped  by  the  driver  see 10.7.3.1.", "bbox": {"l": 113.42, "t": 153.13709802734377, "r": 547.1331199999995, "b": 127.99501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶463": {"paragraph_id": "p0538", "page_id": 61, "type": "list_item", "content": "- 10.7.4.3.1  Note: Reasons leading to the abortion of the Train Data entry procedure and not related to the STM interface can be e.g. the cab deactivation, the driver aborting the Train Data entry procedure,...", "bbox": {"l": 56.76, "t": 113.63709802734377, "r": 547.3232799999996, "b": 73.25501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶464": {"paragraph_id": "p0539", "page_id": 61, "type": "text", "content": "© This document has been developed and released by UNISIG", "bbox": {"l": 188.21, "t": 52.29309802734383, "r": 412.8068000000001, "b": 45.08179548590738}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶465": {"paragraph_id": "p0541", "page_id": 62, "type": "list_item", "content": "- 10.7.4.4 Note: ETCS Train Data is also sent without the START and STOP flags outside a Train Data entry procedure, see 10.4.1.7.", "bbox": {"l": 56.76, "t": 763.0570980273437, "r": 547.1359999999997, "b": 737.9150109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶466": {"paragraph_id": "p0542", "page_id": 62, "type": "list_item", "content": "- 10.7.4.5 Once the STM has received the ETCS Train Data while its Specific NTC Data Entry is ongoing:", "bbox": {"l": 56.76, "t": 723.5770980273437, "r": 547.1580799999996, "b": 698.4350109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶467": {"paragraph_id": "p0543", "page_id": 62, "type": "list_item", "content": "- If  the  STM  requires  Specific  NTC  Data,  the  STM shall send a 'Specific NTC Data Entry request' information to the ERTMS/ETCS on-board.", "bbox": {"l": 113.42, "t": 687.0970980273437, "r": 547.0558399999995, "b": 661.9550109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶468": {"paragraph_id": "p0544", "page_id": 62, "type": "list_item", "content": "- If  the  STM  doesn't  require  Specific  NTC  Data,  the  STM  shall  send  an  'End  of Specific NTC Data Entry' information to the ERTMS/ETCS on-board.", "bbox": {"l": 113.42, "t": 650.6170980273438, "r": 547.0558399999996, "b": 625.4750109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶469": {"paragraph_id": "p0545", "page_id": 62, "type": "list_item", "content": "- 10.7.4.6 After the ERTMS/ETCS on-board has received the Specific NTC Data Entry request, it shall  perform  the  Specific  NTC  Data  Entry/Validation  exchanges  with  the driver when the driver selects this Specific NTC Data Entry.", "bbox": {"l": 56.76, "t": 611.1370980273438, "r": 547.4209599999998, "b": 570.7250109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶470": {"paragraph_id": "p0546", "page_id": 62, "type": "list_item", "content": "- 10.7.4.7 Once  the  Specific  NTC  Data  for  an  STM  has  been  validated  by  the  driver,  the ERTMS/ETCS on-board shall send the 'Specific NTC Data' to this STM.", "bbox": {"l": 56.76, "t": 556.3870980273438, "r": 547.1580799999997, "b": 531.2450109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶471": {"paragraph_id": "p0547", "page_id": 62, "type": "list_item", "content": "- 10.7.4.8 When  the  STM  receives  the  Specific  NTC  Data,  it  checks  the  data  according  to  its national criteria. Depending on the check result:", "bbox": {"l": 56.76, "t": 516.9070980273437, "r": 547.0918399999996, "b": 491.76501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶472": {"paragraph_id": "p0548", "page_id": 62, "type": "list_item", "content": "- the STM shall send an 'End of Specific NTC Data Entry' if the checks are OK and the STM has all the requested data.", "bbox": {"l": 113.42, "t": 480.4270980273438, "r": 547.1904799999999, "b": 455.28501095552053}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶473": {"paragraph_id": "p0549", "page_id": 62, "type": "list_item", "content": "- the STM shall send again Specific NTC Data Entry request.", "bbox": {"l": 113.42, "t": 443.9470980273438, "r": 421.12912, "b": 434.0450109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶474": {"paragraph_id": "p0550", "page_id": 62, "type": "list_item", "content": "- 10.7.4.9 For  all  connected  STMs,  the  ERTMS/ETCS  on-board  shall  supervise  separately  a timeout of 10s (TrainDataEntry_STM_Response_Timeout, see chapter 10.3.2.4, O16):", "bbox": {"l": 56.76, "t": 419.6870980273438, "r": 547.4125599999996, "b": 394.5450109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶475": {"paragraph_id": "p0551", "page_id": 62, "type": "list_item", "content": "- from sending the ETCS Train Data by the ETCS while the Specific NTC Data Entry procedure is running, until the reception of a Specific NTC Data Entry request or the 'End of Specific NTC Data Entry' from the STM and", "bbox": {"l": 113.42, "t": 383.2070980273438, "r": 547.1551999999997, "b": 342.82501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶476": {"paragraph_id": "p0552", "page_id": 62, "type": "list_item", "content": "- from each sending Specific NTC Data by the ETCS until the reception of the Specific NTC Data Entry request or the 'End of Specific NTC Data Entry' from the STM.", "bbox": {"l": 113.42, "t": 331.4870980273438, "r": 547.1158399999996, "b": 306.3450109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶477": {"paragraph_id": "p0554", "page_id": 63, "type": "section_header", "content": "# 10.7.5 Sequence diagrams for the Specific NTC Data Entry", "bbox": {"l": 56.76, "t": 750.5559780273438, "r": 412.00600000000003, "b": 739.7928399057969}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶478": {"paragraph_id": "p0556", "page_id": 63, "type": "caption", "content": "Figure 6 - Specific NTC Data Entry performed", "bbox": {"l": 192.65, "t": 133.87085802734373, "r": 411.31888000000004, "b": 124.93745338645977}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶479": {"paragraph_id": "p0557", "page_id": 63, "type": "text", "content": "© This document has been developed and released by UNISIG", "bbox": {"l": 188.21, "t": 52.29309802734383, "r": 412.8068000000001, "b": 45.08179548590738}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶480": {"paragraph_id": "p0559", "page_id": 64, "type": "caption", "content": "Figure 7 - Specific NTC Data Entry skipped for NTC B", "bbox": {"l": 173.66, "t": 243.07085802734377, "r": 430.18888000000004, "b": 234.1374533864598}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶481": {"paragraph_id": "p0561", "page_id": 65, "type": "caption", "content": "Figure 8 - Specific NTC Data Entry aborted", "bbox": {"l": 199.01, "t": 437.3808580273438, "r": 404.95888, "b": 428.4474533864598}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶482": {"paragraph_id": "p0562", "page_id": 65, "type": "section_header", "content": "# 10.8 Specific NTC Data View", "bbox": {"l": 56.76, "t": 404.23109802734376, "r": 274.67312, "b": 391.63822642513384}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶483": {"paragraph_id": "p0563", "page_id": 65, "type": "list_item", "content": "- 10.8.1.1 This  procedure  shall  allow  the  driver  to  view  the  Specific  NTC  Data  View  values currently known by the STM.", "bbox": {"l": 56.76, "t": 379.6070980273438, "r": 547.1801599999997, "b": 354.46501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶484": {"paragraph_id": "p0564", "page_id": 65, "type": "list_item", "content": "- 10.8.1.2 When the Data View procedure is triggered, the ERTMS/ETCS on-board shall send to all available STMs a Request for Specific NTC Data View values.", "bbox": {"l": 56.76, "t": 340.1270980273438, "r": 547.4679999999998, "b": 314.9850109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶485": {"paragraph_id": "p0565", "page_id": 65, "type": "list_item", "content": "- 10.8.1.3 Once the STM has received the ETCS Request for Specific NTC Data View values:", "bbox": {"l": 56.76, "t": 300.6470980273439, "r": 523.48912, "b": 290.74501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶486": {"paragraph_id": "p0566", "page_id": 65, "type": "list_item", "content": "- If the STM requires Specific NTC Data View values to be displayed, the STM shall send those Specific NTC Data View values (labels and corresponding values) to the STM Control Function.", "bbox": {"l": 113.42, "t": 279.40709802734386, "r": 547.1993599999995, "b": 238.99501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶487": {"paragraph_id": "p0567", "page_id": 65, "type": "list_item", "content": "- If the STM doesn't require Specific NTC Data View values to be displayed, the STM shall send a 'No Specific NTC Data View values' to the ETCS STM Control Function.", "bbox": {"l": 113.42, "t": 227.65709802734375, "r": 547.1331199999995, "b": 202.51501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶488": {"paragraph_id": "p0568", "page_id": 65, "type": "list_item", "content": "- 10.8.1.4 When the ERTMS/ETCS on-board receives the Specific NTC Data View values, it shall present them to the driver.", "bbox": {"l": 56.76, "t": 188.17709802734373, "r": 547.4651199999998, "b": 163.03501095552065}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶489": {"paragraph_id": "p0569", "page_id": 65, "type": "list_item", "content": "- 10.8.1.5 For  all  connected  STMs,  the  ERTMS/ETCS  on-board  shall  supervise  separately  a timeout  of  10s  (TrainDataView_STM_Response_Timeout,  see  chapter  10.3.2.4,  N16) from  sending  the  Request  for  Specific  NTC  Data  View  values  until  the  reception  of Specific NTC Data View values or the 'No Specific Data View values' information from the respective STM.", "bbox": {"l": 56.76, "t": 148.69709802734383, "r": 547.4775999999999, "b": 77.81501095552062}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶490": {"paragraph_id": "p0571", "page_id": 66, "type": "section_header", "content": "# 10.9 STM Test Procedure", "bbox": {"l": 56.76, "t": 762.1210980273438, "r": 253.31312, "b": 749.5282264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶491": {"paragraph_id": "p0572", "page_id": 66, "type": "list_item", "content": "- 10.9.1.1 The STM shall be allowed to send a Test Procedure Permission Request, including a Test Identity, to the STM Control Function.", "bbox": {"l": 56.76, "t": 737.4970980273438, "r": 547.4843199999999, "b": 712.3550109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶492": {"paragraph_id": "p0573", "page_id": 66, "type": "list_item", "content": "- 10.9.1.2 Having received this Test Procedure Permission Request, the ERTMS/ETCS on-board shall grant Test Procedure Permission when technically suitable.", "bbox": {"l": 56.76, "t": 698.0170980273438, "r": 547.48528, "b": 672.8750109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶493": {"paragraph_id": "p0574", "page_id": 66, "type": "list_item", "content": "- 10.9.1.2.1  Note: the condition to grant this Test Procedure Permission is specific to ERTMS/ETCS on-board implementation and to the Test Identity requested by the STM.", "bbox": {"l": 56.76, "t": 658.5370980273437, "r": 547.3424799999998, "b": 633.3950109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶494": {"paragraph_id": "p0575", "page_id": 66, "type": "list_item", "content": "- 10.9.1.3 Having received this  Test  Procedure  Permission,  the  STM shall perform the test  and then report the End of Test Procedure, including test result and optional text message.", "bbox": {"l": 56.76, "t": 619.0570980273437, "r": 547.1691199999996, "b": 593.8850109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶495": {"paragraph_id": "p0576", "page_id": 66, "type": "list_item", "content": "- 10.9.1.3.1  Note: the way  the test result and text message  are  displayed is specific to ERTMS/ETCS on-board implementation.", "bbox": {"l": 56.76, "t": 579.5470980273437, "r": 547.2132799999995, "b": 554.4050109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶496": {"paragraph_id": "p0577", "page_id": 66, "type": "section_header", "content": "# 10.10 Override", "bbox": {"l": 56.76, "t": 533.1310980273438, "r": 175.16312, "b": 520.5382264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶497": {"paragraph_id": "p0578", "page_id": 66, "type": "section_header", "content": "# 10.10.1 Introduction", "bbox": {"l": 56.76, "t": 502.00597802734376, "r": 186.866, "b": 491.2428399057968}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶498": {"paragraph_id": "p0579", "page_id": 66, "type": "list_item", "content": "- 10.10.1.1 This  Override  procedure  (Trip  Inhibition,  Pass  Stop  or  Pass  signal  at  danger)  is specified in order to provide an override for the active system as well as for the system to be activated without applying the brakes (e.g. trip) by both systems.", "bbox": {"l": 56.76, "t": 479.3470980273438, "r": 547.1691199999997, "b": 438.96501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶499": {"paragraph_id": "p0580", "page_id": 66, "type": "list_item", "content": "- 10.10.1.2 When Override is activated in the active system (ERTMS/ETCS on-board or STM), all on-board systems receive a notification. Each system can then activate and monitor its specific  Override  procedure  limits  (e.g.  time,  distance  and/or  reception  of  trackside information) and trip inhibition. Termination of this monitoring is done independently in each system.", "bbox": {"l": 56.76, "t": 424.6070980273438, "r": 547.4747199999999, "b": 353.74501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶500": {"paragraph_id": "p0581", "page_id": 66, "type": "list_item", "content": "- 10.10.1.3 After  a  level  transition,  the  activated  system  is  able  to  immediately  have  its  Override function active. It can then start to supervise the relevant speed for Override under the limits of the activated system according to its specific requirements. The limits may be considered from the location where driver requested Override.", "bbox": {"l": 56.76, "t": 339.4070980273438, "r": 547.2139999999995, "b": 283.78501095552053}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶501": {"paragraph_id": "p0582", "page_id": 66, "type": "section_header", "content": "# 10.10.2 Requirements", "bbox": {"l": 56.76, "t": 262.9159780273437, "r": 197.066, "b": 252.15283990579678}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶502": {"paragraph_id": "p0583", "page_id": 66, "type": "list_item", "content": "- 10.10.2.1 In addition to the conditions defined in [1], the ETCS Override status shall be activated when in level NTC, the ERTMS/ETCS on-board has received from the active STM the activation report of its own Override procedure.", "bbox": {"l": 56.76, "t": 240.25709802734377, "r": 547.3688799999998, "b": 199.87501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶503": {"paragraph_id": "p0584", "page_id": 66, "type": "list_item", "content": "- 10.10.2.2 The ETCS Override function shall be reset each time a new activation report is received from the active STM.", "bbox": {"l": 56.76, "t": 185.53709802734375, "r": 547.1028799999996, "b": 160.39501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶504": {"paragraph_id": "p0585", "page_id": 66, "type": "list_item", "content": "- 10.10.2.3 The ERTMS/ETCS on-board shall report its Override status (activated or deactivated):", "bbox": {"l": 56.76, "t": 146.05709802734373, "r": 537.06912, "b": 136.15501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶505": {"paragraph_id": "p0586", "page_id": 66, "type": "list_item", "content": "- To any STM with an established connection to the STM Control Function whenever its Override status changes,", "bbox": {"l": 113.42, "t": 124.81709802734383, "r": 547.4742399999999, "b": 99.65501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶506": {"paragraph_id": "p0587", "page_id": 66, "type": "list_item", "content": "- To  any  connecting  STM  when  the  connection  to  the  STM  Control  Function  is established.", "bbox": {"l": 113.42, "t": 88.31709802734383, "r": 547.5047999999999, "b": 63.175010955520634}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶507": {"paragraph_id": "p0588", "page_id": 66, "type": "text", "content": "© This document has been developed and released by UNISIG", "bbox": {"l": 188.21, "t": 52.29309802734383, "r": 412.8068000000001, "b": 45.08179548590738}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶508": {"paragraph_id": "p0590", "page_id": 67, "type": "list_item", "content": "- 10.10.2.4 Note: If the Override function is active while in the Mode SN, no speed supervision is performed by the ERTMS/ETCS on-board and all connected STMs except for the active STM.", "bbox": {"l": 56.76, "t": 763.0570980273437, "r": 547.3650399999997, "b": 722.6750109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶509": {"paragraph_id": "p0591", "page_id": 67, "type": "section_header", "content": "# 10.11 Transmission of ETCS airgap messages for STMs", "bbox": {"l": 56.76, "t": 701.4010980273438, "r": 449.20312, "b": 688.8082264251337}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶510": {"paragraph_id": "p0592", "page_id": 67, "type": "list_item", "content": "- 10.11.1.1 When the ERTMS/ETCS on-board receives from an RBC or from a Balise Group as non-infill  information  airgap  data  to  be  transmitted  to  an  NTC,  the  data  shall  be transmitted by the STM Control Function to the STM associated to the Level NTC which NID_NTC is contained in this airgap data.", "bbox": {"l": 56.76, "t": 676.7770980273438, "r": 547.3055199999998, "b": 621.1550109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶511": {"paragraph_id": "p0593", "page_id": 67, "type": "list_item", "content": "- 10.11.1.1.1  Note: Airgap data received as infill information is not transmitted to STMs.", "bbox": {"l": 56.76, "t": 606.8170980273437, "r": 476.68912, "b": 596.9150109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶512": {"paragraph_id": "p0594", "page_id": 67, "type": "list_item", "content": "- 10.11.1.2 The  STM  Control  Function  shall  add  to  the  transmitted  airgap  data  the  odometer reading  of  the  balise  group  which  transmitted  the  airgap  message,  or  the  odometer reading of the LRBG of the message if it was received from RBC.", "bbox": {"l": 56.76, "t": 582.5470980273437, "r": 547.1139199999998, "b": 542.1650109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶513": {"paragraph_id": "p0595", "page_id": 67, "type": "list_item", "content": "- 10.11.1.3 The odometer reading shall correspond to the estimated odometer value of the location reference of the balise group.", "bbox": {"l": 56.76, "t": 527.8270980273437, "r": 547.3861599999998, "b": 502.68501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶514": {"paragraph_id": "p0596", "page_id": 67, "type": "section_header", "content": "# 10.12 STM max speed and STM system speed/distance", "bbox": {"l": 56.76, "t": 481.41109802734377, "r": 443.32312, "b": 468.81822642513384}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶515": {"paragraph_id": "p0597", "page_id": 67, "type": "section_header", "content": "# 10.12.1 After announcement, but before the transition to Level NTC X", "bbox": {"l": 56.76, "t": 450.2859780273438, "r": 466.156, "b": 439.52283990579684}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶516": {"paragraph_id": "p0598", "page_id": 67, "type": "list_item", "content": "- 10.12.1.1 When an 'STM max speed' (V_STMMAX) from STM  X in HS state is accepted, the ERTMS/ETCS on-board includes the 'STM max speed' in the computation of the MRSP (see [1] 4.5.2) as a speed restriction that shall start at the level transition border.", "bbox": {"l": 56.76, "t": 427.6070980273438, "r": 547.3573599999999, "b": 387.22501095552053}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶517": {"paragraph_id": "p0599", "page_id": 67, "type": "list_item", "content": "- 10.12.1.2 When the ERTMS/ETCS on-board accepts a new 'STM max speed' (V_STMMAX) from STM X, the ERTMS/ETCS on-board shall replace the previously  received  'STM  max speed' (V_STMMAX) with the new value.", "bbox": {"l": 56.76, "t": 372.8870980273438, "r": 547.3186399999995, "b": 332.50501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶518": {"paragraph_id": "p0600", "page_id": 67, "type": "list_item", "content": "- 10.12.1.3 If the STM X connected or known as installed on-board (see 10.1.1.1) is not available, then the ERTMS/ETCS on-board shall consider that 'STM max speed' = 0.", "bbox": {"l": 56.76, "t": 318.16709802734385, "r": 547.4228799999997, "b": 293.02501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶519": {"paragraph_id": "p0601", "page_id": 67, "type": "list_item", "content": "- 10.12.1.3.1  Note: The purpose of the above requirement is to try to prevent the train to enter in a Level NTC area while this STM is not available.", "bbox": {"l": 56.76, "t": 278.68709802734384, "r": 547.0918399999994, "b": 253.51501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶520": {"paragraph_id": "p0602", "page_id": 67, "type": "list_item", "content": "- 10.12.1.4 When an 'STM system speed' (V_STMSYS) together with an 'STM system distance' (D_STMSYS) from STM X in HS state is accepted, the ERTMS/ETCS onboard includes the  'STM  system  speed'  (V_STMSYS)  into  the  computation  of  the  MRSP  (see  [1] 4.5.2), as a new speed restriction that shall start at a location 'STM system distance' (D_STMSYS) in rear of the level transition border and shall end at the level transition border.", "bbox": {"l": 56.76, "t": 239.17709802734373, "r": 547.50912, "b": 153.0750109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶521": {"paragraph_id": "p0603", "page_id": 67, "type": "list_item", "content": "- 10.12.1.5 When an ERTMS/ETCS on-board accepts a new 'STM system speed' (V_STMSYS) and  'STM  system  distance'  (D_STMSYS)  from  STM  X,  the  ERTMS/ETCS  on-board shall replace previously received 'STM system speed' (V_STMSYS) and 'STM system distance' (D_STMSYS) with the new value.", "bbox": {"l": 56.76, "t": 138.7370980273438, "r": 547.48528, "b": 83.09501095552059}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶522": {"paragraph_id": "p0604", "page_id": 67, "type": "text", "content": "© This document has been developed and released by UNISIG", "bbox": {"l": 188.21, "t": 52.29309802734383, "r": 412.8068000000001, "b": 45.08179548590738}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶523": {"paragraph_id": "p0606", "page_id": 68, "type": "list_item", "content": "- 10.12.1.6 When the level transition announcement to level NTC X is deleted by the ERTMS/ETCS on-board:", "bbox": {"l": 56.76, "t": 763.0570980273437, "r": 547.2733599999999, "b": 737.9150109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶524": {"paragraph_id": "p0607", "page_id": 68, "type": "list_item", "content": "- The 'STM system speed' (V_STMSYS) shall be deleted and the supervision of the 'STM system speed' (V_STMSYS) shall be stopped by the ERTMS/ETCS on-board;", "bbox": {"l": 113.42, "t": 726.5770980273437, "r": 547.1551999999996, "b": 701.4350109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶525": {"paragraph_id": "p0608", "page_id": 68, "type": "list_item", "content": "- The  'STM  max  speed'  (V_STMMAX)  shall  be  deleted  and  the  supervision  of  the 'STM max speed' (V_STMMAX) shall be stopped by the ERTMS/ETCS on-board.", "bbox": {"l": 113.42, "t": 690.0970980273437, "r": 547.4420799999998, "b": 664.9550109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶526": {"paragraph_id": "p0609", "page_id": 68, "type": "list_item", "content": "- 10.12.1.6.1  Note: when a new level transition to another level than NTC X is accepted, the previous one is deleted and replaced with this new one.", "bbox": {"l": 56.76, "t": 650.6170980273438, "r": 547.1359999999994, "b": 625.4750109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶527": {"paragraph_id": "p0610", "page_id": 68, "type": "list_item", "content": "- 10.12.1.6.2  Note: when a level transition announcement to the same level NTC X is updated (i.e. with a new distance), the \"STM system speed\" and \"STM max speed\" are not deleted.", "bbox": {"l": 56.76, "t": 611.1370980273438, "r": 547.2327199999996, "b": 585.9650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶528": {"paragraph_id": "p0611", "page_id": 68, "type": "section_header", "content": "# 10.12.2 After the level transition to Level NTC X", "bbox": {"l": 56.76, "t": 565.1259780273438, "r": 341.926, "b": 554.3628399057968}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶529": {"paragraph_id": "p0612", "page_id": 68, "type": "list_item", "content": "- 10.12.2.1 Once the train has passed the level transition border, the ERTMS/ETCS on-board shall supervise the 'STM max speed' (V_STMMAX) previously sent by the STM in HS state as  ceiling  speed  until  the  STM  DA  state  report  is  received  by  the  ERTMS/ETCS  onboard.", "bbox": {"l": 56.76, "t": 542.4670980273437, "r": 547.4838399999999, "b": 486.84501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶530": {"paragraph_id": "p0613", "page_id": 68, "type": "list_item", "content": "- 10.12.2.2 If the STM is considered to be in FA state by the ERTMS/ETCS on-board after the level transition border, then the ERTMS/ETCS on-board shall stop the supervision of 'STM max speed' (V_STMMAX).", "bbox": {"l": 56.76, "t": 472.50709802734383, "r": 547.49056, "b": 432.12501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶531": {"paragraph_id": "p0614", "page_id": 68, "type": "list_item", "content": "- 10.12.2.3 If,  for  any  reasons  (e.g.  reception  of  a  level  transition  order  or  a  manual  change  of level),  the  level  changes  to  another  level  than  NTC  X,  the  'STM  max  speed' (V_STMMAX)  shall be deleted and the supervision of the 'STM  max  speed' (V_STMMAX) shall be stopped by the ERTMS/ETCS on-board.", "bbox": {"l": 56.76, "t": 417.7670980273438, "r": 547.4488, "b": 362.14501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶532": {"paragraph_id": "p0615", "page_id": 68, "type": "section_header", "content": "# 10.13 Validity of 'National Trip Procedure' information", "bbox": {"l": 56.76, "t": 340.87109802734375, "r": 442.60312, "b": 328.2782264251339}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶533": {"paragraph_id": "p0616", "page_id": 68, "type": "list_item", "content": "- 10.13.1.1 The ERTMS/ETCS on-board shall consider that a National Trip Procedure is active if the 'National Trip Procedure' packet has been received within the last 10 seconds (see [1]).", "bbox": {"l": 56.76, "t": 316.2470980273438, "r": 547.4276799999998, "b": 275.8650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶534": {"paragraph_id": "p0617", "page_id": 68, "type": "list_item", "content": "- 10.13.1.2 Note:  if  the  National  Trip  Procedure  has  been  released  before  a  level  transition,  the ERTMS/ETCS on-board will consider it as still active for a maximum of 10 seconds after the reception of the information, but it is assumed that the level transition after the end of this National Trip Procedure won't happen within this time, as the train is at standstill.", "bbox": {"l": 56.76, "t": 261.4970980273438, "r": 547.4334399999997, "b": 205.87501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶535": {"paragraph_id": "p0618", "page_id": 68, "type": "section_header", "content": "# 10.14 Display of STM failure status", "bbox": {"l": 56.76, "t": 184.60109802734382, "r": 309.25312, "b": 172.0082264251339}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶536": {"paragraph_id": "p0619", "page_id": 68, "type": "list_item", "content": "- 10.14.1.1 When an STM has reported FA state or is commanded to FA state, the ERTMS/ETCS on-board shall inform the driver about the failed status of the national system supported by this STM.", "bbox": {"l": 56.76, "t": 159.9770980273438, "r": 547.1691199999997, "b": 119.59501095552059}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶537": {"paragraph_id": "p0620", "page_id": 68, "type": "list_item", "content": "- 10.14.1.2 When at Start of Mission just after validation of ETCS Train Data an STM known by ERTMS/ETCS on-board configuration to be installed is not in CO, CS, HS or DA state and  this  STM  is  not  known  to  be  isolated  by  TIU  'NTC  isolation  status'  input  data,", "bbox": {"l": 56.76, "t": 105.23709802734379, "r": 547.50912, "b": 64.85501095552058}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶538": {"paragraph_id": "p0622", "page_id": 69, "type": "text", "content": "ERTMS/ETCS on-board shall inform the driver about the  failed  status  of the national system supported by this STM.", "bbox": {"l": 113.54, "t": 763.0570980273437, "r": 547.3832799999997, "b": 737.9150109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶539": {"paragraph_id": "p0623", "page_id": 69, "type": "section_header", "content": "# 10.15 Interface 'K' Antenna/BTM ID", "bbox": {"l": 56.76, "t": 716.6410980273438, "r": 308.77312, "b": 704.0482264251337}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶540": {"paragraph_id": "p0624", "page_id": 69, "type": "list_item", "content": "- 10.15.1.1 If  the  ERTMS/ETCS  on-board  uses  alternative  1  of  interface  'K'  (see  [10]),  it  shall indicate to all KER (KVB, Ebicab, RSDD) STMs whether it can or not guarantee by its own  that  the  interface  'K'  data  is  coming  from  the  intended  Antenna/BTM,  when  the connection to the STM Control Function is established.", "bbox": {"l": 56.76, "t": 692.0170980273438, "r": 547.47232, "b": 636.3950109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶541": {"paragraph_id": "p0625", "page_id": 69, "type": "list_item", "content": "- 10.15.1.2 If  ERTMS/ETCS  on-board  cannot  guarantee  by  its  own  that  the  interface  'K'  data  is coming from the intended Antenna/BTM, the STM Control Function shall inform whether there is an active Antenna/BTM and, if so, which one:", "bbox": {"l": 56.76, "t": 622.0570980273437, "r": 547.2824799999997, "b": 581.6450109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶542": {"paragraph_id": "p0626", "page_id": 69, "type": "list_item", "content": "-  To all connected KER STMs whenever this information changes,", "bbox": {"l": 113.54, "t": 573.3070980273437, "r": 449.92912, "b": 563.4050109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶543": {"paragraph_id": "p0627", "page_id": 69, "type": "list_item", "content": "-  To any KER STM when the connection to the STM Control Function is established.", "bbox": {"l": 113.54, "t": 555.0670980273437, "r": 538.62912, "b": 545.1650109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶544": {"paragraph_id": "p0628", "page_id": 69, "type": "list_item", "content": "- 10.15.1.3 Note: This information enables an STM using interface 'K' to fulfil a requirement of [10] asking to supervise that the interface 'K' information comes from the intended source.", "bbox": {"l": 56.76, "t": 530.8270980273437, "r": 547.50912, "b": 505.68501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶545": {"paragraph_id": "p0629", "page_id": 69, "type": "section_header", "content": "# 10.16 BTM alarm data", "bbox": {"l": 56.76, "t": 484.41109802734377, "r": 222.23312, "b": 471.81822642513384}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶546": {"paragraph_id": "p0630", "page_id": 69, "type": "list_item", "content": "- 10.16.1.1 The STM Control Function shall send the BTM alarm data consisting of the BTM alarm status and whether the antenna is within an announced Big Metal Mass track condition:", "bbox": {"l": 56.76, "t": 459.7870980273438, "r": 547.2427999999995, "b": 434.64501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶547": {"paragraph_id": "p0631", "page_id": 69, "type": "list_item", "content": "-  To all connected STMs whenever the BTM alarm status changes or whenever an announced Big Metal Mass track condition is entered or exited during a BTM alarm,", "bbox": {"l": 113.54, "t": 426.2870980273438, "r": 547.4550399999998, "b": 401.14501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶548": {"paragraph_id": "p0632", "page_id": 69, "type": "list_item", "content": "- To any STM when the connection to the STM Control Function is established.", "bbox": {"l": 113.54, "t": 392.8070980273438, "r": 512.92912, "b": 382.90501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶549": {"paragraph_id": "p0633", "page_id": 69, "type": "list_item", "content": "- 10.16.1.2 Note: The ERTMS/ETCS on-board always sends this information over the FFFIS STM interface regardless the alarms are ignored according to [1] 3.12.1 and 3.15.7.", "bbox": {"l": 56.76, "t": 368.5670980273438, "r": 547.3267999999996, "b": 343.4250109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶550": {"paragraph_id": "p0635", "page_id": 70, "type": "section_header", "content": "# 11. TIU AND BIU FUNCTIONS", "bbox": {"l": 56.76, "t": 749.1639780273438, "r": 308.67400000000004, "b": 733.0192708450232}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶551": {"paragraph_id": "p0636", "page_id": 70, "type": "list_item", "content": "- 11.1.1.1 The TIU Function shall transmit train interface inputs status / availability :", "bbox": {"l": 56.76, "t": 720.6970980273437, "r": 474.76912, "b": 710.7950109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶552": {"paragraph_id": "p0637", "page_id": 70, "type": "list_item", "content": "- To  any  STM  with  an  established  connection  to  the  TIU  Function  whenever  a  train interface inputs status / availability changes.", "bbox": {"l": 113.42, "t": 699.4570980273437, "r": 547.4929600000002, "b": 674.3150109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶553": {"paragraph_id": "p0638", "page_id": 70, "type": "list_item", "content": "- To any connecting STM when the connection to the TIU Function is established.", "bbox": {"l": 113.42, "t": 662.9770980273438, "r": 521.56912, "b": 653.0750109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶554": {"paragraph_id": "p0639", "page_id": 70, "type": "list_item", "content": "- 11.1.1.1.1  The TIU  Function  shall transmit train interface  commands  configuration  to  any connecting STM when the connection to the TIU Function is established.", "bbox": {"l": 56.76, "t": 638.7370980273438, "r": 547.1139199999994, "b": 613.5950109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶555": {"paragraph_id": "p0640", "page_id": 70, "type": "list_item", "content": "- 11.1.1.2 The BIU Function shall transmit the brake performance parameters to any connecting STM when the connection to the BIU Function is established.", "bbox": {"l": 56.76, "t": 599.2270980273438, "r": 547.4660799999998, "b": 574.0850109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶556": {"paragraph_id": "p0641", "page_id": 70, "type": "list_item", "content": "- 11.1.1.3 The BIU Function shall transmit the brake status / availability :", "bbox": {"l": 56.76, "t": 559.7470980273438, "r": 421.84911999999997, "b": 549.8450109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶557": {"paragraph_id": "p0642", "page_id": 70, "type": "list_item", "content": "- To any STM with an established connection to the BIU Function whenever a brake status / availability changes.", "bbox": {"l": 113.42, "t": 538.5070980273438, "r": 547.47856, "b": 513.3650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶558": {"paragraph_id": "p0643", "page_id": 70, "type": "list_item", "content": "- To any connecting STM when the connection to the BIU Function is established.", "bbox": {"l": 113.42, "t": 502.0270980273438, "r": 522.04912, "b": 492.12501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶559": {"paragraph_id": "p0644", "page_id": 70, "type": "list_item", "content": "- 11.1.1.4 When the service brake is commanded by an STM, the STM shall indicate in its request if  the  service  brake  shall  be  backed  up  automatically  by  the  ERTMS/ETCS  on-board with an Emergency Brake command if the service brake fails to be applied.", "bbox": {"l": 56.76, "t": 477.7870980273438, "r": 547.48528, "b": 437.40501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶560": {"paragraph_id": "p0645", "page_id": 70, "type": "list_item", "content": "- 11.1.1.4.1  Note: If it is not the case, this has to be considered as an exception to [1].", "bbox": {"l": 56.76, "t": 423.0470980273438, "r": 475.84911999999997, "b": 413.14501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶561": {"paragraph_id": "p0647", "page_id": 71, "type": "section_header", "content": "# 12. ODOMETER FUNCTION", "bbox": {"l": 56.76, "t": 749.1639780273438, "r": 286.334, "b": 733.0192708450232}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶562": {"paragraph_id": "p0648", "page_id": 71, "type": "section_header", "content": "# 12.1 General", "bbox": {"l": 56.76, "t": 713.7610980273438, "r": 169.76312000000001, "b": 701.1682264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶563": {"paragraph_id": "p0649", "page_id": 71, "type": "list_item", "content": "- 12.1.1.1 The FFFIS STM specifies the odometer information to be transmitted from ERTMS/ETCS on-board to all STMs via FFFIS STM.", "bbox": {"l": 56.76, "t": 689.1370980273438, "r": 547.1359999999996, "b": 663.9950109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶564": {"paragraph_id": "p0650", "page_id": 71, "type": "list_item", "content": "- 12.1.1.2 The  ERTMS/ETCS on-board  shall  transmit  odometer  information  via  the  FFFIS  STM interface at regular intervals. This information shall include current values of estimated distance,  direction,  estimated  speed,  confidence  interval  of  measurement  of  distance (i.e. minimum and maximum distances) and confidence interval for speed (i.e. minimum and maximum speeds).", "bbox": {"l": 56.76, "t": 649.6570980273437, "r": 547.3986399999998, "b": 578.7650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶565": {"paragraph_id": "p0651", "page_id": 71, "type": "list_item", "content": "- 12.1.1.3 Every transmitted odometer information report shall be time stamped. The time base for timestamp shall be the Reference Time obtained from the Safe Time Layer, see 5.2.2. The time in the timestamp shall be the time when the odometer data were valid.", "bbox": {"l": 56.76, "t": 564.4270980273437, "r": 547.50914, "b": 524.0450109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶566": {"paragraph_id": "p0652", "page_id": 71, "type": "list_item", "content": "- 12.1.1.3.1  Justification: this time information allows an STM to extrapolate distance and speed to fit its algorithms and processing cycles.", "bbox": {"l": 56.76, "t": 509.7070980273438, "r": 547.2353599999994, "b": 484.56501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶567": {"paragraph_id": "p0653", "page_id": 71, "type": "list_item", "content": "- 12.1.1.4 Positive  movement  direction  is  defined  as  a  movements  in  the  forward  direction  in relation  to  cab  A.  It  shall  be  indicated  with  positive  speed  and  increasing  odometer distance values.", "bbox": {"l": 56.76, "t": 470.2270980273438, "r": 547.2922399999997, "b": 429.82501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶568": {"paragraph_id": "p0654", "page_id": 71, "type": "list_item", "content": "- 12.1.1.5 Negative  movement  direction  is  defined  as  movements  in  the  backwards  direction  in relation  to  cab  A.  It  shall  be  indicated  with  negative  speed  and  decreasing  odometer distance values.", "bbox": {"l": 56.76, "t": 415.4870980273438, "r": 547.3219999999995, "b": 375.1050109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶569": {"paragraph_id": "p0655", "page_id": 71, "type": "list_item", "content": "- 12.1.1.5.1  Note:  Allocation  of  cab(s)  on  a  specific  train  is  a  pure  ERTMS/ETCS  on-board implementation issue.", "bbox": {"l": 56.76, "t": 360.7670980273438, "r": 547.48528, "b": 335.62501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶570": {"paragraph_id": "p0656", "page_id": 71, "type": "list_item", "content": "- 12.1.1.6 The ERTMS/ETCS on-board shall not reset the odometer distance values as long as the ERTMS/ETCS on-board is powered-on.", "bbox": {"l": 56.76, "t": 321.28709802734375, "r": 547.2946399999994, "b": 296.14501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶571": {"paragraph_id": "p0657", "page_id": 71, "type": "list_item", "content": "- 12.1.1.6.1  Justification: The ETCS odometer information is used as a common reference within the FFFIS STM.", "bbox": {"l": 56.76, "t": 281.8070980273437, "r": 547.3645599999996, "b": 256.63501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶572": {"paragraph_id": "p0658", "page_id": 71, "type": "list_item", "content": "- 12.1.1.7 The  ERTMS/ETCS on-board  shall  transmit  odometer  configuration  data  (see  chapter 12.4) to the STMs.", "bbox": {"l": 56.76, "t": 242.29709802734374, "r": 547.2639199999996, "b": 217.15501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶573": {"paragraph_id": "p0659", "page_id": 71, "type": "section_header", "content": "# 12.2 Speed", "bbox": {"l": 56.76, "t": 195.8810980273438, "r": 159.44312, "b": 183.28822642513387}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶574": {"paragraph_id": "p0660", "page_id": 71, "type": "list_item", "content": "- 12.2.1.1 Estimated speed, V_Est, shall be the estimated speed as used by the ERTMS/ETCS on-board (also referred as the train speed in [1]).", "bbox": {"l": 56.76, "t": 170.89709802734376, "r": 547.37176, "b": 145.51501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶575": {"paragraph_id": "p0661", "page_id": 71, "type": "list_item", "content": "- 12.2.1.2 Maximum  speed,  V_Max, is  defined  as  the  most  positive  speed,  i.e.  the  highest possible  physical  speed  including  under-reading  amount,  in  case  of  movement  in positive  direction  (V_Max  =  V_Est  +  |V_ura|).  For  movements  in  negative  direction", "bbox": {"l": 56.76, "t": 130.81709802734372, "r": 547.4516799999999, "b": 90.17501095552063}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶576": {"paragraph_id": "p0662", "page_id": 71, "type": "text", "content": "© This document has been developed and released by UNISIG", "bbox": {"l": 188.21, "t": 52.29309802734383, "r": 412.8068000000001, "b": 45.08179548590738}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶577": {"paragraph_id": "p0664", "page_id": 72, "type": "text", "content": "V_Max reports the lowest possible speed in absolute value, i.e. including over-reading amount (V_Max = V_Est + |V_ora|).", "bbox": {"l": 113.54, "t": 763.0570980273437, "r": 547.4785599999999, "b": 737.9150109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶578": {"paragraph_id": "p0665", "page_id": 72, "type": "list_item", "content": "- 12.2.1.3 Minimum  speed,  V_Min, is  defined  as  the  most  negative  speed,  i.e.  the  lowest possible physical speed including over-reading amount, in case of movement in positive direction (V_Min = V_Est - |V_ora|). For movements in negative direction V_Min reports the  highest  possible  speed  in  absolute  value,  i.e.  including  under-reading  amount (V_Min = V_Est - |V_ura|).", "bbox": {"l": 56.76, "t": 723.2170980273437, "r": 547.4478399999999, "b": 652.1150109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶579": {"paragraph_id": "p0667", "page_id": 72, "type": "caption", "content": "Figure 9 - Example of transmitted speed information", "bbox": {"l": 175.82, "t": 442.08085802734377, "r": 428.02888, "b": 433.1474533864598}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶580": {"paragraph_id": "p0668", "page_id": 72, "type": "section_header", "content": "# 12.3 Distance", "bbox": {"l": 56.76, "t": 408.91109802734377, "r": 175.88312, "b": 396.31822642513384}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶581": {"paragraph_id": "p0669", "page_id": 72, "type": "list_item", "content": "- 12.3.1.1 The estimated distance, D_Est , shall be the most probable position of the vehicle in the vehicle coordinate system at the time given in the odometer packet, with reference to the vehicle position at the last reset of the odometry.", "bbox": {"l": 56.76, "t": 383.9270980273438, "r": 547.4593599999998, "b": 343.3050109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶582": {"paragraph_id": "p0670", "page_id": 72, "type": "list_item", "content": "- 12.3.1.2 Note: For any train movement, the  most probable distance travelled between any two track positions can be computed as the difference between the measurement values of D_Est at the two positions.", "bbox": {"l": 56.76, "t": 328.9670980273438, "r": 547.2490399999997, "b": 288.5850109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶583": {"paragraph_id": "p0671", "page_id": 72, "type": "list_item", "content": "- 12.3.1.3 D_Max is defined as the most positive position of the vehicle in the vehicle coordinate system  at  the  time  given  in  the  odometer  packet,  with  all  over-  and  under-reading amounts accumulated since the last reset of the odometry.", "bbox": {"l": 56.76, "t": 273.8570980273438, "r": 547.4785599999999, "b": 233.23501095552058}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶584": {"paragraph_id": "p0672", "page_id": 72, "type": "list_item", "content": "- 12.3.1.4 D_Min is defined as the most negative position of the vehicle in the vehicle coordinate system  at  the  time  given  in  the  odometer  packet,  with  all  over-  and  under-reading amounts accumulated since the last reset of the odometry.", "bbox": {"l": 56.76, "t": 218.53709802734375, "r": 547.4785599999999, "b": 177.91501095552053}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶585": {"paragraph_id": "p0673", "page_id": 72, "type": "list_item", "content": "- 12.3.1.5 The confidence interval shall comply with the relevant requirements specified in [7].", "bbox": {"l": 56.76, "t": 163.5770980273437, "r": 522.28912, "b": 153.67501095552052}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶586": {"paragraph_id": "p0674", "page_id": 72, "type": "list_item", "content": "- 12.3.1.6 The  resolution  part  of  an  odometer  report  shall  be  given  as  a  parameter  in  each odometer report from the ETCS Odometer Function. This allows for sensor technologies with varying resolution.", "bbox": {"l": 56.76, "t": 139.3370980273438, "r": 547.3779999999997, "b": 98.93501095552062}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶587": {"paragraph_id": "p0676", "page_id": 73, "type": "list_item", "content": "- 12.3.1.7 Note: The STM can then compute the maximum and minimum travelled distances at the current  vehicle  position  p2  with  regards  to  any  reference  location  p1  by  using  the resolution  information,  maximum  and  minimum  distances  at  the  these  locations,  as follows:", "bbox": {"l": 56.76, "t": 763.0570980273437, "r": 547.2358399999996, "b": 707.4350109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶588": {"paragraph_id": "p0677", "page_id": 73, "type": "list_item", "content": "- max_distance(p1  p2) = max(D_Res(p1), D_Res(p2)) + D_Max(p2) - D_Max(p1)", "bbox": {"l": 112.94, "t": 699.5718180273437, "r": 514.00912, "b": 689.1950109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶589": {"paragraph_id": "p0678", "page_id": 73, "type": "list_item", "content": "- min_distance(p1  p2) = - max(D_Res(p1), D_Res(p2)) + D_Min(p2) - D_Min(p1)", "bbox": {"l": 112.94, "t": 678.3318180273438, "r": 511.84911999999997, "b": 667.9550109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶590": {"paragraph_id": "p0679", "page_id": 73, "type": "list_item", "content": "- 12.3.1.8 The  distance  parameters  D_Est,  D_Max  and  D_Min  are  allowed  to  wrap  when exceeding the value range. The parameters wrap individually.", "bbox": {"l": 56.76, "t": 650.6170980273438, "r": 547.3738399999996, "b": 625.4750109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶591": {"paragraph_id": "p0680", "page_id": 73, "type": "section_header", "content": "# 12.4 Configuration information", "bbox": {"l": 56.76, "t": 604.1710980273439, "r": 290.39312, "b": 591.5782264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶592": {"paragraph_id": "p0681", "page_id": 73, "type": "list_item", "content": "- 12.4.1.1 The  ERTMS/ETCS  on-board  Odometer  Function  shall  transmit  performance  related information  (configuration  data)  over  the  FFFIS  STM.  The  transmission  shall  be repeated to support restarting STMs.", "bbox": {"l": 56.76, "t": 579.5470980273437, "r": 547.3511199999996, "b": 539.1650109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶593": {"paragraph_id": "p0682", "page_id": 73, "type": "list_item", "content": "- 12.4.1.1.1  Note: The STM may use the performance-related information (e.g. ageing) to adjust its supervision, e.g. braking curves.", "bbox": {"l": 56.76, "t": 524.8270980273437, "r": 547.2819999999996, "b": 499.68501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶594": {"paragraph_id": "p0683", "page_id": 73, "type": "list_item", "content": "- 12.4.1.2 Typical  cycle  time,  T_OdoCycle is  the  typical  time  for  the  odometer  cycle  time between each generating of new odometer data.", "bbox": {"l": 56.76, "t": 227.41709802734374, "r": 547.2807199999995, "b": 202.03501095552065}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶595": {"paragraph_id": "p0684", "page_id": 73, "type": "list_item", "content": "- 12.4.1.3 Note: The actual cycle time may well exceed T_OdoCycle.", "bbox": {"l": 56.76, "t": 187.69709802734383, "r": 401.53912, "b": 177.79501095552064}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶596": {"paragraph_id": "p0685", "page_id": 73, "type": "list_item", "content": "- 12.4.1.4 Maximum  production  delay  time,  T_OdoMaxProd is  the  maximum  ageing  of odometer data from when the data was true until the data is available on the bus. This shall include clock synchronisation inaccuracy of the Odometer Function.", "bbox": {"l": 56.76, "t": 163.0970980273438, "r": 547.3640799999998, "b": 122.47501095552059}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶597": {"paragraph_id": "p0686", "page_id": 73, "type": "list_item", "content": "- 12.4.1.5 Note: The actual production delay time should not exceed T_OdoMaxProd.", "bbox": {"l": 56.76, "t": 108.11709802734379, "r": 482.08912, "b": 98.2150109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶598": {"paragraph_id": "p0688", "page_id": 73, "type": "caption", "content": "Figure 10 - Odometer cycle and delay times", "bbox": {"l": 196.85, "t": 253.99085802734385, "r": 406.99888000000004, "b": 245.05745338645988}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶599": {"paragraph_id": "p0690", "page_id": 74, "type": "section_header", "content": "# 13. DRIVER MACHINE INTERFACE FUNCTION", "bbox": {"l": 56.76, "t": 749.1639780273438, "r": 419.314, "b": 733.0192708450232}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶600": {"paragraph_id": "p0691", "page_id": 74, "type": "section_header", "content": "# 13.1 Introduction", "bbox": {"l": 56.76, "t": 713.7610980273438, "r": 199.19312, "b": 701.1682264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶601": {"paragraph_id": "p0692", "page_id": 74, "type": "list_item", "content": "- 13.1.1.1 The DMI Function allows the driver to directly interact with the ERTMS/ETCS on-board for what regards the national information related to the default window. That means that all  inputs  from  the  driver  to  the  ERTMS/ETCS  on-board  and  all  outputs  from  the ERTMS/ETCS  on-board  to  the  driver  in  the  default  window  are  controlled  by  this function.", "bbox": {"l": 56.76, "t": 689.1370980273438, "r": 547.48528, "b": 618.2750109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶602": {"paragraph_id": "p0693", "page_id": 74, "type": "list_item", "content": "- 13.1.1.2 The DMI Function shall provide the unified DMI and the customisable DMI services.", "bbox": {"l": 56.76, "t": 603.9070980273437, "r": 523.48912, "b": 594.0050109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶603": {"paragraph_id": "p0694", "page_id": 74, "type": "list_item", "content": "- 13.1.1.3 An STM designed for usage with a customisable DMI provides a set of configuration data for its default window as part of its product documentation as described in chapter 13.5.  The  ERTMS/ETCS on-board shall be configurable to store this  information  and serve  the  STM  DMI  requests  according  to  this  configuration.  The  customisable  DMI service shall be used, when configuration data for a customisable DMI layout are stored in the ERTMS/ETCS on-board for the NID_STM of the STM.", "bbox": {"l": 56.76, "t": 579.6670980273437, "r": 547.3247199999997, "b": 493.56501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶604": {"paragraph_id": "p0695", "page_id": 74, "type": "list_item", "content": "- 13.1.1.4 An STM designed to use the unified DMI provides no configuration data as part of its product documentation. The unified DMI service shall be used, when no configuration data  for  a  customisable  DMI  layout  is  stored  in  the  ERTMS/ETCS  on-board  for  the NID_STM of the STM.", "bbox": {"l": 56.76, "t": 479.2270980273438, "r": 547.4483199999999, "b": 423.58501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶605": {"paragraph_id": "p0696", "page_id": 74, "type": "list_item", "content": "- 13.1.1.5 Note: Unconfigurable parts of the DMI functions shall be handled in the same way by the unified and the customisable DMI services.", "bbox": {"l": 56.76, "t": 409.2470980273438, "r": 547.3251999999995, "b": 384.1050109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶606": {"paragraph_id": "p0697", "page_id": 74, "type": "section_header", "content": "# 13.2 General requirements regarding DMI Function", "bbox": {"l": 56.76, "t": 362.8310980273438, "r": 424.24312, "b": 350.23822642513386}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶607": {"paragraph_id": "p0698", "page_id": 74, "type": "list_item", "content": "- 13.2.1.1 The ERTMS/ETCS on-board shall only allow the active STM to communicate with the driver.", "bbox": {"l": 56.76, "t": 338.2070980273438, "r": 547.3712799999997, "b": 313.0650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶608": {"paragraph_id": "p0699", "page_id": 74, "type": "list_item", "content": "- 13.2.1.2 When the STM is no more active (see 4.1.1.3), the ERTMS/ETCS on-board shall delete all DMI objects controlled by this STM.", "bbox": {"l": 56.76, "t": 298.7270980273438, "r": 547.4459199999998, "b": 273.5850109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶609": {"paragraph_id": "p0700", "page_id": 74, "type": "list_item", "content": "- 13.2.1.3 When  the  connection  between  an  STM  and  the  DMI  Function  is  disconnected,  the ERTMS/ETCS  on-board  shall  delete  all  the  DMI  objects  controlled  by  this  STM (including preliminary requests) after a timeout of 2 seconds.", "bbox": {"l": 56.76, "t": 259.2170980273438, "r": 547.48, "b": 218.8350109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶610": {"paragraph_id": "p0701", "page_id": 74, "type": "list_item", "content": "- 13.2.1.3.1  Justification: The timeout of 2 seconds is to give the STM the chance to re-establish the connection.", "bbox": {"l": 56.76, "t": 204.49709802734378, "r": 547.4718399999998, "b": 179.35501095552058}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶611": {"paragraph_id": "p0702", "page_id": 74, "type": "list_item", "content": "- 13.2.1.4 When the  connection  between  the  active  STM  and  the  DMI  Function  is  lost  and  reestablished within the timeout of 2 seconds, the ERTMS/ETCS on-board shall delete all the  DMI  objects  controlled  by  the  STM  when  the  DMI  connection  to  the  STM  is established.", "bbox": {"l": 56.76, "t": 165.01709802734376, "r": 547.4559999999998, "b": 109.39501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶612": {"paragraph_id": "p0703", "page_id": 74, "type": "text", "content": "© This document has been developed and released by UNISIG", "bbox": {"l": 188.21, "t": 52.29309802734383, "r": 412.8068000000001, "b": 45.08179548590738}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶613": {"paragraph_id": "p0705", "page_id": 75, "type": "list_item", "content": "- 13.2.1.5 The ERTMS/ETCS on-board shall be able to receive and store preliminary request for DMI objects from an STM being in HS state and display them immediately after having received the DA state report.", "bbox": {"l": 56.76, "t": 763.0570980273437, "r": 547.4377599999999, "b": 722.6750109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶614": {"paragraph_id": "p0706", "page_id": 75, "type": "list_item", "content": "- 13.2.1.5.1  Note:  The  sending  of  preliminary  request  is  to  allow  the  DMI  Function  to  prepare  in background the information to be presented to the driver once the STM switches to DA state. Therefore, the STM should send all DMI objects that needs to be displayed after the change to DA as preliminary DMI request.", "bbox": {"l": 56.76, "t": 708.3370980273437, "r": 547.4636799999998, "b": 652.7150109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶615": {"paragraph_id": "p0707", "page_id": 75, "type": "list_item", "content": "- 13.2.1.6 When an STM reports PO, CS or FA, or is considered as failed, the ERTMS/ETCS onboard shall delete all preliminary requests for DMI objects from this STM.", "bbox": {"l": 56.76, "t": 638.3770980273438, "r": 544.3963200000001, "b": 613.2350109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶616": {"paragraph_id": "p0708", "page_id": 75, "type": "list_item", "content": "- 13.2.1.7 If  the  ETCS  train  speed  is  configured  not  to  be  displayed  for  an  STM  while  the ERTMS/ETCS on-board is in SN mode (see chapter 13.5.1.1.7), the ERTMS/ETCS onboard shall inhibit the display of the ETCS train speed only once the DA state report is received from this STM by the STM Control Function.", "bbox": {"l": 56.76, "t": 598.8670980273438, "r": 547.47376, "b": 543.2450109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶617": {"paragraph_id": "p0709", "page_id": 75, "type": "section_header", "content": "# 13.3 DMI channels", "bbox": {"l": 56.76, "t": 521.9710980273438, "r": 208.07312, "b": 509.37822642513385}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶618": {"paragraph_id": "p0710", "page_id": 75, "type": "list_item", "content": "- 13.3.1.1 The DMI Function shall be allowed to use up to four DMI channels. Each channel shall correspond to one connection.", "bbox": {"l": 56.76, "t": 497.3470980273438, "r": 547.2022399999994, "b": 472.20501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶619": {"paragraph_id": "p0711", "page_id": 75, "type": "list_item", "content": "- 13.3.1.2 At  most  one  DMI  channel  shall  be  active,  only  this  one  shall  be  used  for  the communication related to DMI objects with the DMI Function at application level.", "bbox": {"l": 56.76, "t": 457.8670980273438, "r": 547.1801599999994, "b": 432.72501095552053}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶620": {"paragraph_id": "p0712", "page_id": 75, "type": "list_item", "content": "- 13.3.1.3 Note 1: Connections corresponding to the inactive DMI channels may however remain open.", "bbox": {"l": 56.76, "t": 418.3670980273438, "r": 547.48672, "b": 393.22501095552053}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶621": {"paragraph_id": "p0713", "page_id": 75, "type": "list_item", "content": "- 13.3.1.3.1  Note  2:  The  ERTMS/ETCS  on-board  may  report  a  DMI  channel  as  active  even  if  no interaction with the driver is possible, e.g. when no cab is active.", "bbox": {"l": 56.76, "t": 378.8870980273438, "r": 547.2773599999996, "b": 353.74501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶622": {"paragraph_id": "p0714", "page_id": 75, "type": "list_item", "content": "- 13.3.1.4 At the time the active DMI channel changes, the DMI Function shall delete all the DMI objects controlled by the STM.", "bbox": {"l": 56.76, "t": 339.4070980273438, "r": 547.2022399999995, "b": 314.26501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶623": {"paragraph_id": "p0715", "page_id": 75, "type": "section_header", "content": "# 13.4 DMI Objects", "bbox": {"l": 56.76, "t": 292.9910980273437, "r": 198.83312, "b": 280.39822642513377}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶624": {"paragraph_id": "p0716", "page_id": 75, "type": "section_header", "content": "# 13.4.1 DMI object identities", "bbox": {"l": 56.76, "t": 261.8359780273438, "r": 233.66600000000003, "b": 251.07283990579685}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶625": {"paragraph_id": "p0717", "page_id": 75, "type": "list_item", "content": "- 13.4.1.1 The  DMI  objects  indicators  and  buttons  used  by  the  different  STMs  are  assigned  a unique object identity made of NID_STM and Indicator/Button Identifier.", "bbox": {"l": 56.76, "t": 239.17709802734373, "r": 547.1691199999996, "b": 214.03501095552065}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶626": {"paragraph_id": "p0718", "page_id": 75, "type": "list_item", "content": "- 13.4.1.2 The  STM  Identity  is  implicitly  provided  by  the  STM  by  its  announced  NID_STM  (and repeated in each message header according to the language).", "bbox": {"l": 56.76, "t": 199.69709802734383, "r": 547.3827999999999, "b": 174.55501095552063}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶627": {"paragraph_id": "p0719", "page_id": 75, "type": "list_item", "content": "- 13.4.1.3 The  Indicator/Button  Identifier  is  provided  by  the  STM  as  part  of  the  corresponding Indicator/Button request.", "bbox": {"l": 56.76, "t": 160.2170980273438, "r": 547.2499999999995, "b": 135.0750109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶628": {"paragraph_id": "p0720", "page_id": 75, "type": "list_item", "content": "- 13.4.1.4 The  Indicator/Button  Identifier  is  used  by  the  STM  to  be  able  to  change  the  state  of objects  and  to  move  or  remove  them.  The  Button  Identifier  is  also  used  by  the ERTMS/ETCS on-board to transmit the button events to the STM. If the customisable DMI service is used, it is also used to define the properties of the object.", "bbox": {"l": 56.76, "t": 120.73709802734379, "r": 547.3928799999998, "b": 65.09501095552059}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶629": {"paragraph_id": "p0721", "page_id": 75, "type": "text", "content": "© This document has been developed and released by UNISIG", "bbox": {"l": 188.21, "t": 52.29309802734383, "r": 412.8068000000001, "b": 45.08179548590738}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶630": {"paragraph_id": "p0723", "page_id": 76, "type": "list_item", "content": "- 13.4.1.5 All  icons  (bitmap  symbols) used by the different STMs using a customisable DMI are assigned an icon identity made of NID_STM and Icon Identifier.", "bbox": {"l": 56.76, "t": 763.0570980273437, "r": 547.1028799999998, "b": 737.9150109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶631": {"paragraph_id": "p0724", "page_id": 76, "type": "list_item", "content": "- 13.4.1.6 An  Icon Identifier can  be  provided  by the STM  as  part  of  the  corresponding Indicator/Button request.", "bbox": {"l": 56.76, "t": 723.5770980273437, "r": 547.2055999999994, "b": 698.4350109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶632": {"paragraph_id": "p0725", "page_id": 76, "type": "list_item", "content": "- 13.4.1.7 All  sounds  (wave  form  for  audible  information)  used  by  the  different  STMs  using  a customisable DMI are assigned a unique sound identity made of NID_STM and Sound Identifier.", "bbox": {"l": 56.76, "t": 684.0970980273437, "r": 547.2022399999997, "b": 643.7150109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶633": {"paragraph_id": "p0726", "page_id": 76, "type": "list_item", "content": "- 13.4.1.8 A  Sound  Identifier  can  be  provided  by  the  STM  as  part  of  the  corresponding  sound request.", "bbox": {"l": 56.76, "t": 629.3770980273438, "r": 547.4958399999998, "b": 604.2350109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶634": {"paragraph_id": "p0727", "page_id": 76, "type": "list_item", "content": "- 13.4.1.9 For specifying the position of DMI objects, Position Identifiers are used.", "bbox": {"l": 56.76, "t": 589.8670980273438, "r": 464.44912, "b": 579.9650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶635": {"paragraph_id": "p0728", "page_id": 76, "type": "list_item", "content": "- 13.4.1.10 If the unified DMI service is used, the Position Identifier specifies an area of the ETCS layout as defined in [9].", "bbox": {"l": 56.76, "t": 565.6270980273438, "r": 547.3448799999996, "b": 540.4850109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶636": {"paragraph_id": "p0729", "page_id": 76, "type": "list_item", "content": "- 13.4.1.11 If  the  customisable  DMI  service  is  used,  the  Position  Identifier  and  the  NID_STM  are used to define the position in cell coordinates and size as specified in the configuration data for this STM.", "bbox": {"l": 56.76, "t": 526.1470980273438, "r": 547.36024, "b": 485.76501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶637": {"paragraph_id": "p0730", "page_id": 76, "type": "section_header", "content": "# 13.4.2 Text messages", "bbox": {"l": 56.76, "t": 464.9259780273438, "r": 203.306, "b": 454.16283990579683}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶638": {"paragraph_id": "p0731", "page_id": 76, "type": "list_item", "content": "- 13.4.2.1 The DMI Function shall display a text message when requested by the STM. The text message request shall consist of a Text Identifier, a string of text to be shown to the driver, a display attribute and a possible request for driver acknowledgement.", "bbox": {"l": 56.76, "t": 442.2670980273438, "r": 547.34728, "b": 401.8650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶639": {"paragraph_id": "p0732", "page_id": 76, "type": "list_item", "content": "- 13.4.2.2 The  DMI  Function  shall  report  to  the  STM  the  acknowledgement  of  text  messages (which were required to be acknowledged) from the driver referencing the corresponding Text Identifier.", "bbox": {"l": 56.76, "t": 387.5270980273438, "r": 547.4324799999998, "b": 347.14501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶640": {"paragraph_id": "p0733", "page_id": 76, "type": "list_item", "content": "- 13.4.2.3 The DMI Function shall delete a text message when requested by the active STM. The request shall reference the Text Identifier of the text message to be deleted.", "bbox": {"l": 56.76, "t": 332.8070980273438, "r": 547.1700799999995, "b": 307.66501095552053}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶641": {"paragraph_id": "p0734", "page_id": 76, "type": "list_item", "content": "- 13.4.2.3.1  Note: The acknowledgement does not lead to the end of the display of a text message.", "bbox": {"l": 56.76, "t": 293.3270980273438, "r": 540.90912, "b": 283.4250109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶642": {"paragraph_id": "p0735", "page_id": 76, "type": "list_item", "content": "- 13.4.2.4 If the STM requests a text message with the same Text Identifier as a not yet deleted text  message, the ERTMS/ETCS on-board shall delete the original text message and display the new requested text message.", "bbox": {"l": 56.76, "t": 269.0570980273437, "r": 547.4276799999997, "b": 228.67501095552052}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶643": {"paragraph_id": "p0736", "page_id": 76, "type": "list_item", "content": "- 13.4.2.5 The display attribute specifies the colour of the text, its background colour, the flashing mode and the group of text messages.", "bbox": {"l": 56.76, "t": 214.3370980273438, "r": 547.0918399999993, "b": 189.19501095552062}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶644": {"paragraph_id": "p0737", "page_id": 76, "type": "list_item", "content": "- 13.4.2.6 The  flashing mode  specifies  if the slow, fast or no  flashing and  if  normal  or counterphase flashing shall be used.", "bbox": {"l": 56.76, "t": 174.8570980273438, "r": 547.39744, "b": 149.7150109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶645": {"paragraph_id": "p0738", "page_id": 76, "type": "section_header", "content": "# 13.4.3 Indicators", "bbox": {"l": 56.76, "t": 128.87597802734376, "r": 174.35600000000002, "b": 118.11283990579682}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶646": {"paragraph_id": "p0739", "page_id": 76, "type": "list_item", "content": "- 13.4.3.1 An Indicator is a DMI object for display of information without input.", "bbox": {"l": 56.76, "t": 106.19709802734383, "r": 446.56912, "b": 96.29501095552064}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶647": {"paragraph_id": "p0740", "page_id": 76, "type": "list_item", "content": "- 13.4.3.2 The STM shall request the display of an Indicator by means of the following definition:", "bbox": {"l": 56.76, "t": 81.95709802734382, "r": 535.00912, "b": 72.05501095552063},
