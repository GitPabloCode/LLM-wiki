 initialised, tested (if required), configured and is  in  possession  of  all  required  information  for  operating,  but  is  not  able  to  receive  a message from the trackside, because the reception is turned off.", "bbox": {"l": 56.76, "t": 244.0970980273438, "r": 547.4492799999998, "b": 203.7150109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶271": {"paragraph_id": "p0328", "page_id": 47, "type": "list_item", "content": "- 8.5.1.1.1 Exception: Specific NTC Data could be invalid, see 10.7.3.3.", "bbox": {"l": 56.76, "t": 189.37709802734378, "r": 411.01912, "b": 179.4750109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶272": {"paragraph_id": "p0329", "page_id": 47, "type": "section_header", "content": "# 8.6 Hot Standby (HS)", "bbox": {"l": 56.76, "t": 158.20109802734373, "r": 232.19312, "b": 145.6082264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶273": {"paragraph_id": "p0330", "page_id": 47, "type": "list_item", "content": "- 8.6.1.1 Being in the state HS, the STM shall be able to process the information from or to the national trackside.", "bbox": {"l": 56.76, "t": 133.57709802734382, "r": 547.1503999999996, "b": 108.43501095552062}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶274": {"paragraph_id": "p0331", "page_id": 47, "type": "text", "content": "© This document has been developed and released by UNISIG", "bbox": {"l": 188.21, "t": 52.29309802734383, "r": 412.8068000000001, "b": 45.08179548590738}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶275": {"paragraph_id": "p0333", "page_id": 48, "type": "list_item", "content": "- 8.6.1.1.1 Note:  In  HS  state,  when  receiving  national  trackside  information,  the  STM  treats  this information  to  be  prepared  to  take  charge  of  the  train  movement  supervision  once  it switches to Data Available state.", "bbox": {"l": 56.76, "t": 763.0570980273437, "r": 547.4550399999998, "b": 722.6750109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶276": {"paragraph_id": "p0334", "page_id": 48, "type": "list_item", "content": "- 8.6.1.2 The  STM  in  HS  state  shall  have  the  possibility  to  send  an  'STM  max  speed' (V_STMMAX) to the ERTMS/ETCS on-board through the STM Control Function.", "bbox": {"l": 56.76, "t": 708.3370980273437, "r": 547.2773599999996, "b": 683.1950109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶277": {"paragraph_id": "p0335", "page_id": 48, "type": "list_item", "content": "- 8.6.1.2.1 Note: This 'STM max speed' is to allow the STM, for national reasons unknown to the ERTMS/ETCS on-board or ETCS Trackside, to request a given train speed at the level transition border in order to have a smooth transition.", "bbox": {"l": 56.76, "t": 668.8570980273438, "r": 547.45312, "b": 628.4750109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶278": {"paragraph_id": "p0336", "page_id": 48, "type": "list_item", "content": "- 8.6.1.3 The STM in HS shall have the possibility to send an 'STM system speed' (V_STMSYS) together with an 'STM system distance' (D_STMSYS) to the ERTMS/ETCS on-board through the STM Control Function.", "bbox": {"l": 56.76, "t": 614.1370980273438, "r": 547.48528, "b": 573.7250109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶279": {"paragraph_id": "p0337", "page_id": 48, "type": "list_item", "content": "- 8.6.1.3.1 Note:  This  'STM  system  speed'  together  with  the  'STM  system  distance'  is  sent  to allow  the  STM,  to  request  a  given  train  speed  at  a  given  position  ('STM  system distance')  before  the  level  transition  border  in  order  to  be  able  to  detect  its  national trackside.", "bbox": {"l": 56.76, "t": 559.3870980273438, "r": 547.5206400000001, "b": 503.76501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶280": {"paragraph_id": "p0338", "page_id": 48, "type": "list_item", "content": "- 8.6.1.4 When an STM in HS state receives an order to go in CS state, the STM shall have the possibility to close any connection except with STM Control Function.", "bbox": {"l": 56.76, "t": 489.4270980273438, "r": 547.4545599999999, "b": 464.28501095552053}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶281": {"paragraph_id": "p0339", "page_id": 48, "type": "section_header", "content": "# 8.7 Data Available (DA)", "bbox": {"l": 56.76, "t": 442.99109802734375, "r": 246.11312, "b": 430.3982264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶282": {"paragraph_id": "p0340", "page_id": 48, "type": "list_item", "content": "- 8.7.1.1 In DA state, an STM is responsible for the train movement supervision, according to the received national trackside information.", "bbox": {"l": 56.76, "t": 418.3670980273438, "r": 547.1028799999995, "b": 393.22501095552053}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶283": {"paragraph_id": "p0341", "page_id": 48, "type": "list_item", "content": "- 8.7.1.2 When an STM in DA state receives an order to go in CS state, the STM shall have the possibility to close any connection except with STM Control Function.", "bbox": {"l": 56.76, "t": 378.8870980273438, "r": 547.4545599999999, "b": 353.74501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶284": {"paragraph_id": "p0342", "page_id": 48, "type": "section_header", "content": "# 8.8 Failure (FA)", "bbox": {"l": 56.76, "t": 332.47109802734377, "r": 195.11312, "b": 319.8782264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶285": {"paragraph_id": "p0343", "page_id": 48, "type": "list_item", "content": "- 8.8.1.1 Being in this state, the STM is not able to work any more, due to internal or external reasons.", "bbox": {"l": 56.76, "t": 307.8470980273438, "r": 547.0918399999996, "b": 282.7050109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶286": {"paragraph_id": "p0344", "page_id": 48, "type": "list_item", "content": "- 8.8.1.2 Being in this state, the STM shall not send messages any more on the bus except to report this state to the ERTMS/ETCS on-board functions.", "bbox": {"l": 56.76, "t": 268.3370980273438, "r": 547.3047199999996, "b": 243.19501095552062}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶287": {"paragraph_id": "p0345", "page_id": 48, "type": "text", "content": "© This document has been developed and released by UNISIG", "bbox": {"l": 188.21, "t": 52.29309802734383, "r": 412.8068000000001, "b": 45.08179548590738}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶288": {"paragraph_id": "p0347", "page_id": 49, "type": "section_header", "content": "# 9. STM MANAGER SYSTEM - REQUIREMENTS ON STM", "bbox": {"l": 56.76, "t": 749.1639780273438, "r": 509.824, "b": 733.0192708450232}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶289": {"paragraph_id": "p0348", "page_id": 49, "type": "section_header", "content": "# 9.1 Scope", "bbox": {"l": 56.76, "t": 713.7610980273438, "r": 159.44312, "b": 701.1682264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶290": {"paragraph_id": "p0349", "page_id": 49, "type": "list_item", "content": "- 9.1.1.1 The scope of this chapter is to define how the STM handles its state.", "bbox": {"l": 56.76, "t": 689.1370980273438, "r": 451.60912, "b": 679.2350109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶291": {"paragraph_id": "p0350", "page_id": 49, "type": "section_header", "content": "# 9.2 STM States transitions table", "bbox": {"l": 56.76, "t": 657.9610980273438, "r": 305.77312, "b": 645.3682264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶292": {"paragraph_id": "p0351", "page_id": 49, "type": "list_item", "content": "- 9.2.1.1 Transitions table for STM", "bbox": {"l": 56.76, "t": 633.3370980273437, "r": 240.11912, "b": 623.4350109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶293": {"paragraph_id": "p0352", "page_id": 49, "type": "list_item", "content": "- 9.2.1.2 Transitions conditions table", "bbox": {"l": 56.76, "t": 375.1670980273438, "r": 250.31912, "b": 365.26501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶294": {"paragraph_id": "p0353", "page_id": 49, "type": "list_item", "content": "- 9.2.1.2.1 Note:  This  table  only  contains  the  event(s)  that  triggers  the  transition.  It  does  not describe the reasons why this(these) event(s) happens. ETCS orders referred to below are described in chapter 10.3.2.", "bbox": {"l": 56.76, "t": 350.9270980273438, "r": 547.4079999999997, "b": 310.54501095552064}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶295": {"paragraph_id": "p0354", "page_id": 49, "type": "table", "content": "| NP   | < 15      | < 15      | < 15      | < 15      | < 15      | < 15      | < 15   |\n|------|-----------|-----------|-----------|-----------|-----------|-----------|--------|\n| 1 >  | PO        |           |           |           |           |           |        |\n|      | 2 >       | CO        |           |           |           |           |        |\n|      |           | 3 >       | DE        |           |           |           |        |\n|      |           | 4a >      | 4a >      | CS        | < 4a      | < 4a < 4b |        |\n|      |           |           |           | 6 >       | HS        |           |        |\n|      |           |           |           | 9 >       | 9 >       | DA        |        |\n|      | 16 > 17 > | 16 > 17 > | 16 > 17 > | 16 > 17 > | 16 > 17 > | 16 > 17 > | FA     |", "bbox": {"l": 111.8420181274414, "t": 618.5101776123047, "r": 501.6552429199219, "b": 383.5959777832031}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶296": {"paragraph_id": "p0355", "page_id": 49, "type": "table", "content": "| Condition Id   | Content of the conditions                                                                                              |\n|----------------|------------------------------------------------------------------------------------------------------------------------|\n| 1              | STM is powered on                                                                                                      |\n| 2              | ETCS order 'Configuration'                                                                                             |\n| 3              | ETCS order 'Data Entry'                                                                                                |\n| 4a             | ETCS unconditional order 'Cold Standby'                                                                                |\n| 4b             | (ETCS conditional order 'Cold Standby' has been received) AND (STM does not or no more report National Trip Procedure) |\n| 5              | intentionally deleted                                                                                                  |\n| 6              | ETCS order 'Hot Standby'                                                                                               |\n| 7              | intentionally deleted                                                                                                  |\n| 8              | intentionally deleted                                                                                                  |\n| 9              | ETCS order 'Data Available'                                                                                            |", "bbox": {"l": 51.845638275146484, "t": 305.33465576171875, "r": 539.2261352539062, "b": 65.99359130859375}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶297": {"paragraph_id": "p0358", "page_id": 50, "type": "table", "content": "|   Condition Id | Content of the conditions                |\n|----------------|------------------------------------------|\n|             10 | intentionally deleted                    |\n|             11 | intentionally deleted                    |\n|             12 | intentionally deleted                    |\n|             13 | intentionally deleted                    |\n|             14 | intentionally deleted                    |\n|             15 | STM is powered off                       |\n|             16 | ETCS order 'Failure'                     |\n|             17 | The STM decides itself to go in FA state |", "bbox": {"l": 51.9924430847168, "t": 766.0722045898438, "r": 539.381591796875, "b": 579.3362121582031}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶298": {"paragraph_id": "p0359", "page_id": 50, "type": "list_item", "content": "- 9.2.1.3 Note: As long as an STM in DA state is in a National Trip Procedure in SN mode, the STM  sends  cyclically  the  'National  Trip  Procedure'  information  to  the  STM  Control Function in order to fulfil the timeout requirements defined in 10.3.2.4 (transitions E16 and F16). If the mode changes to TR, the STM is expected to enter CS state even if its National  Trip  Procedure  is  not  finished,  as  the  Trip  procedure  is  handed  over  by ERTMS/ETCS  on-board  (otherwise,  the  STM  would  be  ordered  to  FA  state  through transition Q16 once the TR mode is exited).", "bbox": {"l": 56.76, "t": 571.6270980273438, "r": 547.47136, "b": 470.28501095552053}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶299": {"paragraph_id": "p0360", "page_id": 50, "type": "section_header", "content": "# 9.3 General STM requirements", "bbox": {"l": 56.76, "t": 449.0110980273438, "r": 296.39312, "b": 436.41822642513387}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶300": {"paragraph_id": "p0361", "page_id": 50, "type": "list_item", "content": "- 9.3.1.1 The STM antenna shall not energise trackside equipment, and shall not read trackside data, and shall not transmit data to trackside, except:", "bbox": {"l": 56.76, "t": 424.3670980273438, "r": 547.1801599999992, "b": 399.22501095552053}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶301": {"paragraph_id": "p0362", "page_id": 50, "type": "list_item", "content": "- in HS or DA state,", "bbox": {"l": 113.42, "t": 387.8870980273438, "r": 219.11912, "b": 377.9850109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶302": {"paragraph_id": "p0363", "page_id": 50, "type": "list_item", "content": "- for test purpose.", "bbox": {"l": 113.42, "t": 366.6470980273438, "r": 207.66416, "b": 356.74501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶303": {"paragraph_id": "p0364", "page_id": 50, "type": "list_item", "content": "- 9.3.1.2 If the STM receives from the ERTMS/ETCS on-board a state transition order, which is not allowed by the state transition table (9.2.1.2), then the STM shall go in FA state.", "bbox": {"l": 56.76, "t": 342.4070980273438, "r": 547.3659999999995, "b": 317.26501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶304": {"paragraph_id": "p0365", "page_id": 50, "type": "list_item", "content": "- 9.3.1.3 The STM  shall report its NID_STM  on  all point-to-point connections with the ERTMS/ETCS on-board:", "bbox": {"l": 56.76, "t": 302.92709802734385, "r": 547.4067999999997, "b": 277.78501095552053}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶305": {"paragraph_id": "p0367", "page_id": 50, "type": "list_item", "content": "- with each transmitted application message from the STM to the ERTMS/ETCS onboard function or DMI channel.", "bbox": {"l": 113.42, "t": 245.17709802734373, "r": 544.3963200000001, "b": 220.03501095552065}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶306": {"paragraph_id": "p0368", "page_id": 50, "type": "list_item", "content": "- 9.3.1.4 The  STM  shall  report  its  current  state  on  all  point-to-point  connections  with  the ERTMS/ETCS on-board:", "bbox": {"l": 56.76, "t": 205.69709802734383, "r": 547.50912, "b": 180.55501095552063}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶307": {"paragraph_id": "p0370", "page_id": 50, "type": "list_item", "content": "- with each transmitted application message from the STM to the ERTMS/ETCS onboard function or DMI channel, and", "bbox": {"l": 113.42, "t": 147.9770980273438, "r": 544.3963200000001, "b": 122.8350109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶308": {"paragraph_id": "p0371", "page_id": 50, "type": "list_item", "content": "-  whenever  the  STM  state  is  changed,  while  the  connection  to  the  respective ERTMS/ETCS on-board function or DMI channel is established.", "bbox": {"l": 113.42, "t": 111.4770980273438, "r": 547.3512799999995, "b": 86.3350109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶309": {"paragraph_id": "p0372", "page_id": 50, "type": "text", "content": "© This document has been developed and released by UNISIG", "bbox": {"l": 188.21, "t": 52.29309802734383, "r": 412.8068000000001, "b": 45.08179548590738}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶310": {"paragraph_id": "p0374", "page_id": 51, "type": "list_item", "content": "- 9.3.1.4.1 Exception: The FA state shall be reported if possible. Due to a failure of the STM itself it may not be possible to report the FA state.", "bbox": {"l": 56.76, "t": 763.0570980273437, "r": 547.0255999999996, "b": 737.9150109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶311": {"paragraph_id": "p0376", "page_id": 52, "type": "section_header", "content": "# 10. STM CONTROL FUNCTION", "bbox": {"l": 56.76, "t": 749.1639780273438, "r": 315.994, "b": 733.0192708450232}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶312": {"paragraph_id": "p0377", "page_id": 52, "type": "section_header", "content": "# 10.1 General requirements", "bbox": {"l": 56.76, "t": 713.7610980273438, "r": 262.67312, "b": 701.1682264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶313": {"paragraph_id": "p0378", "page_id": 52, "type": "list_item", "content": "- 10.1.1.1 It  shall  be possible to configure the ERTMS/ETCS on-board equipment with the list of STMs installed on-board.", "bbox": {"l": 56.76, "t": 689.1370980273438, "r": 547.3506399999998, "b": 663.9950109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶314": {"paragraph_id": "p0379", "page_id": 52, "type": "list_item", "content": "- 10.1.1.2 The STM Control Function shall maintain a list of 'available' STMs, which includes all STMs  that  have  an  established  connection  to  the  STM  Control  Function  and  report either CS, HS or DA state.", "bbox": {"l": 56.76, "t": 649.6570980273437, "r": 547.4588800000001, "b": 609.2750109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶315": {"paragraph_id": "p0380", "page_id": 52, "type": "list_item", "content": "- 10.1.1.3 Level  NTC  X  shall  be  considered  as  'Available  for  use'  for  level  transition  (see  [1] paragraph 5.10.2.4.1) if the STM X associated to this level is available.", "bbox": {"l": 56.76, "t": 594.9070980273437, "r": 547.50912, "b": 569.7650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶316": {"paragraph_id": "p0381", "page_id": 52, "type": "list_item", "content": "- 10.1.1.4 The STM Control Function shall send to the STM the following information when the connection to the STM is established:", "bbox": {"l": 56.76, "t": 555.4270980273437, "r": 547.1801599999995, "b": 530.2850109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶317": {"paragraph_id": "p0382", "page_id": 52, "type": "list_item", "content": "- The ERTMS/ETCS on-board functions that are available", "bbox": {"l": 113.42, "t": 518.9470980273438, "r": 405.49912, "b": 509.0450109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶318": {"paragraph_id": "p0383", "page_id": 52, "type": "list_item", "content": "- The ETCS bus address of all available ERTMS/ETCS on-board functions", "bbox": {"l": 113.42, "t": 497.7070980273438, "r": 487.12912, "b": 487.8050109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶319": {"paragraph_id": "p0384", "page_id": 52, "type": "list_item", "content": "-  The safety level of all available ERTMS/ETCS on-board functions (see 6.2)", "bbox": {"l": 113.42, "t": 476.4670980273438, "r": 496.36912, "b": 466.56501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶320": {"paragraph_id": "p0385", "page_id": 52, "type": "list_item", "content": "- 10.1.1.4.1  Note: Only Juridical Data and DMI channels 2, 3 & 4 can be marked as not available.", "bbox": {"l": 56.76, "t": 452.2270980273438, "r": 530.68912, "b": 442.32501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶321": {"paragraph_id": "p0386", "page_id": 52, "type": "list_item", "content": "- 10.1.1.5 The STM Control Function shall inform the STM about the active DMI channel", "bbox": {"l": 56.76, "t": 427.9670980273438, "r": 496.24912, "b": 418.06501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶322": {"paragraph_id": "p0387", "page_id": 52, "type": "list_item", "content": "- whenever the active DMI channel changes,", "bbox": {"l": 113.42, "t": 406.7270980273438, "r": 341.29912, "b": 396.82501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶323": {"paragraph_id": "p0388", "page_id": 52, "type": "list_item", "content": "- whenever the connection to STM Control Function is established.", "bbox": {"l": 113.42, "t": 385.4870980273438, "r": 448.72912, "b": 375.58501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶324": {"paragraph_id": "p0389", "page_id": 52, "type": "section_header", "content": "# 10.2 Association of STM X to Level NTC X", "bbox": {"l": 56.76, "t": 354.31109802734375, "r": 363.61312, "b": 341.7182264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶325": {"paragraph_id": "p0390", "page_id": 52, "type": "list_item", "content": "- 10.2.1.1 The ERTMS/ETCS on-board shall be configurable with a look-up table that gives the correspondence  between  NID_NTC  values  and  the  NID_STM  values  of  the  STM(s) fitted  on-board.  For  each  NID_NTC  value  within  this  look-up  table,  a  list  of  one  or several NID_STM values shall be configured, with a priority order.", "bbox": {"l": 56.76, "t": 329.68709802734384, "r": 547.3969599999997, "b": 274.0650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶326": {"paragraph_id": "p0391", "page_id": 52, "type": "list_item", "content": "- 10.2.1.1.1  Note: A National System can cover the functionalities of other National Systems having their  own  NID_NTC  values.  For  that  case,  the  look-up  table  is  needed  to  map  the NID_NTC  values  corresponding  to  these  encapsulated  National  Systems  to  the NID_STM value(s) of the STM(s) fitted on-board supporting them. But an entry in the look-up  table  is  not  needed  for  the  case  there  is  a  one-to-one  relation  between NID_NTC value and NID_STM value.", "bbox": {"l": 56.76, "t": 259.6970980273438, "r": 547.4886399999998, "b": 173.5950109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶327": {"paragraph_id": "p0392", "page_id": 52, "type": "list_item", "content": "- 10.2.1.1.2  Throughout this document, 'STM X' stands for 'STM associated to Level NTC X'. This STM is not necessarily fitted on-board.", "bbox": {"l": 56.76, "t": 159.25709802734377, "r": 547.5047999999999, "b": 134.11501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶328": {"paragraph_id": "p0393", "page_id": 52, "type": "list_item", "content": "- 10.2.1.2 If  Level  NTC  X  (defined  by  its  NID_NTC)  is  not  already  associated  to  an  STM,  the ERTMS/ETCS on-board shall associate this Level NTC X to STM X as follows:", "bbox": {"l": 56.76, "t": 119.77709802734375, "r": 547.0587199999994, "b": 94.61501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶329": {"paragraph_id": "p0394", "page_id": 52, "type": "list_item", "content": "- When a level transition order to Level NTC X is accepted,", "bbox": {"l": 113.42, "t": 83.27709802734375, "r": 411.61912, "b": 73.37501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶330": {"paragraph_id": "p0395", "page_id": 52, "type": "text", "content": "© This document has been developed and released by UNISIG", "bbox": {"l": 188.21, "t": 52.29309802734383, "r": 412.8068000000001, "b": 45.08179548590738}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶331": {"paragraph_id": "p0397", "page_id": 53, "type": "text", "content": "the STM X shall be the STM which NID_STM is equal to NID_NTC, if the level transition  order  is  received  from  a  trackside  constituent  with  ETCS  system version  strictly  lower  than  2.0  or  if  the  look-up  table  does  not  contain  the NID_NTC value of Level NTC X.", "bbox": {"l": 145.58, "t": 763.0570980273437, "r": 547.4010399999999, "b": 707.4350109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶332": {"paragraph_id": "p0398", "page_id": 53, "type": "text", "content": "Otherwise  the  STM  X  shall  be  the  STM  having  the  highest  priority  among  the available STMs linked to the NID_NTC value in the look-up table. If there is no available STM linked to this NID_NTC value, the STM X shall be the STM having the highest priority among the STMs linked to this NID_NTC value.", "bbox": {"l": 145.58, "t": 699.0970980273437, "r": 547.3825599999998, "b": 643.4750109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶333": {"paragraph_id": "p0399", "page_id": 53, "type": "list_item", "content": "- When the ERTMS/ETCS on-board receives airgap data to be transmitted to an STM with the NID_NTC value of Level NTC X, the STM X shall be associated as for the level transition.", "bbox": {"l": 113.42, "t": 632.1370980273438, "r": 547.2327199999996, "b": 591.7250109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶334": {"paragraph_id": "p0400", "page_id": 53, "type": "list_item", "content": "-  When the Level NTC X is selected/validated by driver,", "bbox": {"l": 113.42, "t": 580.3870980273438, "r": 394.69912, "b": 570.4850109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶335": {"paragraph_id": "p0401", "page_id": 53, "type": "text", "content": "the STM X shall be the STM which NID_STM is equal to NID_NTC, if the look-up table does not contain the NID_NTC value of Level NTC X.", "bbox": {"l": 145.58, "t": 562.1470980273438, "r": 547.4892, "b": 537.0050109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶336": {"paragraph_id": "p0402", "page_id": 53, "type": "text", "content": "Otherwise,  the  STM  X  shall  be  the  STM  having  the  highest  priority  among  the available STMs linked to this NID_NTC value in the look-up table. If there is no available STM linked to this NID_NTC value, then the STM X shall be the STM having the highest priority  among the connected STMs linked to this NID_NTC value and that are not considered as failed or seen as isolated. Otherwise, the STM X shall be the STM having the highest priority among the STMs linked to this NID_NTC value.", "bbox": {"l": 145.58, "t": 528.6670980273437, "r": 547.4857599999999, "b": 427.3050109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶337": {"paragraph_id": "p0403", "page_id": 53, "type": "list_item", "content": "- 10.2.1.3 The association between a Level NTC X and an STM X shall be kept until the Level NTC X is left  after  having  been  entered,  or  until  the  Stand-By  or  No  Power  mode  is entered.", "bbox": {"l": 56.76, "t": 412.9670980273438, "r": 547.4147199999999, "b": 372.58501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶338": {"paragraph_id": "p0404", "page_id": 53, "type": "list_item", "content": "- 10.2.1.3.1  Note: If STM X associated to the current Level NTC X is no more available, it remains associated to Level NTC X until one of these conditions is fulfilled, even if another STM supporting NTC X is available. This avoids that there is a change of active STM that is neither due to a level transition from trackside, nor due to a driver level selection/validation.", "bbox": {"l": 56.76, "t": 358.2470980273438, "r": 547.2738399999996, "b": 287.38501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶339": {"paragraph_id": "p0405", "page_id": 53, "type": "section_header", "content": "# 10.3 STM MANAGER SYSTEM", "bbox": {"l": 56.76, "t": 266.08109802734384, "r": 284.75312, "b": 253.48822642513392}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶340": {"paragraph_id": "p0406", "page_id": 53, "type": "section_header", "content": "# 10.3.1 Scope", "bbox": {"l": 56.76, "t": 234.9559780273438, "r": 152.996, "b": 224.19283990579686}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶341": {"paragraph_id": "p0407", "page_id": 53, "type": "list_item", "content": "- 10.3.1.1 The present chapter does not specify the whole STM Control Function, but only the part of the STM Control Function that manages the states of the connected STM(s).", "bbox": {"l": 56.76, "t": 212.29709802734374, "r": 547.47904, "b": 187.15501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶342": {"paragraph_id": "p0408", "page_id": 53, "type": "section_header", "content": "# 10.3.2 State transition orders", "bbox": {"l": 56.76, "t": 166.31597802734382, "r": 245.186, "b": 155.55283990579687}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶343": {"paragraph_id": "p0409", "page_id": 53, "type": "list_item", "content": "- 10.3.2.1 The STM Control Function STM state order table is a table that lists all the events that lead to a state order given by the STM Control Function to the STM.", "bbox": {"l": 56.76, "t": 143.65709802734375, "r": 547.1359999999993, "b": 118.51501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶344": {"paragraph_id": "p0412", "page_id": 54, "type": "section_header", "content": "# 10.3.2.2 STM state order table (ERTMS/ETCS on-board STM Control Function)", "bbox": {"l": 56.76, "t": 757.0570980273437, "r": 461.92912, "b": 747.1550109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶345": {"paragraph_id": "p0413", "page_id": 54, "type": "table", "content": "| NP         | < A15                                           | < A15                                           | < A15                                           | < A15                                                 | < A15                                                 | < A15                                                 | < A15   |\n|------------|-------------------------------------------------|-------------------------------------------------|-------------------------------------------------|-------------------------------------------------------|-------------------------------------------------------|-------------------------------------------------------|---------|\n| A1 >       | PO                                              | < A1                                            | < A1                                            | < A1                                                  | < A1                                                  | < A1                                                  | < A1    |\n|            | A2 >                                            | CO                                              |                                                 |                                                       |                                                       |                                                       |         |\n|            |                                                 | A3 >                                            | DE                                              |                                                       |                                                       |                                                       |         |\n|            |                                                 | A4a >                                           | A4a >                                           | CS                                                    | < C4a < E4a < G4a < H4a < I4a < J4a                   | < B4a < B4b < I4a < A4b < E4a < K4a < L4a             |         |\n|            |                                                 |                                                 |                                                 | A6 > B6 >                                             | HS                                                    |                                                       |         |\n|            |                                                 |                                                 |                                                 | A9>                                                   | A9 >                                                  | DA                                                    |         |\n| A17 > B16> | A16 > B16 > C16 > H16 > I16 > L16 > P16 > A17 > | A16 > B16 > C16 > H16 > I16 > O16 > P16 > A17 > | A16 > B16 > C16 > H16 > I16 > O16 > P16 > A17 > | A16 > B16 > C16 > D16 > H16 > N16 > O16 > P16 > A17 > | A16 > B16 > C16 > D16 > H16 > N16 > O16 > P16 > A17 > | A16 > B16 > C16 > E16 > F16 > H16 > N16 > O16 > P16 > | FA      |", "bbox": {"l": 104.47867584228516, "t": 742.9372711181641, "r": 495.40997314453125, "b": 270.04541015625}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶346": {"paragraph_id": "p0414", "page_id": 54, "type": "list_item", "content": "- 10.3.2.3 The state indicated in table 10.3.2.2 corresponds to the last state report received from the STM or to FA state if an FA state order has been sent since the reception of the last state report. The STM Control Function shall consider the STM to be in NP when it has not received any state report from the STM.", "bbox": {"l": 56.76, "t": 261.9770980273438, "r": 547.4531200000001, "b": 206.35501095552058}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶347": {"paragraph_id": "p0415", "page_id": 54, "type": "list_item", "content": "- 10.3.2.4 STM  state  order  conditions  table  applicable  to  STM  X,  associated  to  Level  NTC  X (ERTMS/ETCS on-board STM Control Function)", "bbox": {"l": 56.76, "t": 192.01709802734376, "r": 547.2951199999997, "b": 166.87501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶348": {"paragraph_id": "p0416", "page_id": 54, "type": "table", "content": "| Condition Id   | Content of the conditions                                                 |\n|----------------|---------------------------------------------------------------------------|\n| A1             | (STM X connects to the STM Control Function) AND (STM X reports PO state) |\n| A2             | ('Request CO state' received from STM X)                                  |", "bbox": {"l": 51.761070251464844, "t": 162.0953369140625, "r": 539.4419555664062, "b": 75.77789306640625}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶349": {"paragraph_id": "p0417", "page_id": 54, "type": "text", "content": "© This document has been developed and released by UNISIG", "bbox": {"l": 188.21, "t": 52.29309802734383, "r": 412.8068000000001, "b": 45.08179548590738}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶350": {"paragraph_id": "p0419", "page_id": 55, "type": "table", "content": "| Condition Id   | Content of the conditions                                                                                                                                                                                                                              |\n|----------------|--------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|\n| A3             | ('Request DE state' received from STM X) AND (ETCS Train Data is validated)                                                                                                                                                                            |\n| A4a            | ('Request CS state' received from STM X)                                                                                                                                                                                                               |\n| B4a            | (ERTMS/ETCS on-board performs a level transition ordered by the trackside from Level NTC X to Level 0, 1, 2, 3)                                                                                                                                        |\n| C4a            | (announcement for a transition to Level NTC X is stored) AND (STM X reports HS state) AND (a level transition order to Level NTC Y is received before the transition to Level NTC X) AND (STM X is different from the STM Y associated to Level NTC Y) |\n| B4b            | (The driver manually changes the level from Level NTC X to Level NTC Y) AND (STM X is different from the STM Y associated to Level NTC Y)                                                                                                              |\n| E4a            | (ETCS mode changes to SB)                                                                                                                                                                                                                              |\n| G4a            | (STM X reports 'HS state') AND (no transition to any level associated to STM X for further location is stored on-board) AND (Override function is not active) AND (ETCS level is different from any level associated to STM X)                         |\n| H4a            | (ETCS mode is SB) AND (No cab is active)                                                                                                                                                                                                               |\n| I4a            | (ETCS mode changes to SH)                                                                                                                                                                                                                              |\n| J4a            | (announcement for a transition to Level NTC X is stored) AND (STM X reports HS state) AND (a level transition order to Level 0, 1, 2 or 3 is received before the transition to Level NTC X)                                                            |\n| K4a            | (The driver manually changes the level from Level NTC X to Level 0, 1, 2 or 3)                                                                                                                                                                         |\n| L4a            | (ETCS mode changes to TR)                                                                                                                                                                                                                              |\n| A4b            | (ERTMS/ETCS on-board performs a transition ordered by the trackside from Level NTC X to Level NTC Y) AND (STM X is different from the STM Y associated to Level NTC Y)                                                                                 |\n| A6             | (A transition to Level NTC X for a further location is stored on-board) AND (STM X reports CS state) AND (no other STM reports HS state)                                                                                                               |\n| B6             | (ETCS mode is SB) AND (Cab is active) AND (valid level of the ERTMS/ETCS on-board is Level NTC X) AND (STM X reports CS state) AND (no other STM reports HS state)                                                                                     |\n| A9             | (level of the ERTMS/ETCS on-board is Level NTC X) AND (STM X reports CS or HS state) AND (no other STM reports DA state) AND (ETCS mode is SN, SL or NL)                                                                                               |\n| A15            | (the ERTMS/ETCS on-board equipment is NOT powered)                                                                                                                                                                                                     |\n| A16            | (the STM Control Function receives from STM X a state request which is not allowed by the state transition table)                                                                                                                                      |\n| B16            | (STM X reports a state it must not be in according to table 9.2.1.1)                                                                                                                                                                                   |\n| C16            | (the STM Control Function has sent a state transition order except 'DA state transition order' and except 'conditional CS state transition order') AND (STM X does not report the required state within a maximum delay time of 10 seconds)            |", "bbox": {"l": 51.869468688964844, "t": 766.0984497070312, "r": 539.2630615234375, "b": 85.535888671875}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶351": {"paragraph_id": "p0420", "page_id": 55, "type": "text", "content": "© This document has been developed and released by UNISIG", "bbox": {"l": 188.21, "t": 52.29309802734383, "r": 412.8068000000001, "b": 45.08179548590738}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶352": {"paragraph_id": "p0422", "page_id": 56, "type": "table", "content": "| Condition Id   | Content of the conditions                                                                                                                                                                                                                                                                                           |\n|----------------|---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|\n| D16            | (the STM Control Function has sent a 'DA state transition order') AND (STM X does not report the required state within a maximum delay time of 5 seconds)                                                                                                                                                           |\n| E16            | (the STM Control Function has sent a 'conditional CS state transition order') AND (STM X does not report CS state or send a 'National Trip Procedure' information within a maximum delay time of 10 seconds)                                                                                                        |\n| F16            | (the STM Control Function has sent a 'conditional CS state transition order') AND (the STM Control Function has already received a 'National Trip Procedure' information from STM X) AND (STM X does not report CS state or send a 'National Trip Procedure' information within a maximum delay time of 10 seconds) |\n| H16            | (a final disconnection between the ERTMS/ETCS on-board STM Control Function and STM X was detected (see [3] and [2]))                                                                                                                                                                                               |\n| I16            | (The ERTMS/ETCS on-board performs a transition ordered by trackside to Level NTC X) AND (STM X is not available)                                                                                                                                                                                                    |\n| L16            | (STM X has not yet sent the Specific NTC Data Need) AND (STM X requests CO state)                                                                                                                                                                                                                                   |\n| N16            | (The timeout TrainDataView_STM_Response_Timeout for STM X has expired)                                                                                                                                                                                                                                              |\n| O16            | (The timeout TrainDataEntry_STM_Response_Timeout for STM X has expired)                                                                                                                                                                                                                                             |\n| P16            | (A safety-related information has not been transmitted to STM because of disconnection)                                                                                                                                                                                                                             |\n| Q16            | ('National Trip Procedure' is active) AND (STM X reports again 'National Trip Procedure' information) AND (the current ETCS mode is PT or UN)                                                                                                                                                                       |\n| A17            | (STM X reports FA state)                                                                                                                                                                                                                                                                                            |", "bbox": {"l": 51.79969024658203, "t": 766.0723037719727, "r": 539.1153564453125, "b": 349.4917297363281}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶353": {"paragraph_id": "p0423", "page_id": 56, "type": "list_item", "content": "- 10.3.2.5 Note: The delay is shorter for transition to DA state because this transition is assumed as the most critical one from a safety aspect.", "bbox": {"l": 56.76, "t": 340.6070980273438, "r": 547.1359999999993, "b": 315.4650109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶354": {"paragraph_id": "p0424", "page_id": 56, "type": "list_item", "content": "- 10.3.2.6 When the conditions to change the STM state within the STM Control Function are valid according to 10.3.2.2 and 10.3.2.4, the STM  Control Function shall send the corresponding state transition order to STM X.", "bbox": {"l": 56.76, "t": 301.1270980273438, "r": 547.5091600000001, "b": 260.7150109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶355": {"paragraph_id": "p0425", "page_id": 56, "type": "list_item", "content": "- 10.3.2.6.1  Exception 1: The STM Control Function shall not send an order for NP or PO state.", "bbox": {"l": 56.76, "t": 246.37709802734378, "r": 522.04912, "b": 236.4750109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶356": {"paragraph_id": "p0426", "page_id": 56, "type": "list_item", "content": "- 10.3.2.6.2  Exception 2: The STM Control Function shall not send an order for FA state if the STM has reported FA state (transition A17).", "bbox": {"l": 56.76, "t": 222.13709802734377, "r": 547.1249599999995, "b": 196.99501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶357": {"paragraph_id": "p0427", "page_id": 56, "type": "list_item", "content": "- 10.3.2.7 When the state transition  order  is  going  to  CS  state,  the  STM  Control  Function  shall send  an  'unconditional  order  CS  state'  for  the  transitions  A4a,  B4a,  C4a,  E4a,  G4a, H4a, I4a, J4a, K4a and L4a, and a 'conditional order CS state' for the transitions A4b and B4b.", "bbox": {"l": 56.76, "t": 182.65709802734375, "r": 547.50912, "b": 127.03501095552065}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶358": {"paragraph_id": "p0428", "page_id": 56, "type": "list_item", "content": "- 10.3.2.8 Note about Q16 condition: The Trip mode is entered if the STM X is in National Trip Procedure when a transition to level 0, 1, 2 or 3 occurs. The National Trip Procedure", "bbox": {"l": 56.76, "t": 112.67709802734385, "r": 547.1801599999993, "b": 87.53501095552065}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶359": {"paragraph_id": "p0430", "page_id": 57, "type": "text", "content": "may still be reported after this transition in case the STM has been ordered to CS with a conditional order due to a previous level transition from NTC X to NTC Y.", "bbox": {"l": 113.54, "t": 763.0570980273437, "r": 547.4555199999999, "b": 737.9150109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶360": {"paragraph_id": "p0431", "page_id": 57, "type": "section_header", "content": "# 10.3.3 Requirements linked to state transition orders and state reports", "bbox": {"l": 56.76, "t": 717.0759780273438, "r": 481.156, "b": 706.3128399057969}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶361": {"paragraph_id": "p0432", "page_id": 57, "type": "list_item", "content": "- 10.3.3.1 The  STM  Control  Function  shall  not  evaluate  the  state  transition  order  conditions, except conditions to FA state, if this STM has not reported the state corresponding to the last state transition order.", "bbox": {"l": 56.76, "t": 694.4170980273437, "r": 547.2077599999997, "b": 654.0350109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶362": {"paragraph_id": "p0433", "page_id": 57, "type": "list_item", "content": "- 10.3.3.2 An STM is considered as active by the ERTMS/ETCS on-board from the moment it has sent the DA state order to the STM until it sends another state order to this STM (except 'conditional CS state transition order') or receives a state report different from DA from this STM.", "bbox": {"l": 56.76, "t": 639.6970980273437, "r": 547.4430399999999, "b": 584.0450109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶363": {"paragraph_id": "p0434", "page_id": 57, "type": "list_item", "content": "- 10.3.3.3 The  STM  Control  Function  shall  command  the  emergency  brake  from  the  moment  a 'conditional  CS  state  transition  order'  has  been  sent  to  a  STM  and  this  STM  is  in National Trip Procedure, up to the moment this STM reports CS state, or is considered as failed and the train reaches standstill.", "bbox": {"l": 56.76, "t": 569.7070980273437, "r": 547.4425599999998, "b": 514.0850109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶364": {"paragraph_id": "p0435", "page_id": 57, "type": "list_item", "content": "- 10.3.3.3.1  Note: This brake command avoids that the train could run untimely without supervision, in case the active STM does not send a brake command but still sends its National Trip Procedure which delays the activation of the STM of the newly entered area.", "bbox": {"l": 56.76, "t": 499.7470980273438, "r": 547.2595999999994, "b": 459.3650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶365": {"paragraph_id": "p0436", "page_id": 57, "type": "list_item", "content": "- 10.3.3.4 The STM Control Function shall apply the emergency brake when the level is NTC X and the mode is SN and STM X is known as installed on-board but not available.", "bbox": {"l": 56.76, "t": 445.0270980273438, "r": 547.1691199999995, "b": 419.8650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶366": {"paragraph_id": "p0437", "page_id": 57, "type": "list_item", "content": "- 10.3.3.5 Exception: the brake shall not be applied in case the STM X is known to be isolated, through the corresponding input on the Train Interface.", "bbox": {"l": 56.76, "t": 405.5270980273438, "r": 547.1580799999996, "b": 380.38501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶367": {"paragraph_id": "p0438", "page_id": 57, "type": "list_item", "content": "- 10.3.3.6 The emergency brake application shall be released by the STM Control Function when", "bbox": {"l": 56.76, "t": 366.0470980273438, "r": 542.22912, "b": 356.14501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶368": {"paragraph_id": "p0439", "page_id": 57, "type": "list_item", "content": "- the STM X has established the connection to the STM Control Function after a nonfinal disconnection and the reported STM X state is DA,", "bbox": {"l": 113.42, "t": 344.8070980273438, "r": 544.3963200000001, "b": 319.66501095552053}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶369": {"paragraph_id": "p0440", "page_id": 57, "type": "list_item", "content": "- or the level changes to Level 0, 1, 2, 3,", "bbox": {"l": 113.42, "t": 308.3270980273438, "r": 320.53912, "b": 298.4250109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶370": {"paragraph_id": "p0441", "page_id": 57, "type": "list_item", "content": "-  or the level changes to a Level NTC Y that is not associated to STM X,", "bbox": {"l": 113.42, "t": 287.0870980273438, "r": 475.84911999999997, "b": 277.1850109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶371": {"paragraph_id": "p0442", "page_id": 57, "type": "list_item", "content": "- or the mode SN is left with no change of level,", "bbox": {"l": 113.42, "t": 265.8170980273437, "r": 355.57912, "b": 255.91501095552053}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶372": {"paragraph_id": "p0443", "page_id": 57, "type": "list_item", "content": "- or the dedicated input on the Train Interface informs the ERTMS/ETCS on-board that the STM X is isolated.", "bbox": {"l": 113.42, "t": 244.5770980273437, "r": 547.4684800000001, "b": 219.43501095552062}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶373": {"paragraph_id": "p0444", "page_id": 57, "type": "list_item", "content": "- 10.3.3.7 The ERTMS/ETCS on-board shall accept the reconnection of an STM not considered as in FA state or reporting PO state, except in case of final disconnection on Safety Layers.", "bbox": {"l": 56.76, "t": 205.0970980273438, "r": 547.50912, "b": 179.9550109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶374": {"paragraph_id": "p0445", "page_id": 57, "type": "list_item", "content": "- 10.3.3.8 The STM Control Function shall inform the driver that the STM X is not available while all of the following conditions are fulfilled", "bbox": {"l": 56.76, "t": 165.6170980273438, "r": 547.1911999999992, "b": 140.4750109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶375": {"paragraph_id": "p0446", "page_id": 57, "type": "list_item", "content": "- -the level is NTC X,", "bbox": {"l": 113.54, "t": 129.13709802734377, "r": 226.07912, "b": 119.23501095552058}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶376": {"paragraph_id": "p0447", "page_id": 57, "type": "list_item", "content": "- -and (the mode is SN) or (the mode is NL and has been so for at least 5s),", "bbox": {"l": 113.54, "t": 107.87709802734378, "r": 494.44912, "b": 97.97501095552059}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶377": {"paragraph_id": "p0448", "page_id": 57, "type": "list_item", "content": "- -and STM X is known as installed on-board but not available,", "bbox": {"l": 113.54, "t": 86.63709802734377, "r": 427.72912, "b": 76.73501095552058}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶378": {"paragraph_id": "p0449", "page_id": 57, "type": "text", "content": "© This document has been developed and released by UNISIG", "bbox": {"l": 188.21, "t": 52.29309802734383, "r": 412.8068000000001, "b": 45.08179548590738}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶379": {"paragraph_id": "p0451", "page_id": 58, "type": "list_item", "content": "- -and STM X is not known to be isolated through the corresponding input on the Train Interface.", "bbox": {"l": 113.54, "t": 763.0570980273437, "r": 547.1518399999994, "b": 737.9150109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶380": {"paragraph_id": "p0452", "page_id": 58, "type": "list_item", "content": "- 10.3.3.8.1  Note:  the  5s  delay  on  the  information  to  the  driver  is  required  because  the  STM  X requests to enter in CS state only after the mode has changed to NL.", "bbox": {"l": 56.76, "t": 723.5770980273437, "r": 547.50912, "b": 698.4350109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶381": {"paragraph_id": "p0453", "page_id": 58, "type": "section_header", "content": "# 10.4 ETCS data", "bbox": {"l": 56.76, "t": 677.1610980273439, "r": 187.55312, "b": 664.5682264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶382": {"paragraph_id": "p0454", "page_id": 58, "type": "list_item", "content": "- 10.4.1.1 The ETCS data transmitted by the ERTMS/ETCS on-board to the STMs shall include a subset of the ETCS Train Data (defined in [1]), as listed below:", "bbox": {"l": 56.76, "t": 652.5370980273437, "r": 547.50912, "b": 627.3950109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶383": {"paragraph_id": "p0455", "page_id": 58, "type": "list_item", "content": "- Train category(ies)", "bbox": {"l": 113.42, "t": 616.0570980273437, "r": 222.83912, "b": 606.1550109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶384": {"paragraph_id": "p0456", "page_id": 58, "type": "list_item", "content": "- Train length", "bbox": {"l": 113.42, "t": 594.7870980273437, "r": 189.11912, "b": 584.8850109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶385": {"paragraph_id": "p0457", "page_id": 58, "type": "list_item", "content": "-  Traction / brake parameters", "bbox": {"l": 113.42, "t": 573.5470980273437, "r": 266.75912, "b": 563.6450109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶386": {"paragraph_id": "p0458", "page_id": 58, "type": "list_item", "content": "- Maximum train speed", "bbox": {"l": 113.42, "t": 552.3070980273437, "r": 235.91912, "b": 542.4050109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶387": {"paragraph_id": "p0459", "page_id": 58, "type": "list_item", "content": "- Loading gauge", "bbox": {"l": 113.42, "t": 531.0670980273437, "r": 203.87912, "b": 521.1650109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶388": {"paragraph_id": "p0460", "page_id": 58, "type": "list_item", "content": "-  Axle load category", "bbox": {"l": 113.42, "t": 509.8270980273438, "r": 221.27912, "b": 499.9250109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶389": {"paragraph_id": "p0461", "page_id": 58, "type": "list_item", "content": "- Traction system(s) accepted by the engine", "bbox": {"l": 113.42, "t": 488.5870980273438, "r": 338.89912, "b": 478.68501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶390": {"paragraph_id": "p0462", "page_id": 58, "type": "list_item", "content": "- Train fitted with airtight system", "bbox": {"l": 113.42, "t": 467.3470980273438, "r": 280.07912, "b": 457.44501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶391": {"paragraph_id": "p0463", "page_id": 58, "type": "list_item", "content": "- 10.4.1.2 The ETCS data transmitted by the ERTMS/ETCS on-board to the STMs shall include a subset of the ETCS Train Data entry input fields (defined in [9]), as listed below:", "bbox": {"l": 56.76, "t": 443.1070980273438, "r": 547.50912, "b": 417.94501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶392": {"paragraph_id": "p0464", "page_id": 58, "type": "list_item", "content": "- Train Type, if applicable for the train", "bbox": {"l": 113.42, "t": 406.6070980273438, "r": 307.21912, "b": 396.70501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶393": {"paragraph_id": "p0465", "page_id": 58, "type": "list_item", "content": "- 10.4.1.3 Note:  Extra  data  for  the  available  STMs  are  handled  in  the  Specific  NTC  Data  Entry procedure see chapter 10.7.", "bbox": {"l": 56.76, "t": 382.3670980273438, "r": 547.4608000000001, "b": 357.22501095552053}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶394": {"paragraph_id": "p0466", "page_id": 58, "type": "list_item", "content": "- 10.4.1.4 The traction / brake parameters shall include:", "bbox": {"l": 56.76, "t": 342.8870980273438, "r": 337.93912, "b": 332.9850109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶395": {"paragraph_id": "p0467", "page_id": 58, "type": "list_item", "content": "- Equivalent brake build up time for full service brake for the combination of none of the special brakes being used", "bbox": {"l": 113.42, "t": 321.6470980273439, "r": 547.1331199999994, "b": 296.50501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶396": {"paragraph_id": "p0468", "page_id": 58, "type": "list_item", "content": "- Equivalent brake build up time for emergency brake for the combination of none of the special brakes being used", "bbox": {"l": 113.42, "t": 285.16709802734385, "r": 547.1331199999997, "b": 259.99501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶397": {"paragraph_id": "p0469", "page_id": 58, "type": "list_item", "content": "-  Traction cut off time", "bbox": {"l": 113.42, "t": 248.65709802734375, "r": 228.23911999999999, "b": 238.75501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶398": {"paragraph_id": "p0470", "page_id": 58, "type": "list_item", "content": "- Brake position", "bbox": {"l": 113.42, "t": 227.41709802734374, "r": 200.63912, "b": 217.51501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶399": {"paragraph_id": "p0471", "page_id": 58, "type": "list_item", "content": "- Brake percentage, if applicable for the train", "bbox": {"l": 113.42, "t": 206.17709802734373, "r": 341.77912, "b": 196.27501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶400": {"paragraph_id": "p0472", "page_id": 58, "type": "list_item", "content": "- 10.4.1.5 The ETCS data transmitted by the ERTMS/ETCS on-board to the STMs shall include a subset of ETCS Additional Data (defined in [1]) as listed below:", "bbox": {"l": 56.76, "t": 181.93709802734384, "r": 547.3823199999998, "b": 156.79501095552064}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶401": {"paragraph_id": "p0473", "page_id": 58, "type": "list_item", "content": "- Train Running Number", "bbox": {"l": 113.42, "t": 145.45709802734382, "r": 242.39912, "b": 135.55501095552063}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶402": {"paragraph_id": "p0474", "page_id": 58, "type": "list_item", "content": "- ETCS identity", "bbox": {"l": 113.42, "t": 124.21709802734381, "r": 197.99912, "b": 114.31501095552062}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶403": {"paragraph_id": "p0475", "page_id": 58, "type": "list_item", "content": "-  Adhesion factor", "bbox": {"l": 113.42, "t": 102.95709802734382, "r": 207.47912, "b": 93.05501095552063}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶404": {"paragraph_id": "p0476", "page_id": 58, "type": "list_item", "content": "- Date and Time (UTC Time)", "bbox": {"l": 113.42, "t": 81.71709802734381, "r": 264.11912, "b": 71.81501095552062}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶405": {"paragraph_id": "p0477", "page_id": 58, "type": "text", "content": "© This document has been developed and released by UNISIG", "bbox": {"l": 188.21, "t": 52.29309802734383, "r": 412.8068000000001, "b": 45.08179548590738}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶406": {"paragraph_id": "p0479", "page_id": 59, "type": "list_item", "content": "- 10.4.1.6 The ETCS data transmitted by the ERTMS/ETCS on-board to the STMs shall include the ETCS National / Default Values (defined in [1])", "bbox": {"l": 56.76, "t": 763.0570980273437, "r": 547.4043999999997, "b": 737.9150109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶407": {"paragraph_id": "p0480", "page_id": 59, "type": "list_item", "content": "- 10.4.1.7 The STM Control Function shall transmit the subset of valid ETCS Train Data when the ETCS Train Data is validated.", "bbox": {"l": 56.76, "t": 723.5770980273437, "r": 547.48816, "b": 698.4350109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶408": {"paragraph_id": "p0481", "page_id": 59, "type": "list_item", "content": "- 10.4.1.7.1  Note: ETCS Train Data could be changed and validated from sources different from the driver if acquired from ERTMS/ETCS on-board external sources.", "bbox": {"l": 56.76, "t": 684.0970980273437, "r": 547.1359999999996, "b": 658.9550109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶409": {"paragraph_id": "p0482", "page_id": 59, "type": "list_item", "content": "- 10.4.1.8 The STM Control Function shall transmit the valid ETCS Additional Data", "bbox": {"l": 56.76, "t": 644.6170980273438, "r": 468.52912, "b": 634.7150109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶410": {"paragraph_id": "p0483", "page_id": 59, "type": "list_item", "content": "- when the STM has entered into Configuration (CO) state, and", "bbox": {"l": 113.42, "t": 623.3770980273438, "r": 434.80912, "b": 613.4750109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶411": {"paragraph_id": "p0484", "page_id": 59, "type": "list_item", "content": "- when the valid ETCS Additional Data except date / time has changed.", "bbox": {"l": 113.42, "t": 602.1070980273438, "r": 471.04912, "b": 592.2050109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶412": {"paragraph_id": "p0485", "page_id": 59, "type": "list_item", "content": "- 10.4.1.9 The  STM  Control  Function  shall  transmit  the  currently  used  ETCS  National  /  Default Values", "bbox": {"l": 56.76, "t": 577.8670980273438, "r": 547.1911999999994, "b": 552.7250109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶413": {"paragraph_id": "p0486", "page_id": 59, "type": "list_item", "content": "- when the STM has entered into Configuration (CO) state, and", "bbox": {"l": 113.42, "t": 541.3870980273438, "r": 434.80912, "b": 531.4850109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶414": {"paragraph_id": "p0487", "page_id": 59, "type": "list_item", "content": "- when the currently used ETCS National Values have changed (this also includes the case when the National Values are reset to the Default Values).", "bbox": {"l": 113.42, "t": 520.1470980273438, "r": 547.2883999999997, "b": 495.00501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶415": {"paragraph_id": "p0488", "page_id": 59, "type": "section_header", "content": "# 10.5 ETCS status data", "bbox": {"l": 56.76, "t": 473.73109802734376, "r": 232.79312, "b": 461.13822642513384}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶416": {"paragraph_id": "p0489", "page_id": 59, "type": "list_item", "content": "- 10.5.1.1 The STM Control Function shall send the  ETCS status data consisting of the current ETCS mode and level (defined in [1]):", "bbox": {"l": 56.76, "t": 449.1070980273438, "r": 547.47184, "b": 423.94501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶417": {"paragraph_id": "p0490", "page_id": 59, "type": "list_item", "content": "- To all connected STMs whenever the ETCS mode or level changes.", "bbox": {"l": 113.42, "t": 412.6070980273438, "r": 462.40912, "b": 402.70501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶418": {"paragraph_id": "p0491", "page_id": 59, "type": "list_item", "content": "- To any STM when the connection to the STM Control Function is established.", "bbox": {"l": 113.42, "t": 391.3670980273438, "r": 508.96912, "b": 381.46501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶419": {"paragraph_id": "p0492", "page_id": 59, "type": "section_header", "content": "# 10.6 Language used to display information to the driver", "bbox": {"l": 56.76, "t": 360.1910980273438, "r": 455.32312, "b": 347.5982264251339}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶420": {"paragraph_id": "p0493", "page_id": 59, "type": "list_item", "content": "- 10.6.1.1 The STM Control Function shall transmit the language used to display information to the driver:", "bbox": {"l": 56.76, "t": 335.5670980273438, "r": 547.2336799999995, "b": 310.4250109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶421": {"paragraph_id": "p0494", "page_id": 59, "type": "list_item", "content": "- To all connected STMs whenever the language is changed,", "bbox": {"l": 113.42, "t": 299.0870980273438, "r": 420.88912, "b": 289.1850109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶422": {"paragraph_id": "p0495", "page_id": 59, "type": "list_item", "content": "- To any STM when the connection to the STM Control Function is established.", "bbox": {"l": 113.42, "t": 277.8170980273437, "r": 508.96912, "b": 267.91501095552053}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶423": {"paragraph_id": "p0496", "page_id": 59, "type": "section_header", "content": "# 10.7 Specific NTC Data Entry", "bbox": {"l": 56.76, "t": 246.6410980273438, "r": 277.67312, "b": 234.04822642513386}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶424": {"paragraph_id": "p0497", "page_id": 59, "type": "section_header", "content": "# 10.7.1 Definitions", "bbox": {"l": 56.76, "t": 215.51597802734375, "r": 178.91600000000003, "b": 204.7528399057968}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶425": {"paragraph_id": "p0498", "page_id": 59, "type": "list_item", "content": "- 10.7.1.1 The 'Specific NTC Data' are the national data that need to be requested to the driver.", "bbox": {"l": 56.76, "t": 192.8570980273438, "r": 534.76912, "b": 182.9550109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶426": {"paragraph_id": "p0499", "page_id": 59, "type": "list_item", "content": "- 10.7.1.2 The STM may use the transmitted ETCS data: ETCS Train Data, ETCS Additional Data and ETCS National Values in order to reduce the entry of 'Specific NTC Data' by the driver.", "bbox": {"l": 56.76, "t": 168.6170980273438, "r": 547.0807999999996, "b": 128.23501095552058}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶427": {"paragraph_id": "p0500", "page_id": 59, "type": "list_item", "content": "- 10.7.1.3 All  'Specific NTC Data' used by all the different STMs are assigned a unique identity made of NID_STM and Data Identifier.", "bbox": {"l": 56.76, "t": 113.87709802734378, "r": 547.1028799999995, "b": 88.73501095552058}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶428": {"paragraph_id": "p0501", "page_id": 59, "type": "text", "content": "© This document has been developed and released by UNISIG", "bbox": {"l": 188.21, "t": 52.29309802734383, "r": 412.8068000000001, "b": 45.08179548590738}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶429": {"paragraph_id": "p0503", "page_id": 60, "type": "list_item", "content": "- 10.7.1.4 The process to deliver those 'Specific NTC Data' to the STM is called 'Specific NTC Data Entry'.", "bbox": {"l": 56.76, "t": 763.0570980273437, "r": 547.0807999999995, "b": 737.9150109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶430": {"paragraph_id": "p0504", "page_id": 60, "type": "list_item", "content": "- 10.7.1.4.1  Note:  Specific  NTC  Data  Entry  is  possible  at  start-up  and  later  on  during  mission through the Train Data Entry procedure.", "bbox": {"l": 56.76, "t": 723.5770980273437, "r": 547.3429599999996, "b": 698.4350109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶431": {"paragraph_id": "p0505", "page_id": 60, "type": "section_header", "content": "# 10.7.2 Responsibilities", "bbox": {"l": 56.76, "t": 677.5959780273438, "r": 209.186, "b": 666.8328399057968}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶432": {"paragraph_id": "p0506", "page_id": 60, "type": "list_item", "content": "- 10.7.2.1 The ERTMS/ETCS on-board equipment is responsible for the dialogue with the driver during the Specific NTC Data Entry/Validation process, for checking the technical range checks (if configured on-board) and for the transmission of the Specific NTC Data after the driver's validation.", "bbox": {"l": 56.76, "t": 654.9370980273437, "r": 547.4742399999999, "b": 599.3150109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶433": {"paragraph_id": "p0507", "page_id": 60, "type": "list_item", "content": "- 10.7.2.2 The  STM  is  responsible  for checking  the content (e.g. range, spares, internal dependency of parameters) of the data. The STM can be exempted of technical range checks if those are configured in the ERTMS/ETCS on-board equipment.", "bbox": {"l": 56.76, "t": 584.9470980273437, "r": 547.3952799999997, "b": 544.5650109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶434": {"paragraph_id": "p0508", "page_id": 60, "type": "section_header", "content": "# 10.7.3 General requirements", "bbox": {"l": 56.76, "t": 523.7259780273438, "r": 241.346, "b": 512.9628399057968}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶435": {"paragraph_id": "p0509", "page_id": 60, "type": "list_item", "content": "- 10.7.3.1 The ERTMS/ETCS on-board equipment shall offer the possibility to the driver to skip the Specific NTC Data Entry for a STM.", "bbox": {"l": 56.76, "t": 501.0670980273438, "r": 547.2850399999991, "b": 475.9250109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶436": {"paragraph_id": "p0510", "page_id": 60, "type": "list_item", "content": "- 10.7.3.2 The ETCS Train Data as well as the Specific NTC Data might become invalid within the STM at any time due to national requirements. In this case, the STM may request the data from the ETCS by sending the 'Specific NTC Data Need'.", "bbox": {"l": 56.76, "t": 461.5870980273438, "r": 547.1772799999997, "b": 421.18501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶437": {"paragraph_id": "p0511", "page_id": 60, "type": "list_item", "content": "- 10.7.3.3 Specific NTC Data can be or become invalid, because:", "bbox": {"l": 56.76, "t": 406.8470980273438, "r": 384.13912, "b": 396.94501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶438": {"paragraph_id": "p0512", "page_id": 60, "type": "list_item", "content": "- the  ETCS  Train  Data  Entry/Specific  NTC  Data  Entry  procedure  has  not  yet  been performed or has been aborted, or", "bbox": {"l": 113.42, "t": 385.6070980273438, "r": 547.3640799999997, "b": 360.46501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶439": {"paragraph_id": "p0513", "page_id": 60, "type": "list_item", "content": "- the driver has skipped the Specific NTC Data Entry for this STM before the STM has sent the 'End of Specific NTC Data Entry' to the ERTMS/ETCS on-board, or", "bbox": {"l": 113.42, "t": 349.1270980273438, "r": 547.2930399999997, "b": 323.9850109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶440": {"paragraph_id": "p0514", "page_id": 60, "type": "list_item", "content": "-  the  ETCS Train Data Entry procedure has already been performed by the time the STM has entered  into  CO  state,  e.g.  the  STM  has  been  powered  on  or  restarted during train mission, or", "bbox": {"l": 113.42, "t": 312.6470980273439, "r": 547.31912, "b": 272.26501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶441": {"paragraph_id": "p0515", "page_id": 60, "type": "list_item", "content": "- the  ETCS  Train  Data  has  changed  from  sources different  from  the  driver  and  this change impacts the validity status of the Specific  NTC Data, according to national rules, or", "bbox": {"l": 113.42, "t": 260.8970980273439, "r": 547.3919199999997, "b": 220.51501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶442": {"paragraph_id": "p0516", "page_id": 60, "type": "list_item", "content": "- because of STM internal function, e.g. national shunting.", "bbox": {"l": 113.42, "t": 209.17709802734373, "r": 406.69912, "b": 199.27501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶443": {"paragraph_id": "p0517", "page_id": 60, "type": "list_item", "content": "- 10.7.3.4 When the ERTMS/ETCS on-board receives the 'Specific NTC Data Need' while in FS, LS,  SR,  OS,  UN,  TR,  PT  and  SN  modes,  it  shall  inform  the  driver  that  the  national system needs data.", "bbox": {"l": 56.76, "t": 184.93709802734384, "r": 547.4665600000001, "b": 144.55501095552063}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶444": {"paragraph_id": "p0518", "page_id": 60, "type": "list_item", "content": "- 10.7.3.5 The ERTMS/ETCS on-board shall delete this information to the driver when the driver initiates the Train Data entry procedure or when the corresponding STM is considered as failed or when this STM is known to be isolated by TIU 'NTC isolation status' input data.", "bbox": {"l": 56.76, "t": 130.2170980273438, "r": 547.4415999999998, "b": 74.57501095552061}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶445": {"paragraph_id": "p0519", "page_id": 60, "type": "text", "content": "© This document has been developed and released by UNISIG", "bbox": {"l": 188.21, "t": 52.
