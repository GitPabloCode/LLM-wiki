"page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶648": {"paragraph_id": "p0742", "page_id": 77, "type": "list_item", "content": "- its Indicator Identifier,", "bbox": {"l": 113.42, "t": 763.0570980273437, "r": 235.91912, "b": 753.1550109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶649": {"paragraph_id": "p0743", "page_id": 77, "type": "list_item", "content": "- an optional Icon Identifier,", "bbox": {"l": 113.42, "t": 741.8170980273437, "r": 257.27912000000003, "b": 731.9150109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶650": {"paragraph_id": "p0744", "page_id": 77, "type": "list_item", "content": "-  an optional caption text,", "bbox": {"l": 113.42, "t": 720.5770980273437, "r": 247.19912, "b": 710.6750109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶651": {"paragraph_id": "p0745", "page_id": 77, "type": "list_item", "content": "- a Position Identifier,", "bbox": {"l": 113.42, "t": 699.3370980273437, "r": 227.75912, "b": 689.4350109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶652": {"paragraph_id": "p0746", "page_id": 77, "type": "list_item", "content": "- a display attribute.", "bbox": {"l": 113.42, "t": 678.0970980273437, "r": 220.19912, "b": 668.1950109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶653": {"paragraph_id": "p0747", "page_id": 77, "type": "list_item", "content": "- 13.4.3.3 The Icon Identifier shall be used by the DMI Function in case of the customisable DMI service  to  retrieve  from  the  configuration  data  the  corresponding  icon  attached  to  an Indicator/Button object.", "bbox": {"l": 56.76, "t": 653.8570980273438, "r": 547.4732799999999, "b": 613.4750109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶654": {"paragraph_id": "p0748", "page_id": 77, "type": "list_item", "content": "- 13.4.3.4 The display attribute shall specify the background colour and the flashing mode for the whole Indicator and the display colour of the caption text.", "bbox": {"l": 56.76, "t": 599.1070980273438, "r": 547.1359999999996, "b": 573.9650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶655": {"paragraph_id": "p0749", "page_id": 77, "type": "list_item", "content": "- 13.4.3.5 The  flashing mode  specifies  if the slow, fast or no  flashing and  if  normal  or counterphase flashing shall be used.", "bbox": {"l": 56.76, "t": 559.6270980273438, "r": 547.50912, "b": 534.4850109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶656": {"paragraph_id": "p0750", "page_id": 77, "type": "section_header", "content": "# 13.4.4 Buttons", "bbox": {"l": 56.76, "t": 513.6459780273439, "r": 162.116, "b": 502.88283990579686}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶657": {"paragraph_id": "p0751", "page_id": 77, "type": "list_item", "content": "- 13.4.4.1 Buttons are a pure functional extension of Indicators. All requirements of chapter 13.4.3 shall apply to Buttons, by replacing \"Indicator\" with \"Button\".", "bbox": {"l": 56.76, "t": 490.9870980273438, "r": 547.50912, "b": 465.84501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶658": {"paragraph_id": "p0752", "page_id": 77, "type": "list_item", "content": "- 13.4.4.2 The extension is the transmission of Button events from the DMI Function to STM. The DMI Function shall make a distinction between push event (transition from Button not pressed to pressed state) and release event (opposite transition).", "bbox": {"l": 56.76, "t": 451.50709802734383, "r": 547.4195199999998, "b": 411.1050109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶659": {"paragraph_id": "p0753", "page_id": 77, "type": "list_item", "content": "- 13.4.4.3 The DMI Function shall report  Button  push  and  release  events to the STM and shall timestamp those event reports to reflect the sequence of events.", "bbox": {"l": 56.76, "t": 396.7670980273438, "r": 547.3042399999995, "b": 371.62501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶660": {"paragraph_id": "p0754", "page_id": 77, "type": "list_item", "content": "- 13.4.4.4 The DMI Function shall use the Reference Time (see chapter 5.2.2) for timestamping the Button events reports.", "bbox": {"l": 56.76, "t": 357.2870980273438, "r": 547.4022399999999, "b": 332.14501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶661": {"paragraph_id": "p0755", "page_id": 77, "type": "section_header", "content": "# 13.4.5 Sounds", "bbox": {"l": 56.76, "t": 311.3059780273438, "r": 160.91600000000003, "b": 300.5428399057969}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶662": {"paragraph_id": "p0756", "page_id": 77, "type": "list_item", "content": "- 13.4.5.1 STM shall request a Sound by means of the following definition:", "bbox": {"l": 56.76, "t": 288.6470980273439, "r": 427.96912, "b": 278.74501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶663": {"paragraph_id": "p0757", "page_id": 77, "type": "list_item", "content": "- an optional Sound Identifier,", "bbox": {"l": 113.42, "t": 267.3770980273438, "r": 268.19912, "b": 257.4750109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶664": {"paragraph_id": "p0758", "page_id": 77, "type": "list_item", "content": "- only in case of a unified DMI and a Sound to be generated, a sequence of segments defined by a duration and an associated frequency,", "bbox": {"l": 113.42, "t": 246.13709802734377, "r": 547.1331199999997, "b": 220.99501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶665": {"paragraph_id": "p0761", "page_id": 78, "type": "caption", "content": "Figure 11 : Example of sound definition", "bbox": {"l": 233.09, "t": 537.7870980273437, "r": 427.84911999999997, "b": 527.8850109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶666": {"paragraph_id": "p0762", "page_id": 78, "type": "list_item", "content": "-  an indication if the Sound has to be repeated continuously or not or to be stopped.", "bbox": {"l": 113.42, "t": 516.5470980273437, "r": 531.76912, "b": 506.64501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶667": {"paragraph_id": "p0763", "page_id": 78, "type": "list_item", "content": "- 13.4.5.2 The  Sound  Identifier  shall  be  used  by  the  ERTMS/ETCS  on-board  in  case  of  the customisable  DMI  service  to  retrieve  from  the  configuration  data  the  corresponding sound.", "bbox": {"l": 56.76, "t": 492.3070980273438, "r": 547.4305599999998, "b": 451.9250109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶668": {"paragraph_id": "p0764", "page_id": 78, "type": "list_item", "content": "- 13.4.5.3 The Sound Identifier shall be used by the ERTMS/ETCS on-board in both DMI services to stop the generation of a Sound, if requested by the STM.", "bbox": {"l": 56.76, "t": 437.5670980273438, "r": 547.4163999999998, "b": 412.4250109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶669": {"paragraph_id": "p0765", "page_id": 78, "type": "list_item", "content": "- 13.4.5.4 The DMI Function shall be able to manage two STM requests for Sounds at the same time.", "bbox": {"l": 56.76, "t": 398.0870980273438, "r": 547.3023199999998, "b": 372.94501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶670": {"paragraph_id": "p0766", "page_id": 78, "type": "list_item", "content": "- 13.4.5.4.1  Note: This will allow an STM  to request a long Sound  and a short  Sound simultaneously.", "bbox": {"l": 56.76, "t": 358.6070980273438, "r": 547.1470399999996, "b": 333.46501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶671": {"paragra r left corner in cells;", "bbox": {"l": 113.42, "t": 617.3770980273438, "r": 329.65912, "b": 607.4750109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶720": {"paragraph_id": "p0818", "page_id": 80, "type": "list_item", "content": "-  x:y size of the area in cells;", "bbox": {"l": 113.42, "t": 596.1070980273438, "r": 263.15912, "b": 586.2050109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶721": {"paragraph_id": "p0819", "page_id": 80, "type": "list_item", "content": "- linked soft key (for soft key technology).", "bbox": {"l": 113.42, "t": 574.8670980273438, "r": 328.57912, "b": 564.9650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶722": {"paragraph_id": "p0820", "page_id": 80, "type": "list_item", "content": "- 13.5.1.1.6  The list of Icons defined for the STM and, for each Icon:", "bbox": {"l": 56.76, "t": 550.6270980273438, "r": 389.53912, "b": 540.7250109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶723": {"paragraph_id": "p0821", "page_id": 80, "type": "list_item", "content": "- identifier (a number);", "bbox": {"l": 113.42, "t": 529.3870980273438, "r": 232.79912, "b": 519.4850109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶724": {"paragraph_id": "p0822", "page_id": 80, "type": "list_item", "content": "- bitmap,  as  RGB  bitmap  file  (according  to  Microsoft  BMP  file  format);  Pixels  in  the bitmap files shall be understood as cells.", "bbox": {"l": 113.42, "t": 508.1470980273438, "r": 547.0668799999995, "b": 483.00501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶725": {"paragraph_id": "p0823", "page_id": 80, "type": "list_item", "content": "-  display of text upon icon: yes/no.", "bbox": {"l": 113.42, "t": 471.6670980273438, "r": 290.75912, "b": 461.76501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶726": {"paragraph_id": "p0824", "page_id": 80, "type": "list_item", "content": "- 13.5.1.1.7  ETCS speed and distance supervision", "bbox": {"l": 56.76, "t": 447.4270980273438, "r": 303.49912, "b": 437.52501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶727": {"paragraph_id": "p0825", "page_id": 80, "type": "list_item", "content": "- For speed and distance supervision display in speed dial as for ETCS in area B0-B2, B6 and A2-A3 (applicable as long as the STM is active):", "bbox": {"l": 113.42, "t": 426.1670980273438, "r": 547.456, "b": 401.02501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶728": {"paragraph_id": "p0826", "page_id": 80, "type": "list_item", "content": "- Yes/No; 'Yes' means that the ETCS train speed display is re-used as such together with the supervision information as specified in 13.4.6. 'No' means that there is no display of speed and distance supervision in the ETCS way.", "bbox": {"l": 113.42, "t": 389.6870980273438, "r": 547.4694400000001, "b": 349.3050109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶729": {"paragraph_id": "p0827", "page_id": 80, "type": "list_item", "content": "-  if Yes: speed dial range (0-140/180/250/400 km/h or same range as ETCS).", "bbox": {"l": 113.42, "t": 337.9670980273438, "r": 501.64912, "b": 328.0650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶730": {"paragraph_id": "p0828", "page_id": 80, "type": "list_item", "content": "- 13.5.1.1.8  Options for flashing of Indicators and Buttons (additionally to flashing mode):", "bbox": {"l": 56.76, "t": 313.7270980273438, "r": 490.60912, "b": 303.8250109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶731": {"paragraph_id": "p0829", "page_id": 80, "type": "list_item", "content": "- the frequency for slow and fast flashing;", "bbox": {"l": 113.42, "t": 292.4870980273438, "r": 325.93912, "b": 282.5850109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶732": {"paragraph_id": "p0830", "page_id": 80, "type": "list_item", "content": "- the flashing style either as 'yellow frame' or as 'whole area'.", "bbox": {"l": 113.42, "t": 271.2170980273438, "r": 420.76912, "b": 261.3150109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶733": {"paragraph_id": "p0831", "page_id": 80, "type": "list_item", "content": "- 13.5.1.1.9  The list of Sounds defined for the STM and, for each sound, its Sound definition.", "bbox": {"l": 56.76, "t": 246.9770980273438, "r": 509.08912, "b": 237.0750109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶734": {"paragraph_id": "p0832", "page_id": 80, "type": "list_item", "content": "- identifier (a number);", "bbox": {"l": 113.42, "t": 225.7370980273438, "r": 232.79912, "b": 215.8350109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶735": {"paragraph_id": "p0833", "page_id": 80, "type": "list_item", "content": "- sound, as WAV file (according to Microsoft WAV file format);", "bbox": {"l": 113.42, "t": 204.49709802734378, "r": 427.00912, "b": 194.5950109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶736": {"paragraph_id": "p0834", "page_id": 80, "type": "list_item", "content": "- 13.5.1.1.10  Moved areas of the ETCS layout:", "bbox": {"l": 56.76, "t": 180.25709802734377, "r": 279.11912, "b": 170.35501095552058}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶737": {"paragraph_id": "p0835", "page_id": 80, "type": "list_item", "content": "- If  a  STM  needs  partially  or  totally  the  cells  used  by  an  area  defined  in  the  ETCS layout and in which ETCS DMI objects are displayed in level NTC modes SN or NL, the  ETCS  objects  displayed  in  it  must  be  moved  somewhere  else  on  the  national layout.  Therefore  it  shall  be  possible  to  specify  a  changed  location  for  moving  the following  ETCS  areas  and  their  related  ETCS  objects.  For  buttons  also  the  new related soft key (F1-F5) must be defined:", "bbox": {"l": 113.42, "t": 159.01709802734376, "r": 547.3779999999996, "b": 72.89501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶738": {"paragraph_id": "p0836", "page_id": 80, "type": "text", "content": "© This document has been developed and released by UNISIG", "bbox": {"l": 188.21, "t": 52.29309802734383, "r": 412.8068000000001, "b": 45.08179548590738}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶739": {"paragraph_id": "p0838", "page_id": 81, "type": "list_item", "content": "-  Areas F1-F5 for the buttons for selecting the main, override, data view, special or settings window;", "bbox": {"l": 127.58, "t": 762.3370980273437, "r": 547.1727199999995, "b": 737.1950109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶740": {"paragraph_id": "p0839", "page_id": 81, "type": "list_item", "content": "-  Area A4 for the adhesion 'slippery rail';", "bbox": {"l": 127.58, "t": 728.1370980273438, "r": 340.21912, "b": 718.2350109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶741": {"paragraph_id": "p0840", "page_id": 81, "type": "list_item", "content": "-  Areas B7 and C8 for the ETCS mode and level display;", "bbox": {"l": 127.58, "t": 709.1770980273437, "r": 417.97912, "b": 699.2750109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶742": {"paragraph_id": "p0841", "page_id": 81, "type": "list_item", "content": "-  Area C1 for the mode/level acknowledgements;", "bbox": {"l": 127.58, "t": 690.2170980273437, "r": 380.77912, "b": 680.3150109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶743": {"paragraph_id": "p0842", "page_id": 81, "type": "list_item", "content": "-  Area C7 for the Override status indication;", "bbox": {"l": 127.58, "t": 671.2570980273438, "r": 354.49912, "b": 661.3550109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶744": {"paragraph_id": "p0843", "page_id": 81, "type": "list_item", "content": "-  Area C9 for the brake indication;", "bbox": {"l": 127.58, "t": 652.2970980273437, "r": 307.33912, "b": 642.3950109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶745": {"paragraph_id": "p0844", "page_id": 81, "type": "list_item", "content": "-  Area E1 for safe radio connection indication;", "bbox": {"l": 127.58, "t": 633.3370980273437, "r": 365.53912, "b": 623.4350109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶746": {"paragraph_id": "p0845", "page_id": 81, "type": "list_item", "content": "-  Area G13 for local time", "bbox": {"l": 127.58, "t": 614.3770980273438, "r": 261.83912, "b": 604.4750109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶747": {"paragraph_id": "p0846", "page_id": 81, "type": "list_item", "content": "- The new location shall be specified by a new x:y position in cells.", "bbox": {"l": 113.42, "t": 593.1070980273438, "r": 446.68912, "b": 583.2050109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶748": {"paragraph_id": "p0847", "page_id": 81, "type": "list_item", "content": "-  The moved areas shall have the same size as the original ETCS areas.", "bbox": {"l": 113.42, "t": 571.8670980273438, "r": 478.60912, "b": 561.9650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶749": {"paragraph_id": "p0848", "page_id": 81, "type": "table", "content": "| Description                                                      | Multiplicity                | Range and unit                  |\n|------------------------------------------------------------------|-----------------------------|---------------------------------|\n| NID_STM of the STM                                               | 1                           |  (i)                         | For each Button position | 0-639 [cells]                             |\n| Y Offset of the upper left corner (i)                         | For each Button position | 0-479 [cells]                             |\n| Horizontal size (i)                                           | For each Button position | 8-640 [cells]                             |\n| Vertical size (i)                                             | For each Button position | 8-480 [cells]                             |\n| Number of Button positions in case of soft key technology     | 1                        | 0-24                                      |\n| Button position id for soft key (i)                           | For each Button position | 1-24                                      |\n| X Offset of the upper left corner (i)                         | For each Button position | 0-639 [cells]                             |\n| Y Offset of the upper left corner (i)                         | For each Button position | 0-479 [cells]                             |\n| Horizontal size (i)                                           | For each Button position | 8-640 [cells]                             |\n| Vertical size (i)                                             | For each Button position | 8-480 [cells]                             |\n| Linked soft key                                               | For each Button position | F1-F10,H2-H4                              |\n| Number of Icons                                               | 1                        | 0-255                                     |\n| Icon id (i)                                                   | For each Icon            | 1-255                                     |\n| Icon (i)                                                      | For each Icon            | Bitmap file                               |\n| Display text upon icon                                        | For each Icon            | Yes/No r (i) of new location   | For each moved element   | 0-639 [cells]   |\n|---------------------------------------------------------|--------------------------|-----------------|\n| Y Offset of the upper left corner (i) of new location   | For each moved element   | 0-479 [cells]   |\n| Soft key Identifier (i)                                 | For each moved button    | F1-F10, H2-H4   |", "bbox": {"l": 54.72702407836914, "t": 766.6991577148438, "r": 541.4328002929688, "b": 686.3981018066406}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶754": {"paragraph_id": "p0857", "page_id": 84, "type": "section_header", "content": "# 14. JURIDICAL DATA FUNCTION", "bbox": {"l": 56.76, "t": 749.1639780273438, "r": 324.994, "b": 733.0192708450232}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶755": {"paragraph_id": "p0858", "page_id": 84, "type": "list_item", "content": "- 14.1.1.1 The ERTMS/ETCS on-board equipment shall be able to receive and forward national juridical data to the On-Board Recording Device.", "bbox": {"l": 56.76, "t": 720.6970980273437, "r": 547.2946399999995, "b": 695.5550109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶756": {"paragraph_id": "p0859", "page_id": 84, "type": "list_item", "content": "- 14.1.1.2 The  STM  shall  use  the  Reference  Time  (see  chapter  5.2.2)  for  time  stamping  the juridical data sent to the ERTMS/ETCS on-board.", "bbox": {"l": 56.76, "t": 681.2170980273437, "r": 547.3897599999999, "b": 656.0750109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶757": {"paragraph_id": "p0860", "page_id": 84, "type": "list_item", "content": "- 14.1.1.3 The time stamp of the juridical data shall represent the time the sent event occurred.", "bbox": {"l": 56.76, "t": 641.7370980273438, "r": 528.64912, "b": 631.8350109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶758": {"paragraph_id": "p0861", "page_id": 84, "type": "list_item", "content": "- 14.1.1.3.1  Note: This is in order to respect the event chronology.", "bbox": {"l": 56.76, "t": 617.4970980273438, "r": 378.97912, "b": 607.5950109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶759": {"paragraph_id": "p0863", "page_id": 85, "type": "section_header", "content": "# 15. LIMITATIONS", "bbox": {"l": 56.76, "t": 749.1639780273438, "r": 213.374, "b": 733.0192708450232}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶760": {"paragraph_id": "p0864", "page_id": 85, "type": "section_header", "content": "# 15.1 Limitations related to DMI", "bbox": {"l": 56.76, "t": 713.7610980273438, "r": 289.43312, "b": 701.1682264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶761": {"paragraph_id": "p0865", "page_id": 85, "type": "list_item", "content": "- 15.1.1.1 The maximum number of characters (coded in UTF-8 by 1 or 2 bytes) to display shall be", "bbox": {"l": 56.76, "t": 689.1370980273438, "r": 547.14912, "b": 679.2350109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶762": {"paragraph_id": "p0866", "page_id": 85, "type": "list_item", "content": "- 40 characters for text messages in text message request.", "bbox": {"l": 113.42, "t": 667.8970980273438, "r": 411.97912, "b": 657.9950109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶763": {"paragraph_id": "p0867", "page_id": 85, "type": "list_item", "content": "- 12 characters for button and indicator caption text in button and indicator requests", "bbox": {"l": 113.42, "t": 646.6570980273437, "r": 530.80912, "b": 636.7550109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶764": {"paragraph_id": "p0868", "page_id": 85, "type": "list_item", "content": "- 15.1.1.2 The allowed text font height range for the configurable elements of the DMI layout of an STM using the customisable DMI service shall be from 8 to 60 cells.", "bbox": {"l": 56.76, "t": 622.4170980273437, "r": 547.0366399999995, "b": 597.2750109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶765": {"paragraph_id": "p0869", "page_id": 85, "type": "list_item", "content": "- 15.1.1.3 The allowed range for the frequencies for slow and fast flashing for an STM using the customisable DMI service is 0,5 - 8 Hz.", "bbox": {"l": 56.76, "t": 582.9070980273437, "r": 547.4646399999999, "b": 557.7650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶766": {"paragraph_id": "p0870", "page_id": 85, "type": "list_item", "content": "- 15.1.1.4 The ERTMS/ETCS on-board DMI Function shall be able to store at least 10 STM text messages.", "bbox": {"l": 56.76, "t": 543.4270980273437, "r": 547.2466399999997, "b": 518.2850109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶767": {"paragraph_id": "p0871", "page_id": 85, "type": "section_header", "content": "# 15.2 Limitations related to Specific NTC Data Entry/Data View", "bbox": {"l": 56.76, "t": 497.0110980273438, "r": 494.44312, "b": 484.41822642513387}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶768": {"paragraph_id": "p0872", "page_id": 85, "type": "list_item", "content": "- 15.2.1.1 The number of Data Identifiers within one 'Specific NTC Data Entry request' shall be limited to 15 Data Identifiers.", "bbox": {"l": 56.76, "t": 472.3870980273438, "r": 547.3549599999997, "b": 447.24501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶769": {"paragraph_id": "p0873", "page_id": 85, "type": "list_item", "content": "- 15.2.1.2 The number of Data Identifiers within one 'Specific NTC Data values' shall be limited to 15 Data Identifiers.", "bbox": {"l": 56.76, "t": 432.8870980273438, "r": 547.2384799999995, "b": 407.74501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶770": {"paragraph_id": "p0874", "page_id": 85, "type": "list_item", "content": "- 15.2.1.3 The  number  of  Data  Identifiers  within  one  'Specific  NTC  Data  View  values'  shall  be limited to 15 Data Identifiers.", "bbox": {"l": 56.76, "t": 393.4070980273438, "r": 547.2960799999995, "b": 368.26501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶771": {"paragraph_id": "p0875", "page_id": 85, "type": "list_item", "content": "- 15.2.1.4 The maximum number of characters (coded in UTF-8 by 1 or 2 bytes) shall be:", "bbox": {"l": 56.76, "t": 353.9270980273438, "r": 500.68912, "b": 344.02501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶772": {"paragraph_id": "p0876", "page_id": 85, "type": "list_item", "content": "- 20 characters for data labels in 'Specific NTC Data Entry request' and 'Specific NTC Data View values'", "bbox": {"l": 113.42, "t": 332.6870980273438, "r": 547.0668799999995, "b": 307.54501095552064}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶773": {"paragraph_id": "p0877", "page_id": 85, "type": "list_item", "content": "- 10  characters  for  data  values  in  'Specific  NTC  Data  Entry  request'  and  'Specific NTC Data values'", "bbox": {"l": 113.42, "t": 296.2070980273438, "r": 547.3362399999995, "b": 271.0650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶774": {"paragraph_id": "p0878", "page_id": 85, "type": "list_item", "content": "-  10 characters for data view values in 'Specific NTC Data View values'", "bbox": {"l": 113.42, "t": 259.6970980273438, "r": 472.72912, "b": 249.79501095552064}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶775": {"paragraph_id": "p0880", "page_id": 86, "type": "section_header", "content": "# 16. VERSION MANAGEMENT", "bbox": {"l": 56.76, "t": 749.1639780273438, "r": 295.454, "b": 733.0192708450232}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶776": {"paragraph_id": "p0881", "page_id": 86, "type": "section_header", "content": "# 16.1 Introduction", "bbox": {"l": 56.76, "t": 713.7610980273438, "r": 199.19312, "b": 701.1682264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶777": {"paragraph_id": "p0882", "page_id": 86, "type": "list_item", "content": "- 16.1.1.1 The  version  of  the  FFFIS  STM  defines  unambiguously  the  mandatory  interface functions  that  ensure  technical  exchangeability  between  ERTMS/ETCS  on-board  and STM.", "bbox": {"l": 56.76, "t": 689.1370980273438, "r": 547.4996799999999, "b": 648.7550109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶778": {"paragraph_id": "p0883", "page_id": 86, "type": "list_item", "content": "- 16.1.1.2 During the life time of the FFFIS STM there may be several versions of the FFFIS STM.", "bbox": {"l": 56.76, "t": 634.4170980273437, "r": 544.14912, "b": 624.5150109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶779": {"paragraph_id": "p0884", "page_id": 86, "type": "list_item", "content": "- 16.1.1.3 The objective of this section is to define requirements applicable to ERTMS/ETCS onboard  equipment  and  to  STM,  when  different  versions  of  the  FFFIS  STM  have  been defined.", "bbox": {"l": 56.76, "t": 610.1770980273437, "r": 547.3037599999996, "b": 569.7650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶780": {"paragraph_id": "p0885", "page_id": 86, "type": "section_header", "content": "# 16.2 Identification/evolution of the versions", "bbox": {"l": 56.76, "t": 548.4910980273438, "r": 374.65312, "b": 535.8982264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶781": {"paragraph_id": "p0886", "page_id": 86, "type": "list_item", "content": "- 16.2.1.1 The evolution of the versions of the FFFIS STM shall be sequential, i. e. there shall only be a direct upgrade of an existing version and no branch is accepted.", "bbox": {"l": 56.76, "t": 523.8670980273438, "r": 547.1028799999993, "b": 498.72501095552053}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶782": {"paragraph_id": "p0887", "page_id": 86, "type": "list_item", "content": "- 16.2.1.2 The version of the FFFIS STM shall be identified by a number which complies with the following:", "bbox": {"l": 56.76, "t": 484.3870980273438, "r": 547.1801599999995, "b": 459.24501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶783": {"paragraph_id": "p0888", "page_id": 86, "type": "list_item", "content": "- Each Version Number will have the following format: X.Y, where X and Y are any number between 0 and 255 (examples: 2.0, 3.0, 4.2).", "bbox": {"l": 113.42, "t": 447.9070980273438, "r": 547.1551999999995, "b": 422.74501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶784": {"paragraph_id": "p0889", "page_id": 86, "type": "list_item", "content": "- The first number (X) distinguishes not compatible versions.", "bbox": {"l": 113.42, "t": 411.4070980273438, "r": 418.36912, "b": 401.50501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶785": {"paragraph_id": "p0890", "page_id": 86, "type": "list_item", "content": "-  The second number (Y) indicates compatibility within a version X.", "bbox": {"l": 113.42, "t": 390.1670980273438, "r": 449.56912, "b": 380.26501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶786": {"paragraph_id": "p0891", "page_id": 86, "type": "list_item", "content": "- If the first number of two versions is the same, that indicates that those versions are compatible, independently of the second number (e. g. version 4.5 is compatible with 4.3, 4.14).", "bbox": {"l": 113.42, "t": 368.9270980273438, "r": 547.4665599999998, "b": 328.54501095552064}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶787": {"paragraph_id": "p0892", "page_id": 86, "type": "list_item", "content": "- 16.2.1.3 The 'FFFIS STM version number X or Y' is incremented only when the functionality of the FFFIS STM changes.", "bbox": {"l": 56.76, "t": 314.2070980273438, "r": 547.3559199999996, "b": 289.0650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶788": {"paragraph_id": "p0893", "page_id": 86, "type": "section_header", "content": "# 16.3 Version numbers", "bbox": {"l": 56.76, "t": 267.7610980273438, "r": 232.07312, "b": 255.16822642513387}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶789": {"paragraph_id": "p0894", "page_id": 86, "type": "list_item", "content": "- 16.3.1.1 Table of FFFIS STM version numbers", "bbox": {"l": 56.76, "t": 243.13709802734377, "r": 301.33912, "b": 233.23501095552058}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶790": {"paragraph_id": "p0896", "page_id": 87, "type": "table", "content": "| FFFIS Version Number                           | Supported by ERTMS/ETCS on- board equipment   | Remark                                                                                              |\n|------------------------------------------------|-----------------------------------------------|-----------------------------------------------------------------------------------------------------|\n| X=2, Y=0, Z=0                                  | Supplier specific                             | Initial Version, introduced in SUBSET-035 v2.0.0.                                                   |\n| X=3, Y=0, Z                                    | Supplier specific                             | Introduced in SUBSET-035 v2.1.1 (General revision of the FFFIS STM) Z is vendor specific            |\n| Legal backward compatibility envelope X=4, Y=0 | Yes                                           | Introduced in SUBSET-035 v3.x.0 (General revision of the FFFIS STM in the frame of ETCS baseline 3) |", "bbox": {"l": 112.59156036376953, "t": 766.1035614013672, "r": 496.48724365234375, "b": 571.4445495605469}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶791": {"paragraph_id": "p0897", "page_id": 87, "type": "list_item", "content": "- 16.3.1.2 The STM shall support and send one and only one 'FFFIS STM version number', which is  the  highest  one  amongst  those  included  in  the  'legal  backward  compatibility envelope', as defined in table 16.3.1.1.", "bbox": {"l": 56.76, "t": 562.6270980273438, "r": 547.4924799999999, "b": 522.2450109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶792": {"paragraph_id": "p0898", "page_id": 87, "type": "list_item", "content": "- 16.3.1.3 The ERTMS/ETCS on-board equipment shall support any of the 'FFFIS STM version numbers X' included in the 'legal backward compatibility envelope', as defined in table 16.3.1.1.", "bbox": {"l": 56.76, "t": 507.9070980273438, "r": 547.4651199999998, "b": 467.52501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶793": {"paragraph_id": "p0899", "page_id": 87, "type": "list_item", "content": "- 16.3.1.4 All  nodes/functions  of  the  ERTMS/ETCS  on-board  equipment  shall  support  the  same 'FFFIS STM version numbers' and shall therefore send the same 'FFFIS STM version number', when opening a connection with a given STM (see section 7.1.2).", "bbox": {"l": 56.76, "t": 453.1870980273438, "r": 547.4699199999999, "b": 412.78501095552053}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶794": {"paragraph_id": "p0900", "page_id": 87, "type": "list_item", "content": "- 16.3.1.5 When a connection is successfully established with a 'FFFIS STM version number X' lower  than  the  highest  STM  version  numbers  X  included  in  the  'legal  backward compatibility envelope', the ERTMS/ETCS  on-board  equipment shall apply the corresponding  set  of  requirements  as  per  section  16.4,  in  order  to  ensure  backward compatibility between the ERTMS/ETCS on-board equipment and the STM.", "bbox": {"l": 56.76, "t": 398.4470980273438, "r": 547.50912, "b": 327.5850109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶795": {"paragraph_id": "p0901", "page_id": 87, "type": "section_header", "content": "# 16.4 Management of older FFFIS STM versions by ERTMS/ETCS onboard", "bbox": {"l": 56.76, "t": 306.31109802734375, "r": 544.43532, "b": 277.15822642513376}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶796": {"paragraph_id": "p0902", "page_id": 87, "type": "list_item", "content": "- 16.4.1.1 The 'FFFIS STM version number' introduced in this version of the SUBSET-035 is the starting point of the 'legal backward compatibility envelope', which means that whether an ERTMS/ETCS on-board equipment supports a 'FFFIS STM version number X' lower than  the  one  introduced  in  this  version  of  the  SUBSET-035  is  supplier  specific  and outside the scope of this document.", "bbox": {"l": 56.76, "t": 265.0970980273438, "r": 547.46272, "b": 194.23501095552058}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶797": {"paragraph_id": "p0904", "page_id": 88, "type": "section_header", "content": "# 17. ANNEX A: SYSTEM DIAGRAMS LINKED TO THE LEVEL TRANSITIONS WITH  STMS (INFORMATIVE)", "bbox": {"l": 56.76, "t": 502.44400732421866, "r": 817.8766, "b": 464.9393001418983}, "page_width": 842.0399780273438, "page_height": 595.3200073242188}, "¶798": {"paragraph_id": "p0905", "page_id": 88, "type": "section_header", "content": "# 17.1 ETCS  NTC", "bbox": {"l": 56.76, "t": 446.2848473242187, "r": 205.28312, "b": 433.08825572200874}, "page_width": 842.0399780273438, "page_height": 595.3200073242188}, "¶799": {"paragraph_id": "p0907", "page_id": 89, "type": "section_header", "content": "# 17.2 ETCS  NTC (Trip Mode)", "bbox": {"l": 56.76, "t": 516.0048473242188, "r": 285.83312, "b": 502.80825572200877}, "page_width": 842.0399780273438, "page_height": 595.3200073242188}, "¶800": {"paragra ": 95, "type": "section_header", "content": "# 17.8 NTC X  NTC Y (NL/SL)", "bbox": {"l": 56.76, "t": 516.0048473242188, "r": 277.07312, "b": 502.80825572200877}, "page_width": 842.0399780273438, "page_height": 595.3200073242188}, "¶808": {"paragraph_id": "p0931", "page_id": 96, "type": "section_header", "content": "# 17.9 Power On in Level NTC (SoM)", "bbox": {"l": 56.76, "t": 515.4011273242187, "r": 315.23312, "b": 502.80825572200877}, "page_width": 842.0399780273438, "page_height": 595.3200073242188}, "¶809": {"paragraph_id": "p0934", "page_id": 97, "type": "section_header", "content": "# 17.10 Power On in Level NTC (NL)", "bbox": {"l": 56.76, "t": 515.4011273242187, "r": 304.07312, "b": 502.80825572200877}, "page_width": 842.0399780273438, "page_height": 595.3200073242188}, "¶810": {"paragraph_id": "p0937", "page_id": 98, "type": "section_header", "content": "# 17.11 Power On in Level NTC (SL)", "bbox": {"l": 56.76, "t": 515.4011273242187, "r": 303.35312, "b": 502.80825572200877}, "page_width": 842.0399780273438, "page_height": 595.3200073242188}, "¶811": {"paragraph_id": "p0940", "page_id": 99, "type": "section_header", "content": "# 18. ANNEX B : TRAIN DATA ENTRY PROCEDURE (INFORMATIVE)", "bbox": {"l": 56.76, "t": 730.3239780273439, "r": 548.4167199999998, "b": 692.8192708450233}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶812": {"paragraph_id": "p0942", "page_id": 99, "type": "caption", "content": "Figure 12 - Train Data Entry procedure", "bbox": {"l": 208.73, "t": 92.09085802734376, "r": 392.42444000000006, "b": 83.15745338645979}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶813": {"paragraph_id": "p0944", "page_id": 99, "type": "text", "content": "© This document has been developed and released by UNISIG", "bbox": {"l": 188.21, "t": 52.29309802734383, "r": 412.8068000000001, "b": 45.08179548590738}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}};
const ANCHORS = Object.keys(CITATIONS).sort((a, b) => {
    return parseInt(a.replace('¶', '')) - parseInt(b.replace('¶', ''));
});

let currentAnchor = null;

function getAnchorFromHash() {
    const hash = window.location.hash.substring(1);
    if (!hash) return null;
    // Supporta sia "42" (formato link) che "¶42" (formato manuale)
    const anchor = hash.startsWith('¶') ? hash : '¶' + hash;
    if (CITATIONS[anchor]) return anchor;
    return null;
}

function showAnchor(anchor) {
    if (!anchor || !CITATIONS[anchor]) {
        document.getElementById('info-content').innerHTML =
            '<div class="empty-state"><h2>Citazione non trovata</h2><p>Anchor: ' + (anchor || '') + '</p></div>';
        document.getElementById('page-image').style.display = 'none';
        document.getElementById('bbox-canvas').style.display = 'none';
        return;
    }
    currentAnchor = anchor;
    document.getElementById('anchor-input').value = anchor;
    window.location.hash = anchor.replace('¶', '');

    const cit = CITATIONS[anchor];
    const pageNo = cit.page_id;
    const img = document.getElementById('page-image');
    const canvas = document.getElementById('bbox-canvas');

    img.src = 'pages/page_' + String(pageNo).padStart(4, '0') + '.png';
    img.style.display = 'block';
    img.onload = function() {
        const scaleX = img.naturalWidth / cit.page_width;
        const scaleY = img.naturalHeight / cit.page_height;

        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        canvas.style.display = 'block';
        canvas.style.width = img.clientWidth + 'px';
        canvas.style.height = img.clientHeight + 'px';

        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (cit.bbox) {
            // bbox in coordinate bottom-left (Docling) → top-left (canvas)
            const x0 = cit.bbox.l * scaleX;
            const y0 = (cit.page_height - cit.bbox.t) * scaleY;
            const x1 = cit.bbox.r * scaleX;
            const y1 = (cit.page_height - cit.bbox.b) * scaleY;
            const w = x1 - x0;
            const h = y1 - y0;

            if (w > 0 && h > 0) {
                // Fill giallo semi-trasparente
                ctx.fillStyle = 'rgba(255, 230, 50, 0.25)';
                ctx.fillRect(x0, y0, w, h);
                // Outline giallo spesso
                ctx.strokeStyle = 'rgba(255, 200, 0, 1)';
                ctx.lineWidth = 3;
                ctx.strokeRect(x0, y0, w, h);
            }
        }
    };

    document.getElementById('info-content').innerHTML =
        '<div class="anchor">' + anchor + '</div>' +
        '<div class="meta">Pagina ' + cit.page_id + ' · ' + cit.type.replace(/_/g, ' ') + '</div>' +
        '<div class="content">' + escapeHtml(cit.content) + '</div>';
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function goToAnchor() {
    const val = document.getElementById('anchor-input').value.trim();
    const anchor = val.startsWith('¶') ? val : '¶' + val;
    if (CITATIONS[anchor]) showAnchor(anchor);
    else alert('Anchor non trovato: ' + anchor);
}

function nextAnchor() {
    if (!currentAnchor) { showAnchor(ANCHORS[0]); return; }
    const idx = ANCHORS.indexOf(currentAnchor);
    if (idx >= 0 && idx < ANCHORS.length - 1) showAnchor(ANCHORS[idx + 1]);
}

function prevAnchor() {
    if (!currentAnchor) { showAnchor(ANCHORS[0]); return; }
    const idx = ANCHORS.indexOf(currentAnchor);
    if (idx > 0) showAnchor(ANCHORS[idx - 1]);
}

// Inizializzazione dal fragment URL
const hashAnchor = getAnchorFromHash();
if (hashAnchor) showAnchor(hashAnchor);
else {
    document.getElementById('page-image').style.display = 'none';
    document.getElementById('bbox-canvas').style.display = 'none';
}

// Ascolta cambiamenti del fragment (per navigazione da report)
window.addEventListener('hashchange', function() {
    const anchor = getAnchorFromHash();
    if (anchor) showAnchor(anchor);
});

// Enter key sull'input
document.getElementById('anchor-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') goToAnchor();
});
</script>
