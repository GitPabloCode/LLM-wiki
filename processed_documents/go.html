<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Citation Lookup</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 100px auto; text-align: center; color: #ccc; background: #1a1a1a; }
  a { color: #ffd700; }
</style>
</head>
<body>
<p>Resolving citation <span id="anchor"></span>...</p>
<p><small><a id="fallback" href="">Click here if not redirected</a></small></p>
<script>
(async () => {
  const hash = window.location.hash.replace('#', '');
  if (!hash) { document.body.innerHTML = '<p>No citation anchor specified. Use <code>go.html#subset40-42</code></p>'; return; }
  document.getElementById('anchor').textContent = '¶' + hash;
  const docs = ['subset35', 'subset40', 'subset58'];

  // Supporto formato prefissato: subset40-42 → cerca in subset40, anchor ¶42
  const prefixMatch = hash.match(/^(\D+)(\d+)-(\d+)$/);
  if (prefixMatch) {
    const targetDoc = 'subset' + prefixMatch[2];
    const anchor = '¶' + prefixMatch[3];
    try {
      const resp = await fetch(targetDoc + '/citations.json');
      const data = await resp.json();
      if (data.citations[anchor]) {
        window.location.href = targetDoc + '/viewer.html#' + prefixMatch[3];
        return;
      }
    } catch(e) {}
    document.body.innerHTML = '<p>Citation ¶' + hash + ' not found in ' + targetDoc + '.</p>';
    return;
  }

  // Fallback: bare number, search all docs (retrocompatibile)
  const anchor = '¶' + hash;
  for (const doc of docs) {
    try {
      const resp = await fetch(doc + '/citations.json');
      const data = await resp.json();
      if (data.citations[anchor]) {
        window.location.href = doc + '/viewer.html#' + hash;
        return;
      }
    } catch(e) { /* try next */ }
  }
  document.body.innerHTML = '<p>Citation ¶' + hash + ' not found in any document.</p>';
})();
</script>
</body>
</html>
