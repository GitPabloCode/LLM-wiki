                |\n| [4]       | SUBSET-058              | FFFIS STM Application Layer                          |\n| [5]       | CENELEC 50170-2 (1996)  | PROFIBUS                                             |\n| [6]       | SUBSET-034              | FIS for the Train Interface                          |\n| [7]       | SUBSET-041              | Performance Requirements for Interoperability        |\n| [8]       | CENELEC EN 50159 (2010) | Safety related communication in transmission systems |\n| [9]       | ERA_ERTMS_015560        | ETCS Driver Machine Interface                        |\n| [10]      | SUBSET-101              | Interface 'K' specification                          |\n| [11]      | ERA_ERTMS_040001        | Assignment Of Values To ETCS Variables               |", "bbox": {"l": 51.81127166748047, "t": 698.2685546875, "r": 547.22021484375, "b": 435.5769348144531}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶62": {"paragraph_id": "p0097", "page_id": 31, "type": "section_header", "content": "# 3.2 Scope and purpose", "bbox": {"l": 56.76, "t": 421.0310980273438, "r": 247.43312, "b": 408.43822642513385}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶63": {"paragraph_id": "p0098", "page_id": 31, "type": "list_item", "content": "- 3.2.1.1 The  acronym  FFFIS  stands  for  'Form  Fit  Functional  Interface  Specification'.  This means  an  interface  specification  covering  all  protocol  levels  of  communication,  and including connector and physical level.", "bbox": {"l": 56.76, "t": 396.4070980273438, "r": 547.3655199999996, "b": 356.02501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶64": {"paragraph_id": "p0099", "page_id": 31, "type": "list_item", "content": "- 3.2.1.2 The  lowest  level  boundary  of  this  specification  is  the  'Field  Data  Link'  layer  of  the PROFIBUS. The term 'bus' used afterwards in the document corresponds to this FDL layer.  The  referenced  PROFIBUS  standards  cover  the  lowest  communication  layers, physical layer including connector, see [5].", "bbox": {"l": 56.76, "t": 341.6870980273438, "r": 547.2223999999995, "b": 286.0650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶65": {"paragraph_id": "p0100", "page_id": 31, "type": "list_item", "content": "- 3.2.1.3 The upper boundary of the specification describes the functions linked to the interface between an ERTMS/ETCS on-board equipment and an STM.", "bbox": {"l": 56.76, "t": 271.6970980273438, "r": 547.2159199999993, "b": 246.55501095552063}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶66": {"paragraph_id": "p0101", "page_id": 31, "type": "list_item", "content": "- 3.2.1.4 The FFFIS STM specifies the set of requirements enabling the ERTMS/ETCS on-board equipment to be connected to any STM (i.e. the ERTMS/ETCS on-board and the STMs are interchangeable), so that:", "bbox": {"l": 56.76, "t": 232.2170980273438, "r": 547.48528, "b": 191.8350109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶67": {"paragraph_id": "p0102", "page_id": 31, "type": "list_item", "content": "- The functionality  of  the  assembly  ERTMS/ETCS  on-board  equipment  /  STM operating  in  level  NTC  /  mode  SN  is  equivalent  to  the  one  of  the  legacy  National Train Control system,", "bbox": {"l": 113.42, "t": 180.49709802734378, "r": 547.40872, "b": 140.11501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶68": {"paragraph_id": "p0103", "page_id": 31, "type": "list_item", "content": "- The  transitions  between  ERTMS/ETCS  and  a  National  System  and  the  transitions between National Systems are seamlessly performed, with no additional constraint exported  on  the  trackside  other  than  the  installation  of  Eurobalises  for  the  level transitions.", "bbox": {"l": 113.42, "t": 128.77709802734375, "r": 547.3061599999996, "b": 73.13501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶69": {"paragraph_id": "p0104", "page_id": 31, "type": "text", "content": "© This document has been developed and released by UNISIG", "bbox": {"l": 188.21, "t": 52.29309802734383, "r": 412.8068000000001, "b": 45.08179548590738}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶70": {"paragraph_id": "p0106", "page_id": 32, "type": "list_item", "content": "- 3.2.1.5 Within the set  of  requirements  allocated  to  the  ERTMS/ETCS on-board in this FFFIS STM, the access to some of the ERTMS/ETCS on-board standardised interfaces (DMI, Train  Interface,  Juridical  Recording  interface)  or  functions  (e.g.  odometer)  allows minimising the number of interfaces/components needed for the installation of several National Systems on-board.", "bbox": {"l": 56.76, "t": 763.0570980273437, "r": 547.4636800000001, "b": 692.1950109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶71": {"paragraph_id": "p0107", "page_id": 32, "type": "list_item", "content": "- 3.2.1.6 However,  the  use  of  specific  interfaces  or  functions  by  National  Systems,  instead  of these ERTMS/ETCS on-board interfaces/functions offered through this FFFIS STM, is permitted as long as it does not export any requirement on the ERTMS/ETCS on-board in addition to the ones specified in this FFFIS STM. Their choice and their definition are outside the scope of this specification.", "bbox": {"l": 56.76, "t": 677.8570980273438, "r": 547.48528, "b": 606.9950109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶72": {"paragraph_id": "p0108", "page_id": 32, "type": "list_item", "content": "- 3.2.1.7 Any implementation that does not comply with the clause 3.2.1.6 is considered as not compliant with the FFFIS STM and is outside the scope of this specification.", "bbox": {"l": 56.76, "t": 592.6270980273438, "r": 547.3698399999997, "b": 567.4850109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶73": {"paragraph_id": "p0109", "page_id": 32, "type": "list_item", "content": "- 3.2.1.8 The use of the Interface 'K' (see document ref [10]), which offers access to the KER balise interface, also allows minimising the number of antennas installed on-board, but is  not  considered  as  part  of  this  FFFIS  STM  as  the  data  is  not  transmitted  over  the PROFIBUS.", "bbox": {"l": 56.76, "t": 553.1470980273438, "r": 547.46608, "b": 497.52501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶74": {"paragraph_id": "p0111", "page_id": 33, "type": "section_header", "content": "# 4. INTRODUCTION", "bbox": {"l": 56.76, "t": 749.1639780273438, "r": 230.654, "b": 733.0192708450232}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶75": {"paragraph_id": "p0112", "page_id": 33, "type": "section_header", "content": "# 4.1 General requirements", "bbox": {"l": 56.76, "t": 713.7610980273438, "r": 262.67312, "b": 701.1682264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶76": {"paragraph_id": "p0113", "page_id": 33, "type": "list_item", "content": "- 4.1.1.1 The STM shall be identified by a unique number NID_STM. The NID_STM value used by  the  STM  shall  be  equal  to  one  of  the  NID_NTC  values  as  specified  in  the  list referenced in document [11].", "bbox": {"l": 56.76, "t": 689.1370980273438, "r": 547.4612799999998, "b": 648.7550109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶77": {"paragraph_id": "p0114", "page_id": 33, "type": "list_item", "content": "- 4.1.1.2 STM shall use the common Time information from ERTMS/ETCS on-board distributed through the STM interface.", "bbox": {"l": 56.76, "t": 634.4170980273437, "r": 547.4847999999998, "b": 609.2750109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶78": {"paragraph_id": "p0115", "page_id": 33, "type": "list_item", "content": "- 4.1.1.3 Only one STM shall be active (supervising) at a time (see chapter 10.3.3.2 for definition of active STM).", "bbox": {"l": 56.76, "t": 594.9070980273437, "r": 547.4435199999998, "b": 569.7650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶79": {"paragraph_id": "p0116", "page_id": 33, "type": "list_item", "content": "- 4.1.1.4 The  ERTMS/ETCS  on-board  shall  be  responsible  for  monitoring  the  STM  interface safety  integrity  of  connected  STMs  and  for  applying  the  emergency  brake  in  case  of failure of the active STM.", "bbox": {"l": 56.76, "t": 555.4270980273437, "r": 547.48384, "b": 515.0450109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶80": {"paragraph_id": "p0117", "page_id": 33, "type": "list_item", "content": "- 4.1.1.4.1 Justification: The failure of a non active STM is not critical to train safety.", "bbox": {"l": 56.76, "t": 500.7070980273438, "r": 470.80912, "b": 490.8050109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶81": {"paragraph_id": "p0118", "page_id": 33, "type": "section_header", "content": "# 4.2 STM Isolation", "bbox": {"l": 56.76, "t": 469.5310980273438, "r": 208.91312, "b": 456.93822642513385}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶82": {"paragraph_id": "p0119", "page_id": 33, "type": "list_item", "content": "- 4.2.1.1 It  shall be possible to isolate an STM from its interface to the ERTMS/ETCS on-board equipment. The isolation shall ensure that the function of the bus is not disturbed by the isolated STM.", "bbox": {"l": 56.76, "t": 444.9070980273438, "r": 547.48528, "b": 404.50501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶83": {"paragraph_id": "p0121", "page_id": 34, "type": "section_header", "content": "# 5. ERTMS/ETCS ON-BOARD FUNCTIONS", "bbox": {"l": 56.76, "t": 749.1639780273438, "r": 410.074, "b": 733.0192708450232}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶84": {"paragraph_id": "p0122", "page_id": 34, "type": "section_header", "content": "# 5.1 Functional architecture", "bbox": {"l": 56.76, "t": 713.7610980273438, "r": 272.63312, "b": 701.1682264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶85": {"paragraph_id": "p0123", "page_id": 34, "type": "list_item", "content": "- 5.1.1.1 The ERTMS/ETCS on-board equipment shall allow the STM to communicate with the following functions:", "bbox": {"l": 56.76, "t": 689.1370980273438, "r": 547.44304, "b": 663.9950109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶86": {"paragraph_id": "p0124", "page_id": 34, "type": "list_item", "content": "- DMI", "bbox": {"l": 113.42, "t": 652.6570980273437, "r": 150.68912, "b": 642.7550109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶87": {"paragraph_id": "p0125", "page_id": 34, "type": "list_item", "content": "- STM Control", "bbox": {"l": 113.42, "t": 631.4170980273437, "r": 192.47912, "b": 621.5150109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶88": {"paragraph_id": "p0126", "page_id": 34, "type": "list_item", "content": "-  Reference Time", "bbox": {"l": 113.42, "t": 610.1770980273437, "r": 209.39912, "b": 600.2750109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶89": {"paragraph_id": "p0127", "page_id": 34, "type": "list_item", "content": "- BIU", "bbox": {"l": 113.42, "t": 588.9070980273437, "r": 149.00912, "b": 579.0050109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶90": {"paragraph_id": "p0128", "page_id": 34, "type": "list_item", "content": "- TIU", "bbox": {"l": 113.42, "t": 567.6670980273437, "r": 148.52912, "b": 557.7650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶91": {"paragraph_id": "p0129", "page_id": 34, "type": "list_item", "content": "-  Juridical Data", "bbox": {"l": 113.42, "t": 546.4270980273437, "r": 197.39912, "b": 536.5250109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶92": {"paragraph_id": "p0130", "page_id": 34, "type": "list_item", "content": "- Odometer", "bbox": {"l": 113.42, "t": 525.1870980273437, "r": 179.84912, "b": 515.2850109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶93": {"paragraph_id": "p0132", "page_id": 34, "type": "caption", "content": "Figure 1 - General configuration of STM and ERTMS/ETCS on-board", "bbox": {"l": 138.62, "t": 237.31085802734378, "r": 465.22888, "b": 228.37745338645982}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶94": {"paragraph_id": "p0133", "page_id": 34, "type": "section_header", "content": "# 5.2 Data and ERTMS/ETCS on-board functions", "bbox": {"l": 56.76, "t": 204.16109802734377, "r": 402.61312, "b": 191.56822642513384}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶95": {"paragraph_id": "p0134", "page_id": 34, "type": "list_item", "content": "- 5.2.1.1 The  following  paragraphs  describe  the  ERTMS/ETCS  on-board  functions  that  are available for STM and the data that shall be transmitted over the interface.", "bbox": {"l": 56.76, "t": 179.53709802734375, "r": 547.4286399999999, "b": 154.39501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶96": {"paragraph_id": "p0135", "page_id": 34, "type": "list_item", "content": "- 5.2.1.2 The data is transmitted over the STM bus using Multicast or Point-to-Point Connections, see chapter 6.5.", "bbox": {"l": 56.76, "t": 140.05709802734373, "r": 547.4636799999998, "b": 114.91501095552053}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶97": {"paragraph_id": "p0136", "page_id": 34, "type": "section_header", "content": "# 5.2.2 Reference time", "bbox": {"l": 56.76, "t": 94.05597802734383, "r": 203.186, "b": 83.29283990579688}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶98": {"paragraph_id": "p0139", "page_id": 35, "type": "list_item", "content": "- 5.2.2.1 ERTMS/ETCS  on-board  is  responsible  for  providing  common  reference  time  to  all connected STMs. This is defined in [2].", "bbox": {"l": 56.76, "t": 763.0570980273437, "r": 547.2283999999996, "b": 737.9150109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶99": {"paragraph_id": "p0140", "page_id": 35, "type": "section_header", "content": "# 5.2.3 Odometer", "bbox": {"l": 56.76, "t": 717.0759780273438, "r": 173.63600000000002, "b": 706.3128399057969}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶100": {"paragraph_id": "p0141", "page_id": 35, "type": "list_item", "content": "- 5.2.3.1 Odometry data & parameters shall be sent by the ERTMS/ETCS on-board to all STMs using multicast messages.", "bbox": {"l": 56.76, "t": 694.4170980273437, "r": 547.4368, "b": 669.2750109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶101": {"paragraph_id": "p0142", "page_id": 35, "type": "section_header", "content": "# 5.2.4 Train Interface (TIU)", "bbox": {"l": 56.76, "t": 648.4359780273438, "r": 230.42600000000002, "b": 637.6728399057969}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶102": {"paragraph_id": "p0143", "page_id": 35, "type": "list_item", "content": "- 5.2.4.1 A subset of the train interface signals specified in [6], command and status / availability are  transmitted  via  the  FFFIS  STM.  These  train  interface  signals  transmitted  via  the FFFIS STM are called Train Interface FFFIS STM signals.", "bbox": {"l": 56.76, "t": 625.7770980273438, "r": 547.50912, "b": 585.3650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶103": {"paragraph_id": "p0144", "page_id": 35, "type": "list_item", "content": "- 5.2.4.2 The  TIU  Function  is  described  as  the  exchange  of  information  between  the  train interface and the STM, in this case:", "bbox": {"l": 56.76, "t": 571.0270980273438, "r": 547.2372799999998, "b": 545.8850109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶104": {"paragraph_id": "p0145", "page_id": 35, "type": "list_item", "content": "- Status: is functional information coming from the train interface to the STM,", "bbox": {"l": 113.42, "t": 534.5470980273437, "r": 497.56912, "b": 524.6450109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶105": {"paragraph_id": "p0146", "page_id": 35, "type": "list_item", "content": "- Command: is functional information coming from the STM to the train interface.", "bbox": {"l": 113.42, "t": 513.3070980273437, "r": 517.12912, "b": 503.40501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶106": {"paragraph_id": "p0147", "page_id": 35, "type": "list_item", "content": "- 5.2.4.3 Train Interface FFFIS STM command signals shall be:", "bbox": {"l": 56.76, "t": 489.0670980273438, "r": 381.37912, "b": 479.16501095552053}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶107": {"paragraph_id": "p0148", "page_id": 35, "type": "list_item", "content": "- 5.2.4.3.1 Note: Service and Emergency Brake commands are handled in the BIU interface see chapter 5.2.5.", "bbox": {"l": 56.76, "t": 252.13709802734377, "r": 547.3496799999996, "b": 226.99501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶108": {"paragraph_id": "p0149", "page_id": 35, "type": "list_item", "content": "- 5.2.4.4 Train Interface FFFIS STM status signals shall be:", "bbox": {"l": 56.76, "t": 212.65709802734375, "r": 362.41912, "b": 202.75501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶109": {"paragraph_id": "p0150", "page_id": 35, "type": "list_item", "content": "- 5.2.4.4.1 Note: Service and Emergency Brake status are handled in the BIU interface see chapter 5.2.5.", "bbox": {"l": 56.76, "t": 133.93709802734384, "r": 547.2706399999994, "b": 108.79501095552064}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶110": {"paragraph_id": "p0151", "page_id": 35, "type": "table", "content": "| Command signal                         | Description                                                                              |\n|----------------------------------------|------------------------------------------------------------------------------------------|\n| Regenerative Brake                     | To allow or to suppress the use of the Regenerative Brake.                               |\n| Magnetic Shoe Brake                    | To allow or to suppress the use of the Magnetic Shoes Brake.                             |\n| Eddy Current Brake for Service Brake   | To allow or to suppress the use of the Eddy Current Brake for Service Brake.             |\n| Eddy Current Brake for Emergency Brake | To allow or to suppress the use of the Eddy Current Brake for Emergency Brake.           |\n| Pantograph                             | Lower or raise the Pantograph                                                            |\n| Air Tightness                          | Open or close air flaps                                                                  |\n| Main Switch / Circuit Breaker          | Open or close the Main Switch / Circuit Breaker. This is considered as only one command. |\n| Traction Cut Off                       | Cut off or not the traction                                                              |", "bbox": {"l": 107.08395385742188, "t": 474.304443359375, "r": 550.04345703125, "b": 260.31024169921875}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶111": {"paragraph_id": "p0152", "page_id": 35, "type": "table", "content": "| Status signal                    | Description                                        |\n|----------------------------------|----------------------------------------------------|\n| Traction status                  | Specifies the status of the traction power         |\n| Direction Controller information | Specifies the position of the direction controller |\n| Cab Status                       | Specifies the active cab                           |", "bbox": {"l": 107.14789581298828, "t": 197.11553955078125, "r": 550.2714233398438, "b": 142.145263671875}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶112": {"paragraph_id": "p0153", "page_id": 35, "type": "section_header", "content": "# 5.2.5 Brake Interface (BIU)", "bbox": {"l": 56.76, "t": 87.93597802734382, "r": 235.82600000000002, "b": 77.17283990579688}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶113": {"paragraph_id": "p0156", "page_id": 36, "type": "list_item", "content": "- 5.2.5.1 The Brake Interface via ETCS is formally a part of the Train Interface. It shall include the  brake  interface  parameters,  command  and  status  /  availability  of  the  Emergency Brake access and the Service Brake access.", "bbox": {"l": 56.76, "t": 763.0570980273437, "r": 547.2783199999996, "b": 722.6750109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶114": {"paragraph_id": "p0157", "page_id": 36, "type": "list_item", "content": "- 5.2.5.2 Note: The BIU Function is separated from the TIU Function to allow physical separation and different safety and performance levels between brake commands/status and other commands/status on the Train Interface.", "bbox": {"l": 56.76, "t": 708.3370980273437, "r": 547.46368, "b": 667.9550109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶115": {"paragraph_id": "p0158", "page_id": 36, "type": "list_item", "content": "- 5.2.5.3 The brake status gives the availability of the brake command.", "bbox": {"l": 56.76, "t": 653.6170980273438, "r": 416.53912, "b": 643.7150109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶116": {"paragraph_id": "p0159", "page_id": 36, "type": "section_header", "content": "# 5.2.6 Juridical data", "bbox": {"l": 56.76, "t": 622.8759780273438, "r": 194.54600000000002, "b": 612.1128399057968}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶117": {"paragraph_id": "p0160", "page_id": 36, "type": "list_item", "content": "- 5.2.6.1 The FFFIS STM shall offer the possibility to the STM to transmit the national juridical data to be forwarded (together with the ETCS data) to the On-Board Recording Device.", "bbox": {"l": 56.76, "t": 600.1870980273437, "r": 547.0918399999993, "b": 575.0450109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶118": {"paragraph_id": "p0161", "page_id": 36, "type": "section_header", "content": "# 5.2.7 STM Control Function", "bbox": {"l": 56.76, "t": 554.2059780273438, "r": 242.186, "b": 543.4428399057969}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶119": {"paragraph_id": "p0162", "page_id": 36, "type": "list_item", "content": "- 5.2.7.1 The  STM  Control  Function  shall  control  the  STM  state  and  the  compatibility  of  the ERTMS/ETCS on-board and STM versions.", "bbox": {"l": 56.76, "t": 531.5470980273437, "r": 547.2725599999995, "b": 506.40501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶120": {"paragraph_id": "p0163", "page_id": 36, "type": "list_item", "content": "- 5.2.7.2 The STM Control Function shall handle the transmission of the ETCS data for STM and of the Specific NTC Data Entry/Data View for STM.", "bbox": {"l": 56.76, "t": 492.0670980273438, "r": 547.4180799999998, "b": 466.9250109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶121": {"paragraph_id": "p0164", "page_id": 36, "type": "list_item", "content": "- 5.2.7.3 The STM Control Function shall handle the transmission of the ETCS status data for STM.", "bbox": {"l": 56.76, "t": 452.5870980273438, "r": 547.3184799999998, "b": 427.4250109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶122": {"paragraph_id": "p0165", "page_id": 36, "type": "list_item", "content": "- 5.2.7.4 The STM Control Function shall handle the transmission of the language used to display information to the driver.", "bbox": {"l": 56.76, "t": 413.0870980273438, "r": 547.4120799999998, "b": 387.94501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶123": {"paragraph_id": "p0166", "page_id": 36, "type": "list_item", "content": "- 5.2.7.5 The STM Control Function shall handle the test procedure for STMs.", "bbox": {"l": 56.76, "t": 373.6070980273438, "r": 451.24912, "b": 363.70501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶124": {"paragraph_id": "p0167", "page_id": 36, "type": "list_item", "content": "- 5.2.7.6 The STM Control Function shall handle the Override procedure for STMs.", "bbox": {"l": 56.76, "t": 349.3670980273438, "r": 475.60912, "b": 339.46501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶125": {"paragraph_id": "p0168", "page_id": 36, "type": "list_item", "content": "- 5.2.7.7 The STM Control Function shall handle the airgap data to be transmitted to an NTC.", "bbox": {"l": 56.76, "t": 325.1270980273438, "r": 526.96912, "b": 315.2250109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶126": {"paragraph_id": "p0169", "page_id": 36, "type": "list_item", "content": "- 5.2.7.8 The STM  Control Function shall handle STM  max speed and STM  system speed/distance.", "bbox": {"l": 56.76, "t": 300.8870980273439, "r": 547.31864, "b": 275.74501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶127": {"paragraph_id": "p0170", "page_id": 36, "type": "list_item", "content": "- 5.2.7.9 The STM Control Function shall handle the transmission of the bus address, safety level and availability of the ERTMS/ETCS on-board functions.", "bbox": {"l": 56.76, "t": 261.3770980273438, "r": 547.3037599999994, "b": 236.23501095552058}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶128": {"paragraph_id": "p0171", "page_id": 36, "type": "list_item", "content": "- 5.2.7.10 The STM Control Function shall handle the display of STM failure status.", "bbox": {"l": 56.76, "t": 221.89709802734376, "r": 471.28912, "b": 211.99501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶129": {"paragraph_id": "p0172", "page_id": 36, "type": "list_item", "content": "- 5.2.7.11 The  STM  Control  Function  shall  handle  the  transmission  of  the  active  Interface  'K' Antenna/BTM.", "bbox": {"l": 56.76, "t": 197.65709802734375, "r": 547.4036799999999, "b": 172.51501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶130": {"paragraph_id": "p0173", "page_id": 36, "type": "list_item", "content": "- 5.2.7.12 The STM control function shall handle the transmission of the BTM alarm data.", "bbox": {"l": 56.76, "t": 158.17709802734373, "r": 501.16912, "b": 148.27501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶131": {"paragraph_id": "p0174", "page_id": 36, "type": "section_header", "content": "# 5.2.8 DMI", "bbox": {"l": 56.76, "t": 127.43597802734382, "r": 138.836, "b": 116.67283990579688}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶132": {"paragraph_id": "p0175", "page_id": 36, "type": "list_item", "content": "- 5.2.8.1 The DMI Function shall allow an active STM to dialogue with the driver for what regards its default window (see [9] chapter 9). This includes:", "bbox": {"l": 56.76, "t": 104.75709802734377, "r": 547.3439199999998, "b": 79.61501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶133": {"paragraph_id": "p0176", "page_id": 36, "type": "text", "content": "© This document has been developed and released by UNISIG", "bbox": {"l": 188.21, "t": 52.29309802734383, "r": 412.8068000000001, "b": 45.08179548590738}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶134": {"paragraph_id": "p0178", "page_id": 37, "type": "list_item", "content": "- Management of buttons,", "bbox": {"l": 113.42, "t": 763.0570980273437, "r": 249.95911999999998, "b": 753.1550109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶135": {"paragraph_id": "p0179", "page_id": 37, "type": "list_item", "content": "- Management of indicators,", "bbox": {"l": 113.42, "t": 741.8170980273437, "r": 260.87912, "b": 731.9150109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶136": {"paragraph_id": "p0180", "page_id": 37, "type": "list_item", "content": "-  Management of sounds,", "bbox": {"l": 113.42, "t": 720.5770980273437, "r": 249.23911999999999, "b": 710.6750109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶137": {"paragraph_id": "p0181", "page_id": 37, "type": "list_item", "content": "- Management of text messages,", "bbox": {"l": 113.42, "t": 699.3370980273437, "r": 284.99912, "b": 689.4350109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶138": {"paragraph_id": "p0182", "page_id": 37, "type": "list_item", "content": "- Management of supervision information", "bbox": {"l": 113.42, "t": 678.0970980273437, "r": 324.01912, "b": 668.1950109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶139": {"paragraph_id": "p0183", "page_id": 37, "type": "section_header", "content": "# 5.3 ERTMS/ETCS on-board functions and resources available for STMs", "bbox": {"l": 56.76, "t": 646.9210980273439, "r": 502.12312000000003, "b": 634.3282264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶140": {"paragraph_id": "p0184", "page_id": 37, "type": "list_item", "content": "- 5.3.1.1 The ERTMS/ETCS on-board shall allow the STM to access its functions and resources according to the following table:", "bbox": {"l": 56.76, "t": 622.7770980273438, "r": 547.2595999999993, "b": 597.6350109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶141": {"paragraph_id": "p0185", "page_id": 37, "type": "list_item", "content": "- x = access is allowed in all Levels", "bbox": {"l": 113.42, "t": 586.2670980273438, "r": 294.83912, "b": 576.3650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶142": {"paragraph_id": "p0186", "page_id": 37, "type": "list_item", "content": "- (x) = access is allowed in all Levels if possible", "bbox": {"l": 113.42, "t": 565.0270980273438, "r": 354.49912, "b": 555.1250109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶143": {"paragraph_id": "p0187", "page_id": 37, "type": "list_item", "content": "-  s = access is only allowed for an active STM (see chapter 4.1.1.3)", "bbox": {"l": 113.42, "t": 543.7870980273437, "r": 452.56912, "b": 533.8850109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶144": {"paragraph_id": "p0188", "page_id": 37, "type": "list_item", "content": "- h = access is allowed for an STM in HS for preliminary request for DMI objects (see 13.2.1.5)", "bbox": {"l": 113.42, "t": 522.5470980273437, "r": 547.0779199999996, "b": 497.40501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶145": {"paragraph_id": "p0189", "page_id": 37, "type": "list_item", "content": "- 5.3.1.2 When an ERTMS/ETCS on-board function fails, it shall isolate itself from the bus and shall try to close the connection with the STM.", "bbox": {"l": 56.76, "t": 211.69709802734383, "r": 547.2250399999992, "b": 186.55501095552063}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶146": {"paragraph_id": "p0190", "page_id": 37, "type": "table", "content": "| ERTMS/ETCS ON-BOARD functions and resources available for STMs   | N P   | S B   | P S x     | x     | x     | x     | x     | x     | x     | x     |       | x     | x     |", "bbox": {"l": 51.98685836791992, "t": 492.507080078125, "r": 532.0669555664062, "b": 237.8040771484375}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶147": {"paragraph_id": "p0192", "page_id": 38, "type": "section_header", "content": "# 6. BUS", "bbox": {"l": 56.76, "t": 749.1639780273438, "r": 151.664, "b": 733.0192708450232}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶148": {"paragraph_id": "p0193", "page_id": 38, "type": "section_header", "content": "# 6.1 The PROFIBUS", "bbox": {"l": 56.76, "t": 713.7610980273438, "r": 218.63312, "b": 701.1682264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶149": {"paragraph_id": "p0194", "page_id": 38, "type": "list_item", "content": "- 6.1.1.1 The  bus  used  for  the  interface  between  STM  and  ERTMS/ETCS  on-board  functions shall be the PROFIBUS, defined by [5].", "bbox": {"l": 56.76, "t": 689.1370980273438, "r": 547.4603199999998, "b": 663.9950109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶150": {"paragraph_id": "p0195", "page_id": 38, "type": "list_item", "content": "- 6.1.1.2 The PROFIBUS protocol is used up to the FDL layer.", "bbox": {"l": 56.76, "t": 649.6570980273437, "r": 375.61912, "b": 639.7550109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶151": {"paragraph_id": "p0196", "page_id": 38, "type": "list_item", "content": "- 6.1.1.2.1 Note: The use of the FDL layer is specified in [3], chapter 4.", "bbox": {"l": 56.76, "t": 625.4170980273437, "r": 408.13912, "b": 615.5150109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶152": {"paragraph_id": "p0197", "page_id": 38, "type": "list_item", "content": "- 6.1.1.3 The bus configuration parameters for the PROFIBUS shall be:", "bbox": {"l": 56.76, "t": 601.1470980273438, "r": 423.52912, "b": 591.2450109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶153": {"paragraph_id": "p0198", "page_id": 38, "type": "list_item", "content": "- Baud Rate: 1500 Kbps", "bbox": {"l": 113.42, "t": 579.9070980273437, "r": 244.79912, "b": 570.0050109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶154": {"paragraph_id": "p0199", "page_id": 38, "type": "list_item", "content": "- Minimum Station Delay of Responders (min TSDR): 11 tBit", "bbox": {"l": 113.42, "t": 558.6670980273437, "r": 420.88912, "b": 548.7650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶155": {"paragraph_id": "p0200", "page_id": 38, "type": "list_item", "content": "-  Maximum Station Delay of Responders (max TSDR): 150 tBit", "bbox": {"l": 113.42, "t": 537.4270980273437, "r": 433.00912, "b": 527.5250109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶156": {"paragraph_id": "p0201", "page_id": 38, "type": "list_item", "content": "- Slot Time (TSL): 300 tBit", "bbox": {"l": 113.42, "t": 516.1870980273437, "r": 254.99912, "b": 506.28501095552053}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶157": {"paragraph_id": "p0202", "page_id": 38, "type": "list_item", "content": "- Quiet Time (TQUI): 0 tBit", "bbox": {"l": 113.42, "t": 494.9470980273438, "r": 256.43912, "b": 485.0450109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶158": {"paragraph_id": "p0203", "page_id": 38, "type": "list_item", "content": "-  Setup Time (TSET): 1 tBit", "bbox": {"l": 113.42, "t": 473.7070980273438, "r": 260.63912, "b": 463.8050109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶159": {"paragraph_id": "p0204", "page_id": 38, "type": "list_item", "content": "- Time Target Rotation (TTR): 30000 tBit (20 ms)", "bbox": {"l": 113.42, "t": 452.4670980273438, "r": 366.61912, "b": 442.56501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶160": {"paragraph_id": "p0205", "page_id": 38, "type": "list_item", "content": "- GAP Actualisation Factor (G): 10", "bbox": {"l": 113.42, "t": 431.2070980273438, "r": 294.71912, "b": 421.3050109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶161": {"paragraph_id": "p0206", "page_id": 38, "type": "list_item", "content": "-  Highest Station Address (HSA): 126", "bbox": {"l": 113.42, "t": 409.9670980273438, "r": 309.97912, "b": 400.06501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶162": {"paragraph_id": "p0207", "page_id": 38, "type": "list_item", "content": "- Max Retry Limit (max_retry_limit): 1", "bbox": {"l": 113.42, "t": 388.7270980273438, "r": 304.57912, "b": 378.82501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶163": {"paragraph_id": "p0208", "page_id": 38, "type": "list_item", "content": "- 6.1.1.3.1 Note: This allows for a maximum permissible line length (PROFIBUS length) of 200 m per segment and a maximum number of 32 stations when using cable type A. In case a greater length or more stations are required, repeaters can be used without changing the configuration.", "bbox": {"l": 56.76, "t": 364.4870980273438, "r": 547.3328799999998, "b": 308.8650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶164": {"paragraph_id": "p0209", "page_id": 38, "type": "list_item", "content": "- 6.1.1.3.2 Note:  PROFIBUS may also be used for other communications than the one between STM and ERTMS/ETCS on-board specified in this FFFIS STM.", "bbox": {"l": 56.76, "t": 294.52709802734375, "r": 547.3991199999996, "b": 269.38501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶165": {"paragraph_id": "p0210", "page_id": 38, "type": "section_header", "content": "# 6.1.2 Physical connection", "bbox": {"l": 56.76, "t": 248.51597802734375, "r": 232.94600000000003, "b": 237.7528399057968}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶166": {"paragraph_id": "p0211", "page_id": 38, "type": "list_item", "content": "- 6.1.2.1 The default physical medium shall be RS-485 twisted pair shielded copper cable.", "bbox": {"l": 56.76, "t": 225.8570980273438, "r": 510.88912, "b": 215.9550109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶167": {"paragraph_id": "p0212", "page_id": 38, "type": "list_item", "content": "- 6.1.2.2 The default connectors of the different equipments (ERTMS/ETCS on-board functions and  STMs)  shall  be  9-pin  female  D-SUB  and  cabling  according  to  PROFIBUS specifications.", "bbox": {"l": 56.76, "t": 201.6170980273438, "r": 547.4612799999999, "b": 161.23501095552058}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶168": {"paragraph_id": "p0213", "page_id": 38, "type": "section_header", "content": "# 6.1.3 Bus redundancy and retransmission", "bbox": {"l": 56.76, "t": 140.39597802734374, "r": 325.12600000000003, "b": 129.6328399057968}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶169": {"paragraph_id": "p0214", "page_id": 38, "type": "list_item", "content": "- 6.1.3.1 Retransmission is specified in [3]", "bbox": {"l": 56.76, "t": 117.73709802734379, "r": 277.43912, "b": 107.8350109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶170": {"paragraph_id": "p0215", "page_id": 38, "type": "list_item", "content": "- 6.1.3.2 Regarding bus redundancy, the STM and ERTMS/ETCS on-board shall have at least one bus interface each, and may have two interfaces.", "bbox": {"l": 56.76, "t": 93.4770980273438, "r": 547.4358399999998, "b": 68.3350109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶171": {"paragraph_id": "p0217", "page_id": 39, "type": "list_item", "content": "- 6.1.3.3 In case STM and ERTMS/ETCS on-board do not have the same number of buses, only one bus shall be connected.", "bbox": {"l": 56.76, "t": 763.0570980273437, "r": 547.3114399999997, "b": 737.9150109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶172": {"paragraph_id": "p0218", "page_id": 39, "type": "list_item", "content": "- 6.1.3.4 The dual bus configuration shall be managed by the 'Redundancy Supervisor' see Ref.: [3].", "bbox": {"l": 56.76, "t": 723.5770980273437, "r": 547.3563999999997, "b": 698.4350109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶173": {"paragraph_id": "p0219", "page_id": 39, "type": "section_header", "content": "# 6.2 Safety", "bbox": {"l": 56.76, "t": 677.1610980273439, "r": 159.08312, "b": 664.5682264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶174": {"paragraph_id": "p0220", "page_id": 39, "type": "list_item", "content": "- 6.2.1.1 To  allow  communication  between  different  equipment  with  different  Safety  Integrity Levels  (SIL),  the  FFFIS  STM  shall  provide  communication  with  three  levels  of  safety protocol (SL):", "bbox": {"l": 56.76, "t": 652.5370980273437, "r": 547.3084, "b": 612.1550109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶175": {"paragraph_id": "p0221", "page_id": 39, "type": "list_item", "content": "- Safety Level 4 (SL 4)", "bbox": {"l": 113.42, "t": 600.7870980273437, "r": 236.87912, "b": 590.8850109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶176": {"paragraph_id": "p0222", "page_id": 39, "type": "list_item", "content": "- Safety Level 2 (SL 2)", "bbox": {"l": 113.42, "t": 579.5470980273437, "r": 236.87912, "b": 569.6450109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶177": {"paragraph_id": "p0223", "page_id": 39, "type": "list_item", "content": "-  Safety Level 0 (SL 0)", "bbox": {"l": 113.42, "t": 558.3070980273437, "r": 233.75912, "b": 548.4050109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶178": {"paragraph_id": "p0224", "page_id": 39, "type": "list_item", "content": "- 6.2.1.1.1 Justification: According to the requirements for Safety-related communication  in transmission  systems  (see  [8]),  an  equipment  with  no  or  a  low  Safety  Integrity  Level shall  not  masquerade  as  an  equipment  with  a  higher  Safety  Integrity  Level.  This requirement shall be fulfilled by using the defined Safety Levels.", "bbox": {"l": 56.76, "t": 534.0670980273437, "r": 547.4346399999998, "b": 478.44501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶179": {"paragraph_id": "p0225", "page_id": 39, "type": "list_item", "content": "- 6.2.1.1.2 Note: The three levels of safety are specified in [3] and [2].", "bbox": {"l": 56.76, "t": 464.1070980273438, "r": 402.73912, "b": 454.20501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶180": {"paragraph_id": "p0226", "page_id": 39, "type": "list_item", "content": "- 6.2.1.2 No  equipment  shall  implement  any  Safety  Level  corresponding  to  a  higher  Safety Integrity Level (SIL).", "bbox": {"l": 56.76, "t": 439.8470980273438, "r": 547.1911999999996, "b": 414.70501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶181": {"paragraph_id": "p0227", "page_id": 39, "type": "list_item", "content": "- 6.2.1.3 ERTMS/ETCS  on-board  functions  shall  implement  all  the  safety  protocols  up  to  the Safety Level (SL) corresponding to the SIL of the function.", "bbox": {"l": 56.76, "t": 400.3670980273438, "r": 547.2495199999996, "b": 375.22501095552053}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶182": {"paragraph_id": "p0228", "page_id": 39, "type": "section_header", "content": "# 6.3 On-board Architecture", "bbox": {"l": 56.76, "t": 353.9510980273438, "r": 266.75312, "b": 341.35822642513386}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶183": {"paragraph_id": "p0229", "page_id": 39, "type": "list_item", "content": "- 6.3.1.1 Each STM shall only have one physical bus address (Station/Node address) towards the ERTMS/ETCS on-board.", "bbox": {"l": 56.76, "t": 329.3270980273438, "r": 547.2795199999995, "b": 304.1850109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶184": {"paragraph_id": "p0230", "page_id": 39, "type": "list_item", "content": "- 6.3.1.2 The ERTMS/ETCS on-board may use one or several physical bus addresses depending on its architecture.", "bbox": {"l": 56.76, "t": 289.8470980273438, "r": 547.4819199999998, "b": 264.6750109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶185": {"paragraph_id": "p0231", "page_id": 39, "type": "list_item", "content": "- 6.3.1.3 An STM shall be able to handle one different physical address for each ERTMS/ETCS on-board function.", "bbox": {"l": 56.76, "t": 250.3370980273438, "r": 547.1801599999997, "b": 225.19501095552062}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶186": {"paragraph_id": "p0232", "page_id": 39, "type": "list_item", "content": "- 6.3.1.4 In case several STMs share the same physical address, each of them shall establish its own connection at Application Layer using different NID_STMs.", "bbox": {"l": 56.76, "t": 210.8570980273438, "r": 547.1580799999996, "b": 185.7150109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶187": {"paragraph_id": "p0233", "page_id": 39, "type": "section_header", "content": "# 6.4 Physical Addressing (Station/Nodes addresses)", "bbox": {"l": 56.76, "t": 164.44109802734374, "r": 435.52312, "b": 151.84822642513382}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶188": {"paragraph_id": "p0234", "page_id": 39, "type": "list_item", "content": "- 6.4.1.1 The physical addresses shall be allocated according to the following table.", "bbox": {"l": 56.76, "t": 139.81709802734372, "r": 478.60912, "b": 129.91501095552053}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶189": {"paragraph_id": "p0235", "page_id": 39, "type": "text", "content": "© This document has been developed and released by UNISIG", "bbox": {"l": 188.21, "t": 52.29309802734383, "r": 412.8068000000001, "b": 45.08179548590738}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶190": {"paragraph_id": "p0237", "page_id": 40, "type": "table", "content": "| Physical Address   | Device                               |\n|--------------------|--------------------------------------|\n| 2                  | STM Control Function                 |\n| 0, 1, 2, 3 . . 19  | Other ERTMS/ETCS on-board functions  |\n| 20 . . 49          | Unused by FFFIS STM                  |\n| 50 . . 69          | STM configurable addresses range     |\n| 70 . . 126         | STMs (NID_NTC+70)                    |\n| 127                | Reserved for Broadcast and Multicast |", "bbox": {"l": 112.4006576538086, "t": 765.9860763549805, "r": 461.2955017089844, "b": 650.1175842285156}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶191": {"paragraph_id": "p0238", "page_id": 40, "type": "list_item", "content": "- 6.4.1.2 By default the Physical address of an STM shall be the NID_NTC value + 70.", "bbox": {"l": 56.76, "t": 641.2570980273438, "r": 492.40912, "b": 631.3550109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶192": {"paragraph_id": "p0239", "page_id": 40, "type": "list_item", "content": "- 6.4.1.3 STM  configurable  addresses  range  shall  be  used  for  STMs  for  which  the  sum  of NID_STM value +70 goes out of the Profibus physical address range", "bbox": {"l": 56.76, "t": 617.0170980273438, "r": 547.3525599999999, "b": 591.8450109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶193": {"paragraph_id": "p0240", "page_id": 40, "type": "list_item", "content": "- 6.4.1.4 In case several STMs share the same physical address, the address value shall be the one of any of the supported STMs or a configurable physical address.", "bbox": {"l": 56.76, "t": 577.5070980273438, "r": 547.2132799999995, "b": 552.3650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶194": {"paragraph_id": "p0241", "page_id": 40, "type": "list_item", "content": "- 6.4.1.5 When a physical  address  in  the  STM  configurable  addresses  range  is  to  be  used,  it shall  be  possible  to  configure  the value of this physical address in order to solve any potential address conflicts.", "bbox": {"l": 56.76, "t": 538.0270980273438, "r": 547.3213599999996, "b": 497.64501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶195": {"paragraph_id": "p0242", "page_id": 40, "type": "section_header", "content": "# 6.5 Function Addressing", "bbox": {"l": 56.76, "t": 476.37109802734375, "r": 257.15312, "b": 463.7782264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶196": {"paragraph_id": "p0243", "page_id": 40, "type": "list_item", "content": "- 6.5.1.1 The FFFIS STM requires communication with different functions of the ERTMS/ETCS on-board as e. g. Odometer, DMI and Juridical Data.", "bbox": {"l": 56.76, "t": 451.7470980273438, "r": 547.2872799999998, "b": 426.58501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶197": {"paragraph_id": "p0244", "page_id": 40, "type": "list_item", "content": "- 6.5.1.2 The  FFFIS  STM  shall  use  Service  Access  Points  (SAPs)  to  support  communication between STMs and the different ERTMS/ETCS on-board functions.", "bbox": {"l": 56.76, "t": 412.2470980273438, "r": 547.2022399999994, "b": 387.1050109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶198": {"paragraph_id": "p0245", "page_id": 40, "type": "list_item", "content": "- 6.5.1.3 All ERTMS/ETCS on-board functions shall have a defined fixed SAP.", "bbox": {"l": 56.76, "t": 372.7670980273438, "r": 453.28912, "b": 362.8650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶199": {"paragraph_id": "p0246", "page_id": 40, "type": "list_item", "content": "- 6.5.1.3.1 Note: The SAP is fixed regardless of the chosen physical address.", "bbox": {"l": 56.76, "t": 348.5270980273438, "r": 440.32912, "b": 338.62501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶200": {"paragraph_id": "p0247", "page_id": 40, "type": "list_item", "content": "- 6.5.1.4 For  transmitting  data  between  ERTMS/ETCS  on-board  and  the  STMs,  the  local (Source) Service Access Point (SSAP) and partner (Destination) Service Access Point (DSAP) shall have the same value.", "bbox": {"l": 56.76, "t": 324.28709802734375, "r": 547.4488, "b": 283.90501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶201": {"paragraph_id": "p0248", "page_id": 40, "type": "list_item", "content": "- 6.5.1.5 The SAP number shall be defined according to the following table:", "bbox": {"l": 56.76, "t": 269.53709802734375, "r": 439.72912, "b": 259.63501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶202": {"paragraph_id": "p0249", "page_id": 40, "type": "table", "content": "| Logical connections    | SAP# (binary)   |   # of SAP | Comment                                            |\n|------------------------|-----------------|------------|----------------------------------------------------|\n| DMI channel 3          | 000000          |          1 | Point-to-point                                     |\n| DMI channel 4          | 000001          |          1 | Point-to-point                                     |\n| Juridical Data         | 000010          |          1 | Point-to-point                                     |\n| Reserved for FFFIS STM | 000011          |          1 | Not used (reserved for backward compatibility).    |\n| DMI channel 1          | 000100          |          1 | Point-to-point                                     |\n| DMI channel 2          | 000101          |          1 | Point-to-point                                     |\n| Reserved for FFFIS STM | 000110          |          1 | Not used (reserved for backward compatibility).    |\n| Reserved for FFFIS STM | 000111          |          1 | Reserved for future extension of the specification |\n| Unused by FFFIS STM    | 001XXX          |          8 | To be defined by on-board implementers             |", "bbox": {"l": 74.77855682373047, "t": 254.42376708984375, "r": 526.1151733398438, "b": 66.76300048828125}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶203": {"paragraph_id": "p0251", "page_id": 41, "type": "table", "content": "| Logical connections    | SAP# (binary)                               |   # of SAP | Comment                                            |\n|------------------------|---------------------------------------------|------------|----------------------------------------------------|\n| Unused by FFFIS STM    | 01XXXX                                      |         16 | To be defined by on-board implementers             |\n| Reference Time         | 100000                                      |          1 | Multicast                                          |\n| STM Control            | 100001                                      |          1 | Point-to-point                                     |\n| Reserved for FFFIS STM | 100010                                      |          1 | Not used (reserved for backward compatibility).    |\n| Reserved for FFFIS STM | 100011                                      |          1 | Not used (reserved for backward compatibility).    |\n| Reserved for FFFIS STM | 100100                                      |          1 | Not used (reserved for backward compatibility).    |\n| Train Interface        | 100101                                      |          1 | Point-to-point                                     |\n| Brake Interface        | 100110                                      |          1 | Point-to-point                                     |\n| Odometer               | 100111                                      |          1 | Multicast for FFFIS STM version number X=4         |\n| Unused by FFFIS STM    | 101XXX                                      |          8 | Defined by each implementer.                       |\n| Reserved for FFFIS STM | 11XXXX Except 111111 reserved for broadcast |         15 | Reserved for future extension of the specification |\n| Broadcast              | 111111                                      |          1 | Reserved due to PROFIBUS specification             |", "bbox": {"l": 74.62953186035156, "t": 766.4264068603516, "r": 526.1671752929688, "b": 455.6137390136719}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶204": {"paragraph_id": "p0252", "page_id": 41, "type": "list_item", "content": "- 6.5.1.6 There  shall  be  only  one  source  (one  station/node  address)  which  shall  transmit messages using the SAP reserved for the Reference Clock Function.", "bbox": {"l": 56.76, "t": 447.1870980273438, "r": 547.1911999999995, "b": 422.02501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶205": {"paragraph_id": "p0253", "page_id": 41, "type": "list_item", "content": "- 6.5.1.7 There  shall  be  only  one  source  (one  station/node  address)  which  shall  transmit messages using the SAP reserved for the Odometer Function.", "bbox": {"l": 56.76, "t": 407.6870980273438, "r": 547.1911999999995, "b": 382.5450109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶206": {"paragraph_id": "p0254", "page_id": 41, "type": "section_header", "content": "# 6.6 Protocol Layers", "bbox": {"l": 56.76, "t": 361.2710980273438, "r": 223.07312, "b": 348.67822642513386}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶207": {"paragraph_id": "p0255", "page_id": 41, "type": "list_item", "content": "- 6.6.1.1 The protocol layers are Application Layer (see [4]), Safe Time Layer (see [2]), Safe Link Layer (see [3]) and PROFIBUS FDL layer (see [5]).", "bbox": {"l": 56.76, "t": 336.6470980273438, "r": 547.4262399999998, "b": 311.50501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶208": {"paragraph_id": "p0256", "page_id": 41, "type": "list_item", "content": "- 6.6.1.2 The Safe Time Layer and Safe Link Layer together shall be considered as the Safety Layers.", "bbox": {"l": 56.76, "t": 297.16709802734385, "r": 547.1691199999993, "b": 272.02501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶209": {"paragraph_id": "p0258", "page_id": 41, "type": "caption", "content": "Figure 2 - Application Data encapsulation by the layers in PROFIBUS telegram", "bbox": {"l": 115.82, "t": 69.65085802734382, "r": 490.78888, "b": 60.71745338645985}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶210": {"paragraph_id": "p0259", "page_id": 41, "type": "text", "content": "© This document has been developed and released by UNISIG", "bbox": {"l": 188.21, "t": 52.29309802734383, "r": 412.8068000000001, "b": 45.08179548590738}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶211": {"paragraph_id": "p0262", "page_id": 42, "type": "caption", "content": "Figure 3 - FFFIS STM Protocol Layers", "bbox": {"l": 211.85, "t": 484.8008580273438, "r": 391.99888000000004, "b": 475.86745338645983}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶212": {"paragraph_id": "p0264", "page_id": 43, "type": "section_header", "content": "# 7. CONNECTION MANAGEMENT AND VERSION CHECK", "bbox": {"l": 56.76, "t": 749.1639780273438, "r": 495.66400000000004, "b": 733.0192708450232}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶213": {"paragraph_id": "p0265", "page_id": 43, "type": "section_header", "content": "# 7.1 General  requirements  linked  to  the  opening  of  point-to-point connection between STM and ERTMS/ETCS on-board", "bbox": {"l": 56.76, "t": 713.7610980273438, "r": 548.31052, "b": 684.6082264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶214": {"paragraph_id": "p0266", "page_id": 43, "type": "section_header", "content": "# 7.1.1 Opening of the connection", "bbox": {"l": 56.76, "t": 666.0759780273438, "r": 269.06600000000003, "b": 655.3128399057969}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶215": {"paragraph_id": "p0267", "page_id": 43, "type": "list_item", "content": "- 7.1.1.1 A connection shall be considered as established when the version check is considered as completed and successful (see chapter 7.1.2).", "bbox": {"l": 56.76, "t": 643.4170980273437, "r": 547.3373599999996, "b": 618.2750109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶216": {"paragraph_id": "p0268", "page_id": 43, "type": "list_item", "content": "- 7.1.1.2 The STM shall take the initiative to establish the connection.", "bbox": {"l": 56.76, "t": 603.9070980273437, "r": 413.05912, "b": 594.0050109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶217": {"paragraph_id": "p0269", "page_id": 43, "type": "list_item", "content": "- 7.1.1.3 When a STM has to establish a connection with an ERTMS/ETCS on-board function, and  fails to establish the connection  2  times,  it shall be  allowed  to  retry the establishment of connection after 10 seconds.", "bbox": {"l": 56.76, "t": 579.6670980273437, "r": 547.4559999999999, "b": 539.2850109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶218": {"paragraph_id": "p0270", "page_id": 43, "type": "section_header", "content": "# 7.1.2 Check of version", "bbox": {"l": 56.76, "t": 518.4459780273438, "r": 213.626, "b": 507.6828399057968}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶219": {"paragraph_id": "p0271", "page_id": 43, "type": "list_item", "content": "- 7.1.2.1 Each time the STM opens a connection with any ERTMS/ETCS on-board function, the STM  shall  send  its  'FFFIS  STM  version  number'  to  this  ERTMS/ETCS  on-board function, followed by the STM state report information in the same application message.", "bbox": {"l": 56.76, "t": 495.7870980273438, "r": 547.4857599999999, "b": 455.40501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶220": {"paragraph_id": "p0272", "page_id": 43, "type": "list_item", "content": "- 7.1.2.2 When  receiving  the  'FFFIS  STM  version  number'  from  the  STM,  the  concerned ERTMS/ETCS on-board function shall check the version compatibility as follows:", "bbox": {"l": 56.76, "t": 441.0470980273438, "r": 547.1691199999998, "b": 415.90501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶221": {"paragraph_id": "p0273", "page_id": 43, "type": "list_item", "content": "- if the 'FFFIS STM version number X' from the STM is lower than the lowest 'FFFIS STM version number X' supported by the ERTMS/ETCS on-board equipment, the ERTMS/ETCS on-board function shall close the connection (final disconnection on Safety Layers).", "bbox": {"l": 113.42, "t": 404.5670980273438, "r": 547.44784, "b": 348.94501095552056}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶222": {"paragraph_id": "p0274", "page_id": 43, "type": "list_item", "content": "- if the 'FFFIS STM version number X' from the STM is amongst the ones supported by the ERTMS/ETCS on-board equipment, the ERTMS/ETCS on-board function shall send  to  the  STM  the  highest  supported  FFFIS  STM  version  number  of  which  the version number X is equal to the one received from the STM. The ERTMS/ETCS onboard function shall be allowed to transmit application data to the STM.", "bbox": {"l": 113.42, "t": 337.6070980273438, "r": 547.4459199999998, "b": 266.7150109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶223": {"paragraph_id": "p0275", "page_id": 43, "type": "list_item", "content": "-  if  the  'FFFIS  STM  version  number  X'  from  the  STM  is  greater  than  the  highest version  number  X  supported  by  the  ERTMS/ETCS  on-board  equipment,  the ERTMS/ETCS on-board function shall close the connection (final disconnection).", "bbox": {"l": 113.42, "t": 255.37709802734378, "r": 547.4679999999998, "b": 214.99501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶224": {"paragraph_id": "p0276", "page_id": 43, "type": "list_item", "content": "- 7.1.2.3 When receiving 'FFFIS STM version number' from ERTMS/ETCS on-board, the STM shall  check  the  version  compatibility.  If  it  is  compatible  with  the  'FFFIS  STM  version number'  of  the  STM,  then  the  version  check  is  considered  as  terminated  and successful.  The  STM  shall  be  allowed  to  transmit  further  application  data  to  the ERTMS/ETCS on-board function.", "bbox": {"l": 56.76, "t": 200.65709802734375, "r": 547.4507199999999, "b": 129.79501095552064}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶225": {"paragraph_id": "p0277", "page_id": 43, "type": "list_item", "content": "- 7.1.2.4 If  the  'FFFIS  STM  version  number'  of  the  ERTMS/ETCS  on-board  is  not  compatible with  the  'FFFIS  STM  version  number'  of  the  STM,  then  the  STM  shall  close  the connection (final disconnection) to the concerned ERTMS/ETCS on-board function.", "bbox": {"l": 56.76, "t": 115.45709802734382, "r": 547.4617599999999, "b": 75.05501095552063}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶226": {"paragraph_id": "p0278", "page_id": 43, "type": "text", "content": "© This document has been developed and released by UNISIG", "bbox": {"l": 188.21, "t": 52.29309802734383, "r": 412.8068000000001, "b": 45.08179548590738}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶227": {"paragraph_id": "p0280", "page_id": 44, "type": "section_header", "content": "# 7.1.3 Closing of the connection", "bbox": {"l": 56.76, "t": 762.5559780273438, "r": 264.386, "b": 751.7928399057969}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶228": {"paragraph_id": "p0281", "page_id": 44, "type": "list_item", "content": "- 7.1.3.1 Closing a connection on application layer shall be done by requesting the Safety Layers (see 6.6.1.2) to close the connection.", "bbox": {"l": 56.76, "t": 739.8970980273438, "r": 547.1667199999995, "b": 714.7550109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶229": {"paragraph_id": "p0282", "page_id": 44, "type": "list_item", "content": "- 7.1.4 Connection Sequence Charts.", "bbox": {"l": 56.76, "t": 693.9159780273437, "r": 287.906, "b": 683.1528399057968}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶230": {"paragraph_id": "p0283", "page_id": 44, "type": "list_item", "content": "- 7.2 General requirements linked to handling multicast connection", "bbox": {"l": 56.76, "t": 81.5010980273438, "r": 530.9231199999999, "b": 68.90822642513388}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶231": {"paragraph_id": "p0285", "page_id": 44, "type": "caption", "content": "Figure 5  Bad version number disconnection sequence chart", "bbox": {"l": 156.98, "t": 114.6708580273438, "r": 446.86888000000005, "b": 105.73745338645983}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶232": {"paragraph_id": "p0286", "page_id": 44, "type": "text", "content": "© This document has been developed and released by UNISIG", "bbox": {"l": 188.21, "t": 52.29309802734383, "r": 412.8068000000001, "b": 45.08179548590738}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶233": {"paragraph_id": "p0288", "page_id": 45, "type": "list_item", "content": "- 7.2.1.1 The  multicast  sender  shall  open  a  separate  connection  for  all  'FFFIS  STM  version numbers' defined in the Legal backward compatibility envelope (see table 16.3.1.1).", "bbox": {"l": 56.76, "t": 763.0570980273437, "r": 547.3539999999997, "b": 737.9150109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶234": {"paragraph_id": "p0289", "page_id": 45, "type": "list_item", "content": "- 7.2.1.2 Note: For each multicast application connection (currently limited to  Odometer Function), the table 6.5.1.5 contains one SAP for each 'FFFIS STM version number'. This allows opening separate connections.", "bbox": {"l": 56.76, "t": 723.5770980273437, "r": 547.2975199999998, "b": 683.1950109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶235": {"paragraph_id": "p0290", "page_id": 45, "type": "list_item", "content": "- 7.2.1.3 On each connection, the multicast sender shall transmit the corresponding 'FFFIS STM version number' over the FFFIS STM. The transmission shall be repeated to support restarting STMs.", "bbox": {"l": 56.76, "t": 668.8570980273438, "r": 547.2533599999995, "b": 628.4750109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶236": {"paragraph_id": "p0291", "page_id": 45, "type": "list_item", "content": "- 7.2.1.4 When receiving 'FFFIS STM version number' from ERTMS/ETCS on-board, the STM shall check the version compatibility.", "bbox": {"l": 56.76, "t": 614.1370980273438, "r": 547.4401599999999, "b": 588.9650109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶237": {"paragraph_id": "p0292", "page_id": 45, "type": "list_item", "content": "- 7.2.1.5 If  the  'FFFIS  STM  version  number'  of  the  ERTMS/ETCS  on-board  is  not  compatible with  the  'FFFIS  STM  version  number'  of  the  STM,  then  the  STM  shall  ignore  any information received from this multicast connection.", "bbox": {"l": 56.76, "t": 574.6270980273438, "r": 547.4872, "b": 534.2450109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶238": {"paragraph_id": "p0294", "page_id": 46, "type": "section_header", "content": "# 8. STM STATES", "bbox": {"l": 56.76, "t": 749.1639780273438, "r": 217.814, "b": 733.0192708450232}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶239": {"paragraph_id": "p0295", "page_id": 46, "type": "section_header", "content": "# 8.1 No Power (NP)", "bbox": {"l": 56.76, "t": 713.7610980273438, "r": 215.27312, "b": 701.1682264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶240": {"paragraph_id": "p0296", "page_id": 46, "type": "list_item", "content": "- 8.1.1.1 The NP state means that the STM is unpowered.", "bbox": {"l": 56.76, "t": 689.1370980273438, "r": 355.45912, "b": 679.2350109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶241": {"paragraph_id": "p0297", "page_id": 46, "type": "section_header", "content": "# 8.2 Power On (PO)", "bbox": {"l": 56.76, "t": 657.9610980273438, "r": 216.95312, "b": 645.3682264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶242": {"paragraph_id": "p0298", "page_id": 46, "type": "list_item", "content": "- 8.2.1.1 This state is the default state entered by the STM after the STM is switched on.", "bbox": {"l": 56.76, "t": 633.3370980273437, "r": 503.20912, "b": 623.4350109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶243": {"paragraph_id": "p0299", "page_id": 46, "type": "list_item", "content": "- 8.2.1.2 Once in PO state, the STM shall perform the synchronisation of the Safe Time Layer.", "bbox": {"l": 56.76, "t": 609.0970980273437, "r": 532.24912, "b": 599.1950109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶244": {"paragraph_id": "p0300", "page_id": 46, "type": "list_item", "content": "- 8.2.1.3 Once  in  PO  state,  the  STM  shall  establish  a  connection  with  the  ERTMS/ETCS  onboard STM Control Function.", "bbox": {"l": 56.76, "t": 584.8270980273437, "r": 544.3963200000001, "b": 559.6850109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶245": {"paragraph_id": "p0301", "page_id": 46, "type": "list_item", "content": "- 8.2.1.4 When the STM has established the connection to the STM Control Function, the STM shall  send  a  'Specific  NTC  Data  Need'  information  to  the  STM  Control  Function indicating whether it needs or not Specific NTC Data.", "bbox": {"l": 56.76, "t": 545.3470980273437, "r": 547.3181599999996, "b": 504.96501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶246": {"paragraph_id": "p0302", "page_id": 46, "type": "list_item", "content": "- 8.2.1.5 Once the ERTMS/ETCS on-board has sent the bus addresses and safety levels of all available  ERTMS/ETCS  on-board  functions  (see  10.1.1.4),  it  shall  allow  STM  to establish connections with any of these functions.", "bbox": {"l": 56.76, "t": 490.6270980273438, "r": 547.3775199999998, "b": 450.24501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶247": {"paragraph_id": "p0303", "page_id": 46, "type": "list_item", "content": "- 8.2.1.6 Once the STM Control Function has sent the ETCS status data to an STM in PO state (see chapter 10.5.1.1), it shall allow this STM to request CO state.", "bbox": {"l": 56.76, "t": 435.8870980273438, "r": 547.3251999999999, "b": 410.74501095552057}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶248": {"paragraph_id": "p0304", "page_id": 46, "type": "section_header", "content": "# 8.3 Configuration (CO)", "bbox": {"l": 56.76, "t": 389.47109802734377, "r": 243.59312, "b": 376.87822642513385}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶249": {"paragraph_id": "p0305", "page_id": 46, "type": "list_item", "content": "- 8.3.1.1 The  STM  CO  state  is  used  to  wait  until  all  configuration  data  between  STM  and ERTMS/ETCS on-board have been exchanged. 'Configuration data' means data that is necessary for the national operation, except Specific NTC Data.", "bbox": {"l": 56.76, "t": 364.8470980273438, "r": 547.2595999999995, "b": 324.4650109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶250": {"paragraph_id": "p0306", "page_id": 46, "type": "list_item", "content": "- 8.3.1.2 Configuration data from ERTMS/ETCS on-board to STMs consists of:", "bbox": {"l": 56.76, "t": 310.1270980273438, "r": 456.52912, "b": 300.2250109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶251": {"paragraph_id": "p0307", "page_id": 46, "type": "list_item", "content": "- ETCS data (see chapter 10.4)", "bbox": {"l": 113.42, "t": 288.8870980273439, "r": 277.55912, "b": 278.9850109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶252": {"paragraph_id": "p0308", "page_id": 46, "type": "list_item", "content": "- Status / availability of the train interface FFFIS STM signals (TIU)", "bbox": {"l": 113.42, "t": 267.6170980273438, "r": 448.84911999999997, "b": 257.7150109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶253": {"paragraph_id": "p0309", "page_id": 46, "type": "list_item", "content": "-  Status / availability of the brake interface FFFIS STM signals (BIU)", "bbox": {"l": 113.42, "t": 246.37709802734378, "r": 455.56912, "b": 236.4750109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶254": {"paragraph_id": "p0310", "page_id": 46, "type": "list_item", "content": "- Odometer performance parameters (see chapter 12.4)", "bbox": {"l": 113.42, "t": 225.13709802734377, "r": 397.09911999999997, "b": 215.23501095552058}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶255": {"paragraph_id": "p0311", "page_id": 46, "type": "list_item", "content": "- Brake performance parameters: Maximum time delay for the ERTMS/ETCS on-board to process the STM Emergency and the STM Service Brake commands. This is the time from receiving the brake command from the STM until the ETCS commands the brake.", "bbox": {"l": 113.42, "t": 206.89709802734376, "r": 547.50912, "b": 151.27501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶256": {"paragraph_id": "p0312", "page_id": 46, "type": "list_item", "content": "- 8.3.1.2.1 Note: Configuration data has not necessarily to be sent in CO state. Some data could be sent in PO state.", "bbox": {"l": 56.76, "t": 136.93709802734384, "r": 547.2888799999995, "b": 111.79501095552064}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶257": {"paragraph_id": "p0313", "page_id": 46, "type": "list_item", "content": "- 8.3.1.2.2 Note:  The  brake  performance  parameter  can  be  used  by  the  STM  in  braking  curves calculation.", "bbox": {"l": 56.76, "t": 97.43709802734384, "r": 547.2022399999996, "b": 72.29501095552064}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶258": {"paragraph_id": "p0315", "page_id": 47, "type": "list_item", "content": "- 8.3.1.3 Once the transmission of configuration data is finished and the Specific NTC Data Entry procedure is started, if the STM does not require any Specific NTC Data, then the STM shall request Cold Standby state to the STM Control Function.", "bbox": {"l": 56.76, "t": 763.0570980273437, "r": 547.4704, "b": 722.6750109555205}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶259": {"paragraph_id": "p0316", "page_id": 47, "type": "list_item", "content": "- 8.3.1.4 If an STM in Configuration State detects that the ERTMS/ETCS on-board is in the mode Non-Leading  or  Sleeping  and  has  received  all  the  configuration  data  except  for  the ETCS data, the STM shall request to go to Cold Standby state.", "bbox": {"l": 56.76, "t": 708.3370980273437, "r": 547.4660799999998, "b": 667.9550109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶260": {"paragraph_id": "p0317", "page_id": 47, "type": "list_item", "content": "- 8.3.1.4.1 Justification:  This  allows  STM  operation  in  Non-Leading  or  Sleeping  in  which  ETCS Train Data is not available.", "bbox": {"l": 56.76, "t": 653.6170980273438, "r": 547.3693599999998, "b": 628.4750109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶261": {"paragraph_id": "p0318", "page_id": 47, "type": "list_item", "content": "- 8.3.1.5 Once the transmission of configuration data is finished and the Specific NTC Data Entry procedure  is  started,  if  the  STM  does  require  any  Specific  NTC  Data,  then  the  STM shall request Data Entry state to the STM Control Function.", "bbox": {"l": 56.76, "t": 614.1370980273438, "r": 547.1693599999998, "b": 573.7250109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶262": {"paragraph_id": "p0319", "page_id": 47, "type": "list_item", "content": "- 8.3.1.6 When an STM exits CO state, it shall have the possibility to close any connection except with STM Control Function.", "bbox": {"l": 56.76, "t": 559.3870980273438, "r": 547.4135199999995, "b": 534.2450109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶263": {"paragraph_id": "p0320", "page_id": 47, "type": "section_header", "content": "# 8.4 Data Entry (DE)", "bbox": {"l": 56.76, "t": 512.9710980273438, "r": 219.95312, "b": 500.37822642513385}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶264": {"paragraph_id": "p0321", "page_id": 47, "type": "list_item", "content": "- 8.4.1.1 The state DE is used by any STM that requires Specific NTC Data in order to have all the required national information for operating the train with the STM.", "bbox": {"l": 56.76, "t": 488.3470980273438, "r": 547.4339199999998, "b": 463.20501095552055}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶265": {"paragraph_id": "p0322", "page_id": 47, "type": "list_item", "content": "- 8.4.1.1.1 Note: This state is only entered once at the start up process of the STM.", "bbox": {"l": 56.76, "t": 448.8670980273438, "r": 469.00912, "b": 438.96501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶266": {"paragraph_id": "p0323", "page_id": 47, "type": "list_item", "content": "- 8.4.1.2 In  the  state  DE,  the  Specific  NTC  Data  Entry  procedure  (see  chapter  10.7)  shall  be performed.", "bbox": {"l": 56.76, "t": 424.6070980273438, "r": 547.4622399999997, "b": 399.46501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶267": {"paragraph_id": "p0324", "page_id": 47, "type": "list_item", "content": "- 8.4.1.3 Once the Specific NTC Data Entry procedure is terminated, the STM shall request Cold Standby state to the STM Control Function.", "bbox": {"l": 56.76, "t": 385.1270980273438, "r": 547.51024, "b": 359.9850109555206}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶268": {"paragraph_id": "p0325", "page_id": 47, "type": "list_item", "content": "- 8.4.1.4 Note:  The  Specific  NTC  Data  Entry  procedure  can  be  terminated  without  having received the Specific NTC Data (e.g. when the Specific NTC Data Entry procedure is skipped). However, the Cold Standby state is still requested in order to have the same system behaviour when the Specific NTC Data is invalid.", "bbox": {"l": 56.76, "t": 345.6470980273438, "r": 547.2997599999994, "b": 290.02501095552054}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶269": {"paragraph_id": "p0326", "page_id": 47, "type": "section_header", "content": "# 8.5 Cold Standby (CS)", "bbox": {"l": 56.76, "t": 268.7210980273437, "r": 239.99312, "b": 256.1282264251338}, "page_width": 595.3200073242188, "page_height": 842.0399780273438}, "¶270": {"paragraph_id": "p0327", "page_id": 47, "type": "list_item", "content": "- 8.5.1.1 Being in the state CS, the STM has been
